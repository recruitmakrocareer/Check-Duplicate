<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Checker | Enterprise Cloud Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAX6alx5rJRDRd8Wcvj4rDLLsYwz37NXEQ",
            authDomain: "recruit-operation-project.firebaseapp.com",
            projectId: "recruit-operation-project",
            storageBucket: "recruit-operation-project.firebasestorage.app",
            messagingSenderId: "857023562077",
            appId: "1:857023562077:web:669da5cfc20cf7707e68b4",
            measurementId: "G-K3EC9MZ0JJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.FB = { 
            db, auth,
            methods: { signInAnonymously, onAuthStateChanged, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query }
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [currentUserAgency, setCurrentUserAgency] = useState('');
            const [loginEmail, setLoginEmail] = useState('');
            const [isLoading, setIsLoading] = useState(true);
            const [cloudCandidates, setCloudCandidates] = useState([]);
            const [referenceDb, setReferenceDb] = useState([]);
            const [formData, setFormData] = useState({ recordDate: new Date().toISOString().split('T')[0], name: '', tel: '', email: '', position: '', location: '' });
            const [searchTerm, setSearchTerm] = useState('');
            const [popup, setPopup] = useState(null);

            // ปรับปรุงการโหลดไอคอนให้ปลอดภัยขึ้น ไม่ไปยุ่งกับโครงสร้าง React โดยตรง
            const refreshIcons = useCallback(() => {
                if (window.lucide) {
                    setTimeout(() => lucide.createIcons(), 50);
                }
            }, []);

            useEffect(() => {
                if (!window.FB) return;
                const { auth, methods } = window.FB;
                
                methods.signInAnonymously(auth).catch(e => console.error("Firebase Auth Error:", e));
                
                const unsubscribe = methods.onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    loadStaticData();
                });
                return () => unsubscribe();
            }, []);

            const loadStaticData = async () => {
                try {
                    const dbUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTsDZSCTRBCQ3LojqsCmVPea7qo7uB9VyXne9aZSlqxo8yntizND6o7bpRQfS2rFFHthMB-N0YIqTL6/pub?output=csv';
                    const res = await fetch(dbUrl).then(r => r.text());
                    const data = Papa.parse(res, { header: true }).data;
                    setReferenceDb(data.filter(r => r['Name-Surname']).map(r => ({
                        name: (r['Name-Surname'] || '').trim(),
                        tel: r['Tel'] ? r['Tel'].toString().trim() : ''
                    })));
                    setIsLoading(false);
                    refreshIcons();
                } catch (e) {
                    setIsLoading(false);
                }
            };

            // ดึงข้อมูล Real-time เมื่อล็อกอินสำเร็จ
            useEffect(() => {
                if (!user || !currentUserAgency) return;
                const { db, methods } = window.FB;
                const q = methods.query(methods.collection(db, 'candidates'));
                const unsubscribe = methods.onSnapshot(q, (sn) => {
                    setCloudCandidates(sn.docs.map(d => ({ id: d.id, ...d.data() })));
                    refreshIcons();
                });
                return () => unsubscribe();
            }, [user, currentUserAgency, refreshIcons]);

            const handleLogin = (e) => {
                e.preventDefault();
                const accessMap = { 
                    "admin@company.com": "Admin", 
                    "manpower@agency.com": "Manpower", 
                    "metalent@agency.com": "Me Talent", 
                    "prtr@agency.com": "PRTR", 
                    "talentvis@agency.com": "Talentvis", 
                    "techgrid@agency.com": "Techgrid" 
                };
                const agency = accessMap[loginEmail.trim().toLowerCase()];
                if (agency) {
                    setCurrentUserAgency(agency);
                    refreshIcons();
                } else {
                    setPopup({ title: "ล้มเหลว", msg: "ไม่พบอีเมลนี้ในระบบ" });
                }
            };

            const handleAdd = async (e) => {
                e.preventDefault();
                const normalize = (s) => s ? s.toString().toLowerCase().replace(/[^a-z0-9ก-ฮ]/g, '') : '';
                const isDup = [...referenceDb, ...cloudCandidates].some(c => normalize(c.name) === normalize(formData.name) || normalize(c.tel) === normalize(formData.tel));
                
                if (isDup) return setPopup({ title: "พบข้อมูลซ้ำ!", msg: "รายชื่อนี้มีอยู่ในระบบแล้ว" });

                try {
                    await window.FB.methods.addDoc(window.FB.methods.collection(window.FB.db, 'candidates'), {
                        ...formData,
                        agency: currentUserAgency,
                        prescreenStatus: 'Pending',
                        createdAt: Date.now()
                    });
                    setFormData({ ...formData, name: '', tel: '', email: '' });
                    setPopup({ title: "สำเร็จ", msg: "บันทึกข้อมูลเรียบร้อย" });
                } catch (e) {
                    setPopup({ title: "Error", msg: "บันทึกไม่ได้ กรุณาเช็ค Firestore Rules" });
                }
            };

            const filteredItems = useMemo(() => {
                return cloudCandidates.filter(item => {
                    if (currentUserAgency !== 'Admin' && item.agency !== currentUserAgency) return false;
                    const search = searchTerm.toLowerCase();
                    return !searchTerm || item.name.toLowerCase().includes(search) || item.tel.includes(search);
                }).sort((a, b) => b.createdAt - a.createdAt);
            }, [cloudCandidates, currentUserAgency, searchTerm]);

            if (isLoading) {
                return <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white"><div className="loader scale-150 mb-6"></div><p className="font-bold">CONNECTING CLOUD...</p></div>;
            }

            // --- ส่วนที่ 1: หน้า Login ---
            if (!currentUserAgency) {
                return (
                    <div key="login-page" className="h-screen flex items-center justify-center bg-slate-950 relative">
                        <div className="glass-morphism w-full max-w-md rounded-[3rem] p-12 shadow-2xl z-10 text-center">
                            <div className="bg-indigo-600 w-20 h-20 rounded-[1.5rem] flex items-center justify-center text-white mx-auto mb-6">
                                <i data-lucide="shield-check" className="w-10 h-10"></i>
                            </div>
                            <h1 className="text-3xl font-black mb-10 text-slate-800">HR ACCESS</h1>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="email" value={loginEmail} onChange={e => setLoginEmail(e.target.value)} className="w-full bg-white border-2 p-5 rounded-2xl text-center font-bold" placeholder="yourname@agency.com" required />
                                <button className="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-lg hover:bg-indigo-700 transition-colors">เข้าสู่ระบบ</button>
                            </form>
                        </div>
                        {popup && <Popup data={popup} close={() => setPopup(null)} />}
                    </div>
                );
            }

            // --- ส่วนที่ 2: หน้า Dashboard ---
            return (
                <div key="dashboard-page" className="min-h-screen p-4 md:p-10 max-w-[1600px] mx-auto">
                    <div className="bg-white rounded-[2rem] p-6 shadow-xl flex items-center justify-between mb-8">
                        <div className="flex items-center gap-4">
                            <div className="bg-slate-900 p-4 rounded-2xl text-white"><i data-lucide="layout-dashboard"></i></div>
                            <h1 className="text-2xl font-black uppercase">{currentUserAgency} SESSION</h1>
                        </div>
                        <button onClick={() => { setCurrentUserAgency(''); refreshIcons(); }} className="text-rose-600 font-bold p-4 bg-rose-50 rounded-2xl"><i data-lucide="power"></i></button>
                    </div>

                    <div className="grid grid-cols-1 xl:grid-cols-4 gap-8">
                        {currentUserAgency !== 'Admin' && (
                            <div className="xl:col-span-1 bg-white p-8 rounded-[2.5rem] shadow-lg h-fit border border-white">
                                <h2 className="text-xl font-bold mb-6 flex gap-2"><i data-lucide="user-plus" className="text-indigo-600"></i> เพิ่มรายชื่อ</h2>
                                <form onSubmit={handleAdd} className="space-y-4">
                                    <input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} placeholder="ชื่อ-นามสกุล" className="w-full bg-slate-50 p-4 rounded-xl font-bold border-2 border-transparent focus:border-indigo-500 outline-none" required />
                                    <input type="text" value={formData.tel} onChange={e => setFormData({...formData, tel: e.target.value})} placeholder="เบอร์โทร" className="w-full bg-slate-50 p-4 rounded-xl font-bold border-2 border-transparent focus:border-indigo-500 outline-none" required />
                                    <input type="email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} placeholder="อีเมล" className="w-full bg-slate-50 p-4 rounded-xl font-bold border-2 border-transparent focus:border-indigo-500 outline-none" required />
                                    <select value={formData.position} onChange={e => setFormData({...formData, position: e.target.value})} className="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none" required>
                                        <option value="">เลือกตำแหน่ง</option>
                                        <option value="Sales Executive">Sales Executive</option>
                                        <option value="Section Manager">Section Manager</option>
                                    </select>
                                    <select value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} className="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none" required>
                                        <option value="">เลือกสาขา</option>
                                        <option value="Bangkok">Bangkok</option>
                                        <option value="Other">Other</option>
                                    </select>
                                    <button className="w-full bg-slate-900 text-white py-4 rounded-xl font-black mt-4 shadow-lg hover:bg-black transition-all active:scale-95">บันทึกข้อมูล</button>
                                </form>
                            </div>
                        )}
                        <div className={currentUserAgency === 'Admin' ? 'col-span-4' : 'xl:col-span-3'}>
                            <div className="bg-white p-5 rounded-[2rem] shadow-lg mb-6 flex gap-4 border border-white">
                                <div className="flex-1 relative">
                                    <i data-lucide="search" className="absolute left-4 top-4 text-slate-300"></i>
                                    <input type="text" placeholder="ค้นหาชื่อหรือเบอร์โทร..." className="w-full bg-slate-50 pl-12 p-4 rounded-xl font-bold outline-none" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                </div>
                            </div>
                            <div className="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-white">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-900 text-white text-[10px] uppercase tracking-widest">
                                        <tr>
                                            <th className="p-6">ผู้สมัคร</th>
                                            <th className="p-6">ตำแหน่ง</th>
                                            {currentUserAgency === 'Admin' && <th className="p-6">Agency</th>}
                                            <th className="p-6 text-center">สถานะ</th>
                                            <th className="p-6"></th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {filteredItems.map(item => (
                                            <tr key={item.id} className="hover:bg-slate-50/50">
                                                <td className="p-6">
                                                    <div className="font-black text-slate-800">{item.name}</div>
                                                    <div className="text-slate-400 text-xs">{item.tel}</div>
                                                </td>
                                                <td className="p-6">
                                                    <div className="text-indigo-600 font-bold text-xs">{item.position}</div>
                                                    <div className="text-slate-400 text-[10px]">{item.location}</div>
                                                </td>
                                                {currentUserAgency === 'Admin' && <td className="p-6 font-bold text-xs">{item.agency}</td>}
                                                <td className="p-6 text-center">
                                                    <span className={`px-4 py-1.5 rounded-full text-[10px] font-black ${item.prescreenStatus === 'ผ่าน' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-400'}`}>
                                                        {item.prescreenStatus}
                                                    </span>
                                                </td>
                                                <td className="p-6 text-right">
                                                    <button onClick={() => { if(confirm("ลบข้อมูล?")) window.FB.methods.deleteDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id)) }} className="text-rose-200 hover:text-rose-600 transition-colors"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    {popup && <Popup data={popup} close={() => setPopup(null)} />}
                </div>
            );
        };

        const Popup = ({ data, close }) => (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-[100] p-6">
                <div className="bg-white p-10 rounded-[3rem] max-w-sm w-full text-center shadow-2xl border-t-8 border-indigo-500">
                    <h3 className="text-2xl font-black mb-4">{data.title}</h3>
                    <p className="text-slate-500 font-bold mb-8">{data.msg}</p>
                    <button onClick={close} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">ตกลง</button>
                </div>
            </div>
        );

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
