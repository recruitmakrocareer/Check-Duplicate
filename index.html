                const KNOWN_AGENCIES = ['Manpower', 'Me Talent', 'PRTR', 'Talentvis', 'Techgrid'];
                const inRange = (d) => {
                    if (!d) return !dashFrom && !dashTo; // ไม่มีวันที่ส่ง → นับเฉพาะเมื่อไม่ได้กรองช่วง

                    aiPass: 0, aiFail: 0, aiWait: 0,
                    scheduled: 0, intPass: 0, intFail: 0, intNoShow: 0, intWait: 0
                });
                const map = {};
                KNOWN_AGENCIES.forEach(a => { map[a] = blank(); });
                source.forEach(item => {
                    const a = item.agency;
                    if (!map[a]) map[a] = blank();
                    const s = map[a];
                    s.total++;
                    if (item.prescreenStatus === 'No Dup') s.noDup++;
                    else if (item.prescreenStatus === 'Dup') s.dup++;
                    else s.waitDup++;
                    if (item.aiSummary === 'ผ่าน') s.aiPass++;

                    if (item.interviewDate) {

                        else if (item.interviewStatus === 'ไม่เข้าสัมภาษณ์') s.intNoShow++;
                        else s.intWait++;
                    }
                });
                const rows = Object.keys(map)
                    .map(agency => ({ agency, ...map[agency] }))
                    .filter(r => r.total > 0 || KNOWN_AGENCIES.includes(r.agency))
                    .sort((a, b) => b.total - a.total);
                const totals = rows.reduce((acc, r) => {
                    Object.keys(blank()).forEach(k => { acc[k] = (acc[k] || 0) + r[k]; });

            const extractTextFromPDF = async (base64Data) => {
                try {
                    const binaryString = window.atob(base64Data);
                    const len = binaryString.length;
                    const bytes = new Uint8Array(len);
                    for (let i = 0; i < len; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    const loadingTask = window.pdfjsLib.getDocument({data: bytes});
                    const pdf = await loadingTask.promise;
                    let fullText = "";
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        fullText += textContent.items.map(item => item.str).join(" ") + "\n";
                    }
                    return fullText;
                } catch (error) {
                    console.error("PDF Extraction Error:", error);
                    return null;
                }
            };

                const position = targetCandidate?.position || 'General';

                const reader = new FileReader();
                reader.onload = async (f) => {
                    const base64 = f.target.result.split(',')[1];
                    try {
                        const response = await fetch(scriptURL, { method: "POST", body: JSON.stringify({ fileData: base64, mimeType: file.type, fileName: file.name }) });
                        const res = await response.json();
                        
                        if (res.status === "success") {
                            let aiData = { summary: 'รอผล', detail: '' };

                            const apiKey = openaiApiKey ? openaiApiKey.trim() : '';
                            const ENABLE_AI = apiKey.startsWith('sk-');

                            if (ENABLE_AI) {
                                try {
                                    const pdfText = await extractTextFromPDF(base64);
                                    if (!pdfText) throw new Error("ไม่สามารถดึงข้อความจากไฟล์ PDF ได้");

                                    const specificCriteria = jobRequirements[position]
                                        ? `คุณสมบัติหลักที่ต้องการ: "${jobRequirements[position]}"`
                                        : "";

                                    const promptText = `คุณคือ HR ผู้เชี่ยวชาญ จงวิเคราะห์ Resume ของผู้สมัครด้านล่าง เพื่อประเมินความเหมาะสมกับตำแหน่ง "${position}" ${specificCriteria}\n\nเนื้อหา Resume:\n"${pdfText.substring(0, 10000)}"\n\nตอบกลับในรูปแบบ JSON เท่านั้น มี key ดังนี้:\n- "result": "ผ่าน" หรือ "ไม่ผ่าน" เท่านั้น\n- "detail": สรุปเหตุผลเป็นภาษาไทย 2-3 ประโยค`;

                                    const aiRes = await fetch("https://api.openai.com/v1/chat/completions", {
                                        method: 'POST',
                                        headers: {
                                            'Content-Type': 'application/json',
                                            'Authorization': `Bearer ${apiKey}`
                                        },
                                        body: JSON.stringify({
                                            model: 'gpt-4o-mini',
                                            messages: [{ role: 'user', content: promptText }],
                                            response_format: { type: 'json_object' }
                                        })
                                    });

                                    const aiJson = await aiRes.json();

                                    if (!aiRes.ok) {
                                        throw new Error(aiJson.error?.message || "OpenAI API Error");
                                    }

                                    const aiContent = JSON.parse(aiJson.choices[0].message.content);
                                    const resultVal = aiContent.result === 'ผ่าน' ? 'ผ่าน' : 'ไม่ผ่าน';
                                    aiData = { summary: resultVal, detail: aiContent.detail || '' };

                                } catch (aiErr) {
                                    console.error("AI Analysis failed:", aiErr);
                                    aiData.summary = "AI ขัดข้อง: " + aiErr.message;
                                    aiData.detail = '';
                                }
                            }

                            await window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', targetId), {
                                resumeLink: res.url,
                                aiScore: null,
                                aiSummary: aiData.summary,
                                aiDetail: aiData.detail
                            });

                            if (aiData.summary === 'ผ่าน' && targetCandidate) {
                                notifyHrPrescreenPass(targetCandidate, aiData.detail, res.url, targetId);
                            }

                            setPopup({ title: "SUCCESS", msg: `อัปโหลดไฟล์สำเร็จ!` });
                        }
                    } finally {

                    const d = new Date(date);
                    const day = d.getDay();
                    d.setDate(d.getDate() - day);
                    return d;
                };
                const weekStart = getWeekStart(publicCalDate);
                const weekDays = Array.from({ length: 7 }, (_, i) => {
                    const d = new Date(weekStart);

                const dayInterviews = getInterviewsForDate(dayStr);

                        ? publicCalCandidates.filter(c => c.interviewTime === calFilterTime)
                        : publicCalCandidates;

                        const we = `${weekDays[6].getFullYear()}-${String(weekDays[6].getMonth()+1).padStart(2,'0')}-${String(weekDays[6].getDate()).padStart(2,'0')}`;
                        return base.filter(c => c.interviewDate >= ws && c.interviewDate <= we);
                    }
                    return base.filter(c => {
                        if (!c.interviewDate) return false;
                        const d = new Date(c.interviewDate + 'T00:00:00');
                        return d.getFullYear() === pcYear && d.getMonth() === pcMonth;
                    });
                })();

                const navigatePrev = () => {
                    const d = new Date(publicCalDate);

                    else if (publicCalViewMode === 'week') d.setDate(d.getDate() - 7);

                    setPublicCalDate(d);

                    const d = new Date(publicCalDate);

                                                                )}
                                                            </td>

                                                            {/* COL 3: การประเมิน (Prescreen + AI + Resume) */}
                                                            <td className="text-center">
                                                                {isEditing ? (
                                                                    <div className="flex flex-col gap-1.5 items-center">
                                                                        <div className="flex gap-1 w-full justify-center">
                                                                            <select value={editFormData.prescreenStatus || 'Wait Prescreen'} onChange={(e) => setEditFormData({...editFormData, prescreenStatus: e.target.value})} className="admin-edit text-[11px] w-1/2">
                                                                                <option value="Wait Prescreen">Wait Prescreen</option><option value="No Dup">No Dup</option><option value="Dup">Dup</option>
                                                                            </select>
                                                                            <select value={editFormData.aiSummary || 'รอผล'} onChange={(e) => setEditFormData({...editFormData, aiSummary: e.target.value})} className="admin-edit text-[11px] w-1/2">
                                                                                <option value="รอผล">รอผล AI</option><option value="ผ่าน">ผ่าน AI</option><option value="ไม่ผ่าน">ไม่ผ่าน AI</option>
                                                                            </select>
                                                                        </div>
                                                                    </div>
                                                                ) : (
                                                                    <div className="flex flex-col items-center gap-1.5">
                                                                        <div className="flex flex-wrap justify-center gap-1">
                                                                            <span className={`badge ${item.prescreenStatus === 'No Dup' ? 'bg-emerald-50 text-emerald-600 ring-1 ring-emerald-500/20' : item.prescreenStatus === 'Dup' ? 'bg-rose-50 text-rose-600 ring-1 ring-rose-500/20' : 'bg-slate-100 text-slate-500 border border-slate-200'}`}>
                                                                                {item.prescreenStatus}
                                                                            </span>
                                                                            {item.aiSummary === 'รอผล' ? (
                                                                                <span className="badge bg-slate-100 text-slate-500 ring-1 ring-slate-400/20">รอ AI</span>
                                                                            ) : item.aiSummary === 'ผ่าน' ? (
                                                                                <button onClick={() => item.aiDetail && setAiModal({ summary: item.aiDetail, name: item.firstName ? `${item.firstName} ${item.lastName}` : item.name })} className={`badge flex items-center gap-1 bg-emerald-50 text-emerald-600 ring-1 ring-emerald-500/20 ${item.aiDetail ? 'cursor-pointer hover:scale-105 transition-transform' : ''}`}>
                                                                                    <i data-lucide="check-circle" className="w-3 h-3"></i> ผ่าน AI
                                                                                </button>
                                                                            ) : item.aiSummary === 'ไม่ผ่าน' ? (
                                                                                <button onClick={() => item.aiDetail && setAiModal({ summary: item.aiDetail, name: item.firstName ? `${item.firstName} ${item.lastName}` : item.name })} className={`badge flex items-center gap-1 bg-rose-50 text-rose-600 ring-1 ring-rose-500/20 ${item.aiDetail ? 'cursor-pointer hover:scale-105 transition-transform' : ''}`}>
                                                                                    <i data-lucide="x-circle" className="w-3 h-3"></i> ไม่ผ่าน AI
                                                                                </button>
                                                                            ) : item.aiSummary ? (
                                                                                <button onClick={() => setPopup({ title: "AI ERROR", msg: item.aiSummary })} className="badge cursor-pointer bg-slate-50 text-rose-500 ring-1 ring-rose-500/30 hover:scale-105 transition-transform flex items-center justify-center gap-1">
                                                                                    <i data-lucide="alert-circle" className="w-3 h-3"></i> Failed
                                                                                </button>
                                                                            ) : null}
                                                                        </div>
                                                                        
                                                                        {/* Resume Link/Upload */}
                                                                        <div className="flex justify-center mt-1">
                                                                            {item.resumeLink ? (
                                                                                <div className="flex gap-1 flex-wrap justify-center">
                                                                                    <a href={item.resumeLink} target="_blank" className="text-[10px] font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 px-2 py-1 rounded-md transition-colors flex items-center gap-1" title="View Resume"><i data-lucide="file-text" className="w-3 h-3"></i> เปิดเรซูเม่</a>
                                                                                    {currentUserAgency === 'Admin' && (
                                                                                        <a href={getDownloadLink(item.resumeLink)} target="_blank" className="text-slate-600 bg-slate-100 hover:bg-slate-200 p-1 rounded-md transition-colors" title="Download"><i data-lucide="download" className="w-3 h-3"></i></a>
                                                                                    )}
                                                                                    {currentUserAgency === 'Admin' && (
                                                                                        <button onClick={() => { setTargetId(item.id); fileInputRef.current.click(); }} className="text-amber-600 bg-amber-50 border border-dashed border-amber-300 hover:border-amber-500 hover:bg-amber-100 text-[10px] font-bold p-1 rounded-md transition-all flex items-center gap-1 whitespace-nowrap" title="เปลี่ยน CV">
                                                                                            {isUploading === item.id ? <div className="w-3 h-3 border-2 border-amber-200 border-t-amber-600 rounded-full animate-spin"></div> : <i data-lucide="refresh-cw" className="w-3 h-3"></i>}
                                                                                        </button>
                                                                                    )}
                                                                                </div>
                                                                            ) : (
                                                                                (currentUserAgency === 'Admin' || (currentUserAgency !== 'Admin' && (item.prescreenStatus === 'No Dup' || item.prescreenStatus === 'Wait Prescreen'))) ? (
                                                                                    <button onClick={() => { setTargetId(item.id); fileInputRef.current.click(); }} className="text-indigo-600 bg-white border border-dashed border-indigo-300 hover:border-indigo-500 hover:bg-indigo-50 text-[10px] font-bold px-3 py-1 rounded-lg transition-all flex items-center gap-1 whitespace-nowrap">
                                                                                        {isUploading === item.id ? (
                                                                                            <div className="w-3 h-3 border-2 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
                                                                                        ) : (
                                                                                            <span className="flex items-center"><i data-lucide="upload" className="w-3 h-3"></i></span>
                                                                                        )}
                                                                                        {isUploading === item.id ? "กำลังอัปโหลด..." : "อัปโหลด CV"}
                                                                                    </button>
                                                                                ) : <span className="text-slate-300 flex items-center text-[10px]"><i data-lucide="lock" className="w-3 h-3 mr-1"></i> ไม่มีไฟล์</span>
                                                                            )}
                                                                        </div>
                                                                    </div>
                                                                )}
                                                            </td>

                                                            {/* COL 4: นัดหมายสัมภาษณ์ */}
                                                            <td className="text-center">
                                                                {isEditing ? (
                                                                    <div className="flex flex-col gap-1.5 items-center">
                                                                        <div className="flex gap-1 w-full justify-center">
                                                                            <input type="date" value={editFormData.interviewDate || ''} onChange={e => setEditFormData({...editFormData, interviewDate: e.target.value})} className="admin-edit text-[11px] w-1/2" />
                                                                            <input type="time" value={editFormData.interviewTime || ''} onChange={e => setEditFormData({...editFormData, interviewTime: e.target.value})} className="admin-edit text-[11px] w-1/2" />
                                                                        </div>
                                                                        <select value={editFormData.interviewMode || ''} onChange={e => setEditFormData({...editFormData, interviewMode: e.target.value})} className="admin-edit text-[11px] w-full">
                                                                            <option value="">รูปแบบสัมภาษณ์: -</option><option value="Online">รูปแบบสัมภาษณ์: Online</option><option value="Onsite">รูปแบบสัมภาษณ์: Onsite</option>
                                                                        </select>
                                                                        {editFormData.interviewMode === 'Online' && (
                                                                            <input type="url" value={editFormData.interviewLink || ''} onChange={e => setEditFormData({...editFormData, interviewLink: e.target.value})} placeholder="Link สัมภาษณ์ Online..." className="admin-edit text-[11px] w-full" />
                                                                        )}
                                                                        {editFormData.interviewMode === 'Onsite' && (
                                                                            <input type="text" value={editFormData.interviewPlace || ''} onChange={e => setEditFormData({...editFormData, interviewPlace: e.target.value})} placeholder="สถานที่สัมภาษณ์ เช่น สาขา..." className="admin-edit text-[11px] w-full" />
                                                                        )}
                                                                        {(editFormData.aiSummary === 'ผ่าน' && editFormData.interviewDate) && (
                                                                            <React.Fragment>
                                                                                <select value={editFormData.interviewStatus || 'รอผล'} onChange={e => setEditFormData({...editFormData, interviewStatus: e.target.value})} className="admin-edit text-[11px] w-full">
                                                                                    <option value="รอผล">ผลการสัมภาษณ์: รอผล</option><option value="ผ่าน">ผลการสัมภาษณ์: ผ่าน</option><option value="ไม่ผ่าน">ผลการสัมภาษณ์: ไม่ผ่าน</option><option value="ไม่เข้าสัมภาษณ์">ผลการสัมภาษณ์: ไม่เข้าสัมภาษณ์</option><option value="อื่นๆ">ผลการสัมภาษณ์: อื่นๆ</option>
                                                                                </select>
                                                                                <textarea value={editFormData.interviewComment || ''} onChange={e => setEditFormData({...editFormData, interviewComment: e.target.value})} placeholder="ระบุหมายเหตุ..." className="admin-edit text-[11px] w-full resize-none" rows={2} />
                                                                            </React.Fragment>
                                                                        )}
                                                                    </div>
                                                                ) : (
                                                                    <div className="flex flex-col items-center">
                                                                        {(item.interviewDate || item.interviewTime) ? (
                                                                            <div className="text-[10px] text-slate-600 font-bold mb-1.5 bg-slate-50 border border-slate-100 rounded-md px-2 py-1 inline-flex items-center gap-1.5">
                                                                                <span><i data-lucide="calendar" className="w-3 h-3 inline"></i> {item.interviewDate || '-'}</span>
                                                                                <span><i data-lucide="clock" className="w-3 h-3 inline"></i> {item.interviewTime || '-'}</span>
                                                                            </div>
                                                                        ) : (
                                                                            <div className="text-[10px] text-slate-400 mb-1.5">- ไม่ได้นัดหมาย -</div>
                                                                        )}

                                                                        {item.interviewMode && (
                                                                            <div className="flex flex-col items-center gap-0.5 mb-1.5">
                                                                                <span className={`text-[10px] font-black px-2 py-0.5 rounded-full ${item.interviewMode === 'Online' ? 'bg-sky-50 text-sky-600 ring-1 ring-sky-400/30' : 'bg-emerald-50 text-emerald-600 ring-1 ring-emerald-400/30'}`}>
                                                                                    สัมภาษณ์ {item.interviewMode}
                                                                                </span>
                                                                                {item.interviewMode === 'Online' && item.interviewLink && (
                                                                                    <a href={item.interviewLink} target="_blank" rel="noreferrer" className="text-[10px] font-bold text-sky-600 underline max-w-[160px] truncate" title={item.interviewLink}>เปิด Link สัมภาษณ์</a>
                                                                                )}
                                                                                {item.interviewMode === 'Onsite' && item.interviewPlace && (
                                                                                    <div className="text-[10px] text-emerald-600 font-semibold max-w-[160px] break-words">{item.interviewPlace}</div>
                                                                                )}
                                                                            </div>
                                                                        )}
                                                                        
                                                                        {(item.aiSummary === 'ผ่าน' && item.interviewDate) && (
                                                                            <React.Fragment>
                                                                                <span className={`badge ${getInterviewStatusClass(item.interviewStatus || 'รอผล')}`}>{item.interviewStatus || 'รอผล'}</span>
                                                                                {item.interviewComment && (
                                                                                    <div className="text-[10px] text-purple-500 mt-1 max-w-[160px] break-words">{item.interviewComment}</div>
                                                                                )}
                                                                            </React.Fragment>
                                                                        )}

                                                                        {/* Agency Confirmation Section */}
                                                                        {item.interviewDate && (
                                                                            <div className="mt-2 pt-2 border-t border-slate-100 w-full">
                                                                                <div className="text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1">ยืนยันการเข้าสัมภาษณ์</div>
                                                                                {confirmingId === item.id ? (
                                                                                    <div className="flex flex-col gap-1.5 w-full">
                                                                                        <div className="flex gap-1 justify-center">
                                                                                            {['ยืนยัน', 'ยกเลิก', 'อื่นๆ'].map(s => (
                                                                                                <button key={s} onClick={() => setConfirmFormData({ ...confirmFormData, status: s })}
                                                                                                    className={`text-[10px] font-bold px-2 py-1 rounded-md border transition-colors ${confirmFormData.status === s ?
                                                                                                        s === 'ยืนยัน' ? 'bg-emerald-500 text-white border-emerald-500' :
                                                                                                        s === 'ยกเลิก' ? 'bg-rose-500 text-white border-rose-500' :
                                                                                                        'bg-purple-500 text-white border-purple-500'
                                                                                                        : 'bg-white text-slate-500 border-slate-200 hover:border-slate-400'}`}>
                                                                                                    {s}
                                                                                                </button>
                                                                                            ))}
                                                                                        </div>
                                                                                        {confirmFormData.status === 'อื่นๆ' && (
                                                                                            <textarea value={confirmFormData.comment || ''} onChange={e => setConfirmFormData({ ...confirmFormData, comment: e.target.value })} placeholder="ระบุรายละเอียด เช่น เลื่อนวันสัมภาษณ์, เลื่อนเวลา..." className="modern-input text-[10px] resize-none" rows={2} />
                                                                                        )}
                                                                                        <div className="flex gap-1 justify-end">
                                                                                            <button onClick={() => { setConfirmingId(null); setConfirmFormData({ status: '', comment: '' }); }} className="text-[10px] px-2 py-1 rounded-md bg-slate-100 text-slate-500 hover:bg-slate-200 font-medium">ยกเลิก</button>
                                                                                            <button disabled={!confirmFormData.status} onClick={() => handleSaveConfirm(item.id)} className="text-[10px] px-2 py-1 rounded-md bg-indigo-500 text-white hover:bg-indigo-600 disabled:opacity-40 font-medium">บันทึก</button>
                                                                                        </div>
                                                                                    </div>
                                                                                ) : (
                                                                                    <div className="flex flex-col items-center gap-1">
                                                                                        {item.confirmStatus ? (
                                                                                            <React.Fragment>
                                                                                                <span className={`badge ${getConfirmStatusClass(item.confirmStatus)}`}>
                                                                                                    {item.confirmStatus === 'ยืนยัน' ? '✓ ยืนยันแล้ว' : item.confirmStatus === 'ยกเลิก' ? '✗ ยกเลิก' : 'อื่นๆ'}
                                                                                                </span>
                                                                                                {item.confirmStatus === 'อื่นๆ' && item.confirmComment && (
                                                                                                    <div className="text-[10px] text-purple-500 max-w-[160px] break-words text-center">{item.confirmComment}</div>
                                                                                                )}
                                                                                                {currentUserAgency !== 'Admin' && (
                                                                                                    <button onClick={() => { setConfirmingId(item.id); setConfirmFormData({ status: item.confirmStatus, comment: item.confirmComment || '' }); }} className="text-[9px] text-slate-400 hover:text-indigo-500 underline mt-0.5">แก้ไข</button>
                                                                                                )}
                                                                                            </React.Fragment>
                                                                                        ) : (
                                                                                            currentUserAgency !== 'Admin' ? (
                                                                                                <button onClick={() => { setConfirmingId(item.id); setConfirmFormData({ status: '', comment: '' }); }} className="text-[10px] font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 px-2 py-1 rounded-lg border border-indigo-200 transition-colors flex items-center gap-1 whitespace-nowrap">
                                                                                                    <i data-lucide="check-square" className="w-3 h-3"></i> ยืนยันสัมภาษณ์
                                                                                                </button>
                                                                                            ) : (
                                                                                                <span className="text-[10px] text-slate-300">- รอการยืนยัน -</span>
                                                                                            )
                                                                                        )}
                                                                                    </div>
                                                                                )}
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                )}
                                                            </td>

                                                            {/* COL 5: จัดการ */}
                                                            <td className="text-center">
                                                                <div className="flex justify-center gap-1.5">
                                                                    {currentUserAgency === 'Admin' ? (
                                                                        isEditing ? (
                                                                            <React.Fragment>
                                                                                <button onClick={() => handleSaveEdit(item.id)} className="text-emerald-600 bg-emerald-50 hover:bg-emerald-100 p-2 rounded-lg transition-colors border border-emerald-200" title="บันทึก"><i data-lucide="check" className="w-4 h-4"></i></button>
                                                                                <button onClick={() => setEditingId(null)} className="text-slate-500 bg-slate-100 hover:bg-slate-200 p-2 rounded-lg transition-colors border border-slate-200" title="ยกเลิก"><i data-lucide="x" className="w-4 h-4"></i></button>
                                                                            </React.Fragment>
                                                                        ) : (
                                                                            <React.Fragment>
                                                                                <button onClick={() => { setEditingId(item.id); setEditFormData(item); }} className="text-indigo-600 bg-indigo-50 hover:bg-indigo-100 p-2 rounded-lg transition-colors" title="แก้ไข"><i data-lucide="edit-2" className="w-4 h-4"></i></button>
                                                                                <button onClick={() => { 
                                                                                    setConfirmDialog({
                                                                                        title: "ยืนยันการลบ",
                                                                                        msg: "คุณแน่ใจหรือไม่ว่าต้องการลบข้อมูลรายชื่อนี้? การกระทำนี้ไม่สามารถย้อนกลับได้",
                                                                                        onConfirm: () => {
                                                                                            window.FB.methods.deleteDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id));
                                                                                            setConfirmDialog(null);
                                                                                        }
                                                                                    });
                                                                                }} className="text-rose-500 bg-rose-50 hover:bg-rose-100 p-2 rounded-lg transition-colors" title="ลบ"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                                            </React.Fragment>
                                                                        )
                                                                    ) : (
                                                                        <button onClick={() => { 
                                                                            setConfirmDialog({
                                                                                title: "ยืนยันการลบ",
                                                                                msg: "คุณแน่ใจหรือไม่ว่าต้องการลบข้อมูลรายชื่อนี้? การกระทำนี้ไม่สามารถย้อนกลับได้",
                                                                                onConfirm: () => {
                                                                                    window.FB.methods.deleteDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id));
                                                                                    setConfirmDialog(null);
                                                                                }
                                                                            });
                                                                        }} className="text-slate-300 hover:text-rose-500 hover:bg-rose-50 p-2 rounded-lg transition-colors active:scale-90" title="ลบ">
                                                                            <i data-lucide="trash-2" className="w-4 h-4 mx-auto"></i>
                                                                        </button>
                                                                    )}
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    );
                                                })
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-4 flex justify-between bg-white border-t border-slate-100 items-center">
                                    <button disabled={currentPage === 1} onClick={() => setCurrentPage(p => p - 1)} className="bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 hover:text-slate-900 px-5 py-2 rounded-xl text-[11px] font-bold uppercase transition-colors disabled:opacity-40 disabled:hover:bg-white flex items-center gap-1"><i data-lucide="chevron-left" className="w-4 h-4"></i> Prev</button>
                                    <span className="text-slate-400 text-xs font-medium">Page {currentPage} of {totalPages}</span>
                                    <button disabled={currentPage === totalPages || totalPages === 0} onClick={() => setCurrentPage(p => p + 1)} className="bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 hover:text-slate-900 px-5 py-2 rounded-xl text-[11px] font-bold uppercase transition-colors disabled:opacity-40 disabled:hover:bg-white flex items-center gap-1">Next <i data-lucide="chevron-right" className="w-4 h-4"></i></button>
                                </div>
                            </div>

                        </div>
                    </div>
                    {renderModals()}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
