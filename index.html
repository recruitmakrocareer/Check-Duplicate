<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Checker | Enterprise Cloud Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
        .table-container { min-height: 450px; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAX6alx5rJRDRd8Wcvj4rDLLsYwz37NXEQ",
            authDomain: "recruit-operation-project.firebaseapp.com",
            projectId: "recruit-operation-project",
            storageBucket: "recruit-operation-project.firebasestorage.app",
            messagingSenderId: "857023562077",
            appId: "1:857023562077:web:669da5cfc20cf7707e68b4",
            measurementId: "G-K3EC9MZ0JJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.FB = { 
            db, auth,
            methods: { signInAnonymously, onAuthStateChanged, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query }
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [currentUserAgency, setCurrentUserAgency] = useState('');
            const [loginEmail, setLoginEmail] = useState('');
            const [isLoading, setIsLoading] = useState(true);
            const [isSyncing, setIsSyncing] = useState(false);
            const [formData, setFormData] = useState({ recordDate: new Date().toISOString().split('T')[0], name: '', tel: '', email: '', position: '', location: '' });
            const [referenceDb, setReferenceDb] = useState([]); 
            const [cloudCandidates, setCloudCandidates] = useState([]); 
            const [positions, setPositions] = useState([]);
            const [locations, setLocations] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterAgency, setFilterAgency] = useState('');
            const [filterStatus, setFilterStatus] = useState('');
            const [popup, setPopup] = useState(null);
            const [confirm, setConfirm] = useState(null);

            // Fix for Lucide Icons + React Conflict
            useEffect(() => {
                const timeoutId = setTimeout(() => {
                    if (window.lucide) lucide.createIcons();
                }, 100);
                return () => clearTimeout(timeoutId);
            }, [currentUserAgency, isLoading, cloudCandidates, popup, confirm]);

            useEffect(() => {
                if (!window.FB) return;
                const { auth, methods } = window.FB;
                methods.signInAnonymously(auth).catch(console.error);
                return methods.onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) loadAllData();
                });
            }, []);

            const loadAllData = async () => {
                try {
                    const dbUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTsDZSCTRBCQ3LojqsCmVPea7qo7uB9VyXne9aZSlqxo8yntizND6o7bpRQfS2rFFHthMB-N0YIqTL6/pub?output=csv';
                    const locUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTsDZSCTRBCQ3LojqsCmVPea7qo7uB9VyXne9aZSlqxo8yntizND6o7bpRQfS2rFFHthMB-N0YIqTL6/pub?gid=1224535826&single=true&output=csv';
                    const [candRes, locRes] = await Promise.all([fetch(dbUrl).then(r => r.text()), fetch(locUrl).then(r => r.text())]);
                    
                    setReferenceDb(Papa.parse(candRes, { header: true }).data.filter(r => r['Name-Surname']).map(r => ({
                        name: (r['Name-Surname'] || '').trim(),
                        tel: r['Tel'] ? r['Tel'].toString().trim() : ''
                    })));

                    setPositions(["Sales Executive", "Section Manager - Bakery", "Section Manager - Butchery", "Section Manager - Frozen", "Section Manager - Dry Food", "Section Manager - HR", "Supervisor - Office Support"]);
                    setLocations(Papa.parse(locRes, { header: true }).data.map(r => r['Store_Name'] ? `${parseInt(r['Store_No'])}-${r['Store_Name']}` : '').filter(Boolean));
                    setIsLoading(false);
                } catch (e) {
                    console.error(e);
                    setIsLoading(false);
                }
            };

            useEffect(() => {
                if (!user || !currentUserAgency) return;
                setIsSyncing(true);
                const q = window.FB.methods.query(window.FB.methods.collection(window.FB.db, 'candidates'));
                return window.FB.methods.onSnapshot(q, (sn) => {
                    setCloudCandidates(sn.docs.map(d => ({ id: d.id, ...d.data() })));
                    setIsSyncing(false);
                });
            }, [user, currentUserAgency]);

            const handleLogin = (e) => {
                e.preventDefault();
                const accessMap = { "admin@company.com": "Admin", "manpower@agency.com": "Manpower", "metalent@agency.com": "Me Talent", "prtr@agency.com": "PRTR", "talentvis@agency.com": "Talentvis", "techgrid@agency.com": "Techgrid" };
                const agency = accessMap[loginEmail.trim().toLowerCase()];
                if (agency) setCurrentUserAgency(agency);
                else setPopup({ title: "ล้มเหลว", msg: "ไม่พบอีเมลในระบบ" });
            };

            const handleAdd = async (e) => {
                e.preventDefault();
                const normalize = (s) => s ? s.toString().toLowerCase().replace(/[^a-z0-9ก-ฮ]/g, '') : '';
                const isDup = [...referenceDb, ...cloudCandidates].some(c => normalize(c.name) === normalize(formData.name) || normalize(c.tel) === normalize(formData.tel));
                if (isDup) return setPopup({ title: "พบข้อมูลซ้ำ!", msg: "ชื่อหรือเบอร์โทรนี้มีในระบบแล้ว" });

                try {
                    await window.FB.methods.addDoc(window.FB.methods.collection(window.FB.db, 'candidates'), { ...formData, agency: currentUserAgency, prescreenStatus: 'Pending', interviewDate: '', interviewStatus: '', createdAt: Date.now() });
                    setFormData({ ...formData, name: '', tel: '', email: '' });
                    setPopup({ title: "สำเร็จ", msg: "บันทึกรายชื่อเรียบร้อย" });
                } catch (e) { setPopup({ title: "Error", msg: "ไม่สามารถเขียนข้อมูลลง Firestore ได้" }); }
            };

            const filteredItems = useMemo(() => {
                return cloudCandidates.filter(item => {
                    if (currentUserAgency !== 'Admin' && item.agency !== currentUserAgency) return false;
                    const search = searchTerm.toLowerCase();
                    return (!searchTerm || item.name.toLowerCase().includes(search) || item.tel.includes(search)) && (!filterStatus || item.prescreenStatus === filterStatus);
                }).sort((a, b) => b.createdAt - a.createdAt);
            }, [cloudCandidates, currentUserAgency, searchTerm, filterStatus]);

            if (isLoading) return <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white"><div className="loader scale-150 mb-6"></div><p className="font-bold">CONNECTING CLOUD...</p></div>;

            if (!currentUserAgency) return (
                <div className="h-screen flex items-center justify-center bg-slate-950 relative">
                    <div className="glass-morphism w-full max-w-md rounded-[3rem] p-12 shadow-2xl z-10 text-center">
                        <div className="bg-indigo-600 w-20 h-20 rounded-[1.5rem] flex items-center justify-center text-white mx-auto mb-6"><i data-lucide="shield-check" className="w-10 h-10"></i></div>
                        <h1 className="text-3xl font-black mb-10 text-slate-800">HR ACCESS</h1>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="email" value={loginEmail} onChange={e => setLoginEmail(e.target.value)} className="w-full bg-white border-2 p-5 rounded-2xl text-center font-bold" placeholder="name@agency.com" required />
                            <button className="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-lg">LOGIN</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-10 max-w-[1600px] mx-auto">
                    <div className="bg-white rounded-[2rem] p-6 shadow-xl flex items-center justify-between mb-8">
                        <div className="flex items-center gap-4">
                            <div className="bg-slate-900 p-4 rounded-2xl text-white"><i data-lucide="user-check"></i></div>
                            <h1 className="text-2xl font-black uppercase">{currentUserAgency} SESSION</h1>
                        </div>
                        <button onClick={() => setCurrentUserAgency('')} className="text-rose-600 font-bold p-4 bg-rose-50 rounded-2xl"><i data-lucide="power"></i></button>
                    </div>

                    <div className="grid grid-cols-1 xl:grid-cols-4 gap-8">
                        {currentUserAgency !== 'Admin' && (
                            <div className="xl:col-span-1 bg-white p-8 rounded-[2rem] shadow-lg h-fit">
                                <h2 className="text-xl font-bold mb-6 flex gap-2"><i data-lucide="plus-circle" className="text-indigo-600"></i>เพิ่มรายชื่อ</h2>
                                <form onSubmit={handleAdd} className="space-y-4">
                                    <input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} placeholder="ชื่อ-นามสกุล" className="w-full bg-slate-50 p-4 rounded-xl border-none font-bold" required />
                                    <input type="text" value={formData.tel} onChange={e => setFormData({...formData, tel: e.target.value})} placeholder="เบอร์โทร" className="w-full bg-slate-50 p-4 rounded-xl border-none font-bold" required />
                                    <input type="email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} placeholder="อีเมล" className="w-full bg-slate-50 p-4 rounded-xl border-none font-bold" required />
                                    <select value={formData.position} onChange={e => setFormData({...formData, position: e.target.value})} className="w-full bg-slate-50 p-4 rounded-xl font-bold" required>
                                        <option value="">เลือกตำแหน่ง</option>{positions.map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                    <select value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} className="w-full bg-slate-50 p-4 rounded-xl font-bold" required>
                                        <option value="">เลือกสาขา</option>{locations.map(l => <option key={l} value={l}>{l}</option>)}
                                    </select>
                                    <button className="w-full bg-slate-900 text-white py-4 rounded-xl font-bold mt-4 shadow-lg hover:bg-black">บันทึกข้อมูล</button>
                                </form>
                            </div>
                        )}
                        <div className={currentUserAgency === 'Admin' ? 'col-span-4' : 'xl:col-span-3'}>
                            <div className="bg-white p-6 rounded-[2rem] shadow-lg mb-6 flex gap-4">
                                <div className="flex-1 relative"><i data-lucide="search" className="absolute left-4 top-4 text-slate-300"></i><input type="text" placeholder="ค้นหาชื่อหรือเบอร์โทร..." className="w-full bg-slate-50 pl-12 p-4 rounded-xl font-bold" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} /></div>
                            </div>
                            <div className="bg-white rounded-[2rem] shadow-xl overflow-hidden border">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-900 text-white text-[11px] uppercase tracking-widest">
                                        <tr><th className="p-6">ข้อมูลผู้สมัคร</th><th className="p-6">ตำแหน่ง/สาขา</th>{currentUserAgency === 'Admin' && <th className="p-6">Agency</th>}<th className="p-6 text-center">Prescreen</th><th className="p-6 text-center">Interview</th><th className="p-6"></th></tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        {filteredItems.map(item => (
                                            <tr key={item.id} className="hover:bg-slate-50">
                                                <td className="p-6">
                                                    <div className="font-black text-slate-800 text-lg">{item.name}</div>
                                                    <div className="text-slate-400 text-xs">{item.tel} | {item.email}</div>
                                                </td>
                                                <td className="p-6">
                                                    <div className="text-indigo-600 font-bold text-xs uppercase">{item.position}</div>
                                                    <div className="text-slate-400 text-[10px]">{item.location}</div>
                                                </td>
                                                {currentUserAgency === 'Admin' && <td className="p-6 font-bold text-xs">{item.agency}</td>}
                                                <td className="p-6 text-center">
                                                    {currentUserAgency === 'Admin' ? (
                                                        <select value={item.prescreenStatus} onChange={e => window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id), { prescreenStatus: e.target.value })} className="p-2 border rounded-xl font-bold text-xs">
                                                            <option value="Pending">Pending</option><option value="ผ่าน">ผ่าน</option><option value="ไม่ผ่าน">ไม่ผ่าน</option>
                                                        </select>
                                                    ) : <span className={`px-3 py-1 rounded-full text-[10px] font-bold ${item.prescreenStatus === 'ผ่าน' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-400'}`}>{item.prescreenStatus}</span>}
                                                </td>
                                                <td className="p-6 text-center">
                                                    <div className="text-[10px] font-bold">{item.interviewDate || '-'}</div>
                                                    <div className="text-indigo-500 font-bold text-[10px]">{item.interviewStatus || 'N/A'}</div>
                                                </td>
                                                <td className="p-6 text-right">
                                                    <button onClick={() => { if(confirm("ลบข้อมูล?")) window.FB.methods.deleteDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id)) }} className="text-rose-300 hover:text-rose-600"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {popup && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-50 p-6">
                            <div className="bg-white p-10 rounded-[2rem] max-w-sm w-full text-center shadow-2xl">
                                <h3 className="text-2xl font-black mb-4">{popup.title}</h3>
                                <p className="text-slate-500 font-bold mb-8">{popup.msg}</p>
                                <button onClick={() => setPopup(null)} className="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">ปิดหน้าต่าง</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
