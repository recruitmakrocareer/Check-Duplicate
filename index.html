<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Checker | Enterprise Cloud Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        input, select { border: 1px solid #e2e8f0 !important; }
        th { white-space: nowrap; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAX6alx5rJRDRd8Wcvj4rDLLsYwz37NXEQ",
            authDomain: "recruit-operation-project.firebaseapp.com",
            projectId: "recruit-operation-project",
            storageBucket: "recruit-operation-project.firebasestorage.app",
            messagingSenderId: "857023562077",
            appId: "1:857023562077:web:669da5cfc20cf7707e68b4",
            measurementId: "G-K3EC9MZ0JJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.FB = { 
            db, auth, storage,
            methods: { signInAnonymously, onAuthStateChanged, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query },
            storageMethods: { ref, uploadBytes, getDownloadURL }
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [currentUserAgency, setCurrentUserAgency] = useState('');
            const [loginEmail, setLoginEmail] = useState('');
            const [isLoading, setIsLoading] = useState(true);
            const [cloudCandidates, setCloudCandidates] = useState([]);
            const [referenceDb, setReferenceDb] = useState([]);
            const fileInputRef = useRef(null);
            const [uploadingCandidateId, setUploadingCandidateId] = useState(null);
            
            const [formData, setFormData] = useState({ 
                submissionDate: new Date().toISOString().split('T')[0], 
                name: '', 
                tel: '', 
                email: '', 
                position: '', 
                location: '',
                resumeLink: ''
            });

            const [searchTerm, setSearchTerm] = useState('');
            const [popup, setPopup] = useState(null);

            const refreshIcons = useCallback(() => {
                if (window.lucide) {
                    setTimeout(() => lucide.createIcons(), 100);
                }
            }, []);

            useEffect(() => {
                if (!window.FB) return;
                const { auth, methods } = window.FB;
                methods.signInAnonymously(auth).catch(console.error);
                const unsubscribe = methods.onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    loadStaticData();
                });
                return () => unsubscribe();
            }, []);

            const loadStaticData = async () => {
                try {
                    const dbUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTsDZSCTRBCQ3LojqsCmVPea7qo7uB9VyXne9aZSlqxo8yntizND6o7bpRQfS2rFFHthMB-N0YIqTL6/pub?output=csv';
                    const res = await fetch(dbUrl).then(r => r.text());
                    const data = Papa.parse(res, { header: true }).data;
                    setReferenceDb(data.filter(r => r['Name-Surname']).map(r => ({
                        name: (r['Name-Surname'] || '').trim(),
                        tel: r['Tel'] ? r['Tel'].toString().trim() : ''
                    })));
                    setIsLoading(false);
                } catch (e) {
                    setIsLoading(false);
                }
            };

            useEffect(() => {
                if (!user || !currentUserAgency) return;
                const { db, methods } = window.FB;
                const q = methods.query(methods.collection(db, 'candidates'));
                const unsubscribe = methods.onSnapshot(q, (sn) => {
                    setCloudCandidates(sn.docs.map(d => ({ id: d.id, ...d.data() })));
                    refreshIcons();
                });
                return () => unsubscribe();
            }, [user, currentUserAgency, refreshIcons]);

            const handleLogin = (e) => {
                e.preventDefault();
                const accessMap = { 
                    "admin@company.com": "Admin", 
                    "manpower@agency.com": "Manpower", "metalent@agency.com": "Me Talent", 
                    "prtr@agency.com": "PRTR", "talentvis@agency.com": "Talentvis", "techgrid@agency.com": "Techgrid" 
                };
                const agency = accessMap[loginEmail.trim().toLowerCase()];
                if (agency) setCurrentUserAgency(agency);
                else setPopup({ title: "ล้มเหลว", msg: "ไม่พบอีเมลนี้ในระบบ" });
            };

            const normalize = (s) => s ? s.toString().toLowerCase().replace(/[^a-z0-9ก-ฮ]/g, '') : '';

            const handleAdd = async (e) => {
                e.preventDefault();
                const isDup = [...referenceDb, ...cloudCandidates].some(c => normalize(c.name) === normalize(formData.name) || normalize(c.tel) === normalize(formData.tel));
                
                if (isDup) return setPopup({ title: "พบข้อมูลซ้ำ!", msg: "รายชื่อนี้มีในระบบแล้ว" });

                try {
                    await window.FB.methods.addDoc(window.FB.methods.collection(window.FB.db, 'candidates'), {
                        ...formData,
                        agency: currentUserAgency,
                        prescreenStatus: 'รอตรวจสอบ',
                        interviewDate: '',
                        interviewStatus: 'รอผล',
                        createdAt: Date.now()
                    });
                    setFormData({ ...formData, name: '', tel: '', email: '', resumeLink: '' });
                    setPopup({ title: "สำเร็จ", msg: "บันทึกข้อมูลเรียบร้อย" });
                } catch (e) {
                    setPopup({ title: "Error", msg: "บันทึกไม่ได้ กรุณาเช็ค Firestore Rules" });
                }
            };

            const handleUpdate = async (id, field, value) => {
                try {
                    await window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', id), { [field]: value });
                } catch (e) { console.error(e); }
            };

            const handleUploadResume = async (id) => {
                setUploadingCandidateId(id);
                fileInputRef.current.click();
            };

            const onFileChange = async (event) => {
                const file = event.target.files[0];
                if (!file || !uploadingCandidateId) return;

                if (file.type !== 'application/pdf') {
                    setPopup({ title: "Error", msg: "กรุณาอัปโหลดไฟล์ในรูปแบบ PDF เท่านั้น" });
                    return;
                }

                if (file.size > 5 * 1024 * 1024) { // 5MB
                    setPopup({ title: "Error", msg: "ไฟล์ PDF มีขนาดใหญ่เกินกว่า 5MB" });
                    return;
                }

                const { storage, storageMethods } = window.FB;
                const storageRef = storageMethods.ref(storage, `resumes/${uploadingCandidateId}/${file.name}`);

                try {
                    await storageMethods.uploadBytes(storageRef, file);
                    const resumeUrl = await storageMethods.getDownloadURL(storageRef);
                    await handleUpdate(uploadingCandidateId, 'resumeLink', resumeUrl);
                    setPopup({ title: "สำเร็จ", msg: "อัปโหลด Resume เรียบร้อยแล้ว" });
                } catch (error) {
                    console.error("Upload failed", error);
                    setPopup({ title: "Error", msg: "การอัปโหลดไฟล์ล้มเหลว กรุณาลองใหม่อีกครั้ง" });
                } finally {
                    setUploadingCandidateId(null);
                    event.target.value = null; // Reset input
                }
            };

            const filteredItems = useMemo(() => {
                return cloudCandidates.filter(item => {
                    if (currentUserAgency !== 'Admin' && item.agency !== currentUserAgency) return false;
                    const search = searchTerm.toLowerCase();
                    return !searchTerm || item.name.toLowerCase().includes(search) || item.tel.includes(search);
                }).sort((a, b) => b.createdAt - a.createdAt);
            }, [cloudCandidates, currentUserAgency, searchTerm]);

            if (isLoading) return <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white"><div className="loader scale-150 mb-6"></div><p className="font-bold">กำลังเชื่อมต่อฐานข้อมูล...</p></div>;

            if (!currentUserAgency) return (
                <div key="login" className="h-screen flex items-center justify-center bg-slate-950 relative p-6">
                    <div className="glass-morphism w-full max-w-md rounded-[2.5rem] p-12 shadow-2xl z-10 text-center">
                        <div className="bg-indigo-600 w-20 h-20 rounded-3xl flex items-center justify-center text-white mx-auto mb-6"><i data-lucide="shield-check" className="w-10 h-10"></i></div>
                        <h1 className="text-3xl font-black mb-8 text-slate-800">RECRUIT SYSTEM</h1>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="email" value={loginEmail} onChange={e => setLoginEmail(e.target.value)} className="w-full bg-white p-5 rounded-2xl text-center font-bold outline-none" placeholder="name@agency.com" required />
                            <button className="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-lg hover:bg-indigo-700 transition-all active:scale-95 uppercase">Login to Cloud</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div key="dashboard" className="min-h-screen p-4 md:p-8 max-w-[1700px] mx-auto">
                    {/* Hidden File Input */}
                    <input type="file" accept=".pdf" ref={fileInputRef} onChange={onFileChange} style={{ display: 'none' }} />
                    
                    {/* Header */}
                    <div className="bg-white rounded-[2rem] p-6 shadow-xl flex items-center justify-between mb-8 border border-white">
                        <div className="flex items-center gap-4">
                            <div className="bg-slate-900 p-4 rounded-2xl text-white shadow-lg"><i data-lucide="layout-dashboard"></i></div>
                            <div>
                                <h1 className="text-2xl font-black uppercase text-slate-800">{currentUserAgency} SESSION</h1>
                                <p className="text-[10px] text-emerald-500 font-bold tracking-widest">• ONLINE REAL-TIME DATABASE</p>
                            </div>
                        </div>
                        <button onClick={() => { setCurrentUserAgency(''); refreshIcons(); }} className="bg-rose-50 text-rose-600 p-4 rounded-2xl hover:bg-rose-600 hover:text-white transition-all shadow-md"><i data-lucide="power"></i></button>
                    </div>

                    <div className="grid grid-cols-1 xl:grid-cols-12 gap-8">
                        {/* Sidebar: Form (เฉพาะ Agency) */}
                        {currentUserAgency !== 'Admin' && (
                            <div className="xl:col-span-3">
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-xl sticky top-8 border border-white">
                                    <h2 className="text-xl font-black mb-6 flex gap-3 items-center text-slate-800"><i data-lucide="user-plus" className="text-indigo-600"></i> เพิ่มข้อมูลผู้สมัคร</h2>
                                    <form onSubmit={handleAdd} className="space-y-4">
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">วันที่ส่งผู้สมัคร</label>
                                            <input type="date" value={formData.submissionDate} onChange={e => setFormData({...formData, submissionDate: e.target.value})} className="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none focus:border-indigo-500" required />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">ชื่อ-นามสกุล (Thai)</label>
                                            <input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} placeholder="สมชาย ใจดี" className="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none" required />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">เบอร์โทรศัพท์</label>
                                            <input type="text" value={formData.tel} onChange={e => setFormData({...formData, tel: e.target.value})} placeholder="08XXXXXXXX" className="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none" required />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">ตำแหน่งงาน</label>
                                            <select value={formData.position} onChange={e => setFormData({...formData, position: e.target.value})} className="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none" required>
                                                <option value="">เลือกตำแหน่ง...</option>
                                                <option value="Sales Executive">Sales Executive</option>
                                                <option value="Section Manager">Section Manager</option>
                                                <option value="Supervisor">Supervisor</option>
                                                <option value="Office Support">Office Support</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">สาขา / Branch</label>
                                            <input type="text" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} placeholder="เช่น สาขานนทบุรี" className="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none" required />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">ลิงก์ Resume (Google Drive/etc.)</label>
                                            <input type="url" value={formData.resumeLink} onChange={e => setFormData({...formData, resumeLink: e.target.value})} placeholder="https://..." className="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none" />
                                        </div>
                                        <button className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black mt-4 shadow-lg hover:bg-black transition-all active:scale-95 uppercase tracking-widest text-sm">Submit Entry</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* Main Content: Table */}
                        <div className={currentUserAgency === 'Admin' ? 'xl:col-span-12' : 'xl:col-span-9'}>
                            <div className="bg-white p-5 rounded-[2rem] shadow-lg mb-6 flex gap-4 border border-white">
                                <div className="flex-1 relative">
                                    <i data-lucide="search" className="absolute left-4 top-4 text-slate-300"></i>
                                    <input type="text" placeholder="ค้นหาชื่อ หรือ เบอร์โทรศัพท์..." className="w-full bg-slate-50 pl-12 p-4 rounded-2xl font-bold outline-none focus:bg-white transition-all" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                </div>
                            </div>

                            <div className="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-white">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-950 text-white text-[10px] font-black uppercase tracking-[0.15em]">
                                            <tr>
                                                <th className="p-6">1. วันที่ส่ง</th>
                                                <th className="p-6">2. ชื่อ-นามสกุล</th>
                                                <th className="p-6">3. เบอร์โทร</th>
                                                <th className="p-6">4. ตำแหน่ง</th>
                                                <th className="p-6">5. สาขา</th>
                                                <th className="p-6 text-center">6. ตรวจสอบข้อมูล</th>
                                                <th className="p-6 text-center">7. Resume</th>
                                                <th className="p-6 text-center">8. วันที่สัมภาษณ์</th>
                                                <th className="p-6 text-center">9. ผลสัมภาษณ์</th>
                                                <th className="p-6 text-center">10. จัดการ</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {filteredItems.map(item => {
                                                const noDupStatus = item.prescreenStatus === 'ผ่าน' || normalize(item.prescreenStatus) === normalize('NoDup');
                                                
                                                return (
                                                    <tr key={item.id} className={`${noDupStatus ? 'bg-emerald-50/50' : 'hover:bg-indigo-50/30'} transition-colors group`}>
                                                        <td className="p-6 font-bold text-slate-500 text-xs">{item.submissionDate}</td>
                                                        <td className="p-6 font-black text-slate-800">
                                                            <div>{item.name}</div>
                                                            {noDupStatus && (
                                                                <button onClick={() => handleUploadResume(item.id)} className="flex items-center gap-1.5 bg-emerald-100 text-emerald-700 px-3 py-1 rounded-lg font-black text-[10px] mt-1 hover:bg-emerald-200 transition-all">
                                                                    <i data-lucide="upload-cloud" className="w-3.5 h-3.5"></i> {uploadingCandidateId === item.id ? 'กำลังอัปโหลด...' : 'Upload CV (PDF)'}
                                                                </button>
                                                            )}
                                                        </td>
                                                        <td className="p-6 font-bold text-slate-500 text-xs">{item.tel}</td>
                                                        <td className="p-6">
                                                            <span className="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg font-black text-[10px]">{item.position}</span>
                                                        </td>
                                                        <td className="p-6 font-bold text-slate-600 text-xs">{item.location}</td>
                                                        
                                                        {/* 6. สถานะตรวจสอบ (Admin แก้ได้) */}
                                                        <td className="p-6 text-center">
                                                            {currentUserAgency === 'Admin' ? (
                                                                <select value={item.prescreenStatus} onChange={e => handleUpdate(item.id, 'prescreenStatus', e.target.value)} className="p-2 border rounded-xl font-bold text-[10px] outline-none bg-white shadow-sm">
                                                                    <option value="รอตรวจสอบ">รอตรวจสอบ</option>
                                                                    <option value="ผ่าน">ผ่าน/NoDup</option>
                                                                    <option value="ไม่ผ่าน">ไม่ผ่าน</option>
                                                                </select>
                                                            ) : (
                                                                <span className={`px-4 py-1.5 rounded-full text-[10px] font-black ${item.prescreenStatus === 'ผ่าน' ? 'bg-emerald-100 text-emerald-600' : item.prescreenStatus === 'ไม่ผ่าน' ? 'bg-rose-100 text-rose-600' : 'bg-slate-100 text-slate-400'}`}>
                                                                    {item.prescreenStatus === 'ผ่าน' ? 'NoDup' : item.prescreenStatus}
                                                                </span>
                                                            )}
                                                        </td>

                                                        {/* 7. Resume */}
                                                        <td className="p-6 text-center">
                                                            {item.resumeLink ? (
                                                                <a href={item.resumeLink} target="_blank" className="text-indigo-500 hover:text-indigo-700 inline-block p-2 bg-indigo-50 rounded-xl transition-all">
                                                                    <i data-lucide="external-link" className="w-5 h-5"></i>
                                                                </a>
                                                            ) : <span className="text-slate-300 text-[10px] font-bold">N/A</span>}
                                                        </td>

                                                        {/* 8. วันสัมภาษณ์ (Admin แก้ได้) */}
                                                        <td className="p-6 text-center">
                                                            {currentUserAgency === 'Admin' ? (
                                                                <input type="date" value={item.interviewDate || ''} onChange={e => handleUpdate(item.id, 'interviewDate', e.target.value)} className="p-2 border rounded-xl font-bold text-[10px] outline-none" />
                                                            ) : <span className="text-[10px] font-black text-slate-600">{item.interviewDate || '-'}</span>}
                                                        </td>

                                                        {/* 9. ผลสัมภาษณ์ (Admin แก้ได้) */}
                                                        <td className="p-6 text-center">
                                                            {currentUserAgency === 'Admin' ? (
                                                                <select value={item.interviewStatus} onChange={e => handleUpdate(item.id, 'interviewStatus', e.target.value)} className="p-2 border rounded-xl font-bold text-[10px] outline-none bg-white shadow-sm">
                                                                    <option value="รอผล">รอผล</option>
                                                                    <option value="ผ่าน">ผ่าน</option>
                                                                    <option value="ไม่ผ่าน">ไม่ผ่าน</option>
                                                                    <option value="สละสิทธิ์">สละสิทธิ์</option>
                                                                </select>
                                                            ) : (
                                                                <span className={`px-4 py-1.5 rounded-full text-[10px] font-black ${item.interviewStatus === 'ผ่าน' ? 'bg-emerald-500 text-white shadow-md' : 'text-slate-500 bg-slate-100'}`}>
                                                                    {item.interviewStatus}
                                                                </span>
                                                            )}
                                                        </td>

                                                        {/* 10. จัดการ */}
                                                        <td className="p-6 text-right">
                                                            <div className="flex gap-2 justify-center opacity-0 group-hover:opacity-100 transition-all">
                                                                <button onClick={() => { if(confirm("ต้องการลบข้อมูลถาวร?")) window.FB.methods.deleteDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id)) }} className="bg-rose-50 text-rose-600 p-3 rounded-xl hover:bg-rose-600 hover:text-white shadow-sm">
                                                                    <i data-lucide="trash-2" className="w-5 h-5"></i>
                                                                </button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Popup Modal */}
                    {popup && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-md flex items-center justify-center z-[100] p-6">
                            <div className="bg-white p-10 rounded-[3rem] max-w-sm w-full text-center shadow-2xl border-t-8 border-indigo-500">
                                <h3 className="text-2xl font-black mb-4 text-slate-800">{popup.title}</h3>
                                <p className="text-slate-500 font-bold mb-8 leading-relaxed">{popup.msg}</p>
                                <button onClick={() => setPopup(null)} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all uppercase tracking-widest text-xs">Close</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
