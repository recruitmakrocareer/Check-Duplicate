<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruit Master System | Stable Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; font-size: 13px; }
        th { white-space: nowrap; font-size: 10px !important; padding: 10px 4px !important; background-color: #0f172a; color: white; border: 1px solid #334155; text-align: center; }
        td { font-size: 11.5px !important; padding: 8px 4px !important; border-bottom: 1px solid #e2e8f0; text-align: center; vertical-align: middle; }
        .sidebar-container { width: 320px; flex-shrink: 0; }
        .compact-filter-bar { display: grid; grid-template-columns: repeat(6, 1fr) 70px; gap: 6px; background: white; padding: 10px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 16px; align-items: end; }
        .filter-item { display: flex; flex-direction: column; gap: 1px; }
        .filter-label { font-size: 9px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-left: 2px; }
        .filter-input { width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; padding: 4px 8px; font-size: 11px; font-weight: 600; background: #f8fafc; outline: none; }
        .admin-edit { width: 100%; font-size: 10.5px; padding: 3px; border-radius: 4px; border: 1px solid #e2e8f0; font-weight: bold; background: #fff; }
        .popup-animate { animation: scaleIn 0.3s ease-out; }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAX6alx5rJRDRd8Wcvj4rDLLsYwz37NXEQ",
            authDomain: "recruit-operation-project.firebaseapp.com",
            projectId: "recruit-operation-project",
            storageBucket: "recruit-operation-project.firebasestorage.app",
            messagingSenderId: "857023562077",
            appId: "1:857023562077:web:669da5cfc20cf7707e68b4"
        };
        const app = initializeApp(firebaseConfig);
        window.FB = { db: getFirestore(app), auth: getAuth(app), methods: { signInAnonymously, onAuthStateChanged, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, writeBatch } };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const App = () => {
            const scriptURL = "https://script.google.com/macros/s/AKfycbyHSv_7wt3jlYJQWVlnE5GF06y3tgf-FLcyz6AQDnNoBtIs0PqfCVw5AM_SYlSNxJHYhg/exec";
            const manpowerCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSxq53q5Vk4M8Pl198a5N1znINRlUqpbB4E8ZFBVE_GYTWX9qwuHSIljFlImhM110x0d2XeER8A28up/pub?output=csv";

            const [user, setUser] = useState(null);
            const [currentUserAgency, setCurrentUserAgency] = useState('');
            const [loginEmail, setLoginEmail] = useState('');
            const [isLoading, setIsLoading] = useState(true);
            const [cloudCandidates, setCloudCandidates] = useState([]);
            const [referenceDb, setReferenceDb] = useState([]);
            const [gmailDb, setGmailDb] = useState([]); 
            
            // 🚩 ตรึงตำแหน่งงานเริ่มต้น
            const [positions, setPositions] = useState(["Sales Executive", "Section Manager - Bakery", "Section Manager - Butchery", "Section Manager - Frozen", "Section Manager - Dry Food 1", "Section Manager - Dry Food 2", "Section Manager - F&V", "Section Manager - Non Food 1", "Section Manager - Non Fresh", "Section Manager - Fish", "Section Manager - GA", "Section Manager - GR", "Section Manager - HR", "Supervisor - Office Support"]);
            
            // 🚩 ฝังข้อมูลสาขาจากไฟล์ Manpower_Status ที่คุณส่งมาให้แล้ว (เพื่อให้มาครบแน่นอน)
            const [locations, setLocations] = useState([
                "1-Lardprao", "351-Sinopark Branch", "352-Patthanakarn Branch", "353-Phahonyothin Branch", 
                "354-Ratchadaphisek", "355-Viphavadi", "356-Ram Inthra", "357-Nawamin", "358-Saphan Mai"
            ]);

            const [draftList, setDraftList] = useState([]);
            const [isChecked, setIsChecked] = useState(false);
            const [currentPage, setCurrentPage] = useState(1);
            const itemsPerPage = 50;

            const [filters, setFilters] = useState({ name: '', subDate: '', status: '', pos: '', intDate: '', intResult: '' });
            const [popup, setPopup] = useState(null);
            const [isUploading, setIsUploading] = useState(null);
            const [targetId, setTargetId] = useState(null);
            const fileInputRef = useRef(null);

            const [formData, setFormData] = useState({ submissionDate: new Date().toISOString().split('T')[0], firstName: '', lastName: '', tel: '', email: '', position: '', location: '' });

            const normalize = (s) => s ? s.toString().toLowerCase().replace(/[^a-z0-9ก-ฮ]/g, '').trim() : '';
            const getDownloadLink = (url) => { if (!url) return "#"; const fileId = url.match(/[-\w]{25,}/); return fileId ? `https://drive.google.com/uc?id=${fileId[0]}&export=download` : url; };

            useEffect(() => {
                if (!window.FB) return;
                window.FB.methods.signInAnonymously(window.FB.auth);
                window.FB.methods.onAuthStateChanged(window.FB.auth, (u) => {
                    setUser(u);
                    // Load Blacklist
                    fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vTsDZSCTRBCQ3LojqsCmVPea7qo7uB9VyXne9aZSlqxo8yntizND6o7bpRQfS2rFFHthMB-N0YIqTL6/pub?output=csv')
                    .then(r => r.text()).then(res => {
                        const data = Papa.parse(res, { header: true }).data;
                        setReferenceDb(data.filter(r => r['Name-Surname']).map(r => ({ name: (r['Name-Surname']||'').trim(), tel: (r['Tel']||'').trim(), email: (r['Email']||'').trim() })));
                        return fetch(manpowerCSV);
                    }).then(r => r.text()).then(res => {
                        // 🚩 Logic การดึงข้อมูลสาขาแบบยืดหยุ่น (ลองหา Store_No และ Store_Name)
                        const parsed = Papa.parse(res, { header: true }).data; 
                        const locList = parsed.map(row => {
                            const code = row['Store_No'] || row[Object.keys(row)[0]];
                            const name = row['Store_Name'] || row[Object.keys(row)[1]];
                            return (code && name && String(code).match(/^\d+$/)) ? `${code}-${name}`.trim() : null;
                        }).filter(l => l);
                        
                        if(locList.length > 0) {
                            const uniqueLocs = [...new Set(locList)].sort((a,b) => parseInt(a) - parseInt(b));
                            setLocations(uniqueLocs);
                        }

                        return fetch(scriptURL + "?action=getGmail");
                    }).then(r => r.json()).then(emails => { 
                        setGmailDb(emails); setIsLoading(false); 
                        if(window.lucide) setTimeout(() => lucide.createIcons(), 100); 
                    }).catch(() => setIsLoading(false));
                });
            }, []);

            useEffect(() => {
                if (!user || !currentUserAgency) return;
                const q = window.FB.methods.query(window.FB.methods.collection(window.FB.db, 'candidates'));
                return window.FB.methods.onSnapshot(q, (sn) => { setCloudCandidates(sn.docs.map(d => ({ id: d.id, ...d.data() }))); setTimeout(() => lucide.createIcons(), 100); });
            }, [user, currentUserAgency]);

            const allFiltered = useMemo(() => {
                return cloudCandidates.filter(item => {
                    if (currentUserAgency !== 'Admin' && item.agency !== currentUserAgency) return false;
                    const fullName = normalize((item.firstName || '') + (item.lastName || '') + (item.name || ''));
                    const matchName = fullName.includes(normalize(filters.name));
                    const matchSubDate = !filters.subDate || item.submissionDate === filters.subDate;
                    const matchStatus = !filters.status || item.prescreenStatus === filters.status;
                    const matchPos = !filters.pos || item.position === filters.pos;
                    const matchIntDate = !filters.intDate || item.interviewDate === filters.intDate;
                    const matchIntResult = !filters.intResult || item.interviewStatus === filters.intResult;
                    return matchName && matchSubDate && matchStatus && matchPos && matchIntDate && matchIntResult;
                }).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            }, [cloudCandidates, currentUserAgency, filters]);

            const totalPages = Math.max(1, Math.ceil(allFiltered.length / itemsPerPage));
            const paginatedItems = allFiltered.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

            const handleBulkCheck = () => {
                const updated = draftList.map((item) => {
                    const email = item.email.toLowerCase().trim();
                    const isDupExt = [...referenceDb, ...cloudCandidates].some(c => normalize((c.firstName||'')+(c.lastName||'')) === normalize(item.firstName+item.lastName) || normalize(c.tel) === normalize(item.tel) || (email && normalize(c.email) === email));
                    const isDupGmail = gmailDb.includes(email);
                    let status = isDupExt ? 'Dup' : (isDupGmail ? 'Dup (Gmail)' : 'No Dup');
                    return { ...item, status };
                });
                setDraftList(updated); setIsChecked(true);
            };

            const onFileChange = async (e) => {
                const file = e.target.files[0]; if (!file || !targetId) return;
                setIsUploading(targetId);
                const reader = new FileReader();
                reader.onload = async (f) => {
                    const base64 = f.target.result.split(',')[1];
                    try {
                        const response = await fetch(scriptURL, { method: "POST", body: JSON.stringify({ fileData: base64, mimeType: file.type, fileName: file.name }) });
                        const res = await response.json();
                        if (res.status === "success") {
                            await window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', targetId), { resumeLink: res.url });
                            setPopup({ title: "SUCCESS", msg: `อัปโหลดไฟล์สำเร็จ!` });
                        }
                    } finally { setIsUploading(null); setTargetId(null); e.target.value = ''; }
                };
                reader.readAsDataURL(file);
            };

            if (isLoading) return <div className="h-screen flex items-center justify-center font-black">SYNCING...</div>;

            if (!currentUserAgency) return (
                <div className="h-screen flex items-center justify-center bg-slate-900 text-center">
                    <form onSubmit={(e) => {
                        e.preventDefault();
                        const map = { "admin@company.com": "Admin", "manpower@agency.com": "Manpower", "metalent@agency.com": "Me Talent", "prtr@agency.com": "PRTR", "talentvis@agency.com": "Talentvis", "techgrid@agency.com": "Techgrid" };
                        const agency = map[loginEmail.trim().toLowerCase()];
                        if (agency) setCurrentUserAgency(agency); else alert("Login Failed");
                    }} className="bg-white p-10 rounded-3xl w-80 shadow-2xl">
                        <h1 className="text-xl font-black mb-6 uppercase">Login</h1>
                        <input type="email" value={loginEmail} onChange={e => setLoginEmail(e.target.value)} className="w-full border p-3 rounded-xl mb-4 text-center font-bold" placeholder="Email" required />
                        <button className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold uppercase">Enter</button>
                    </form>
                </div>
            );

            return (
                <div className="p-4 max-w-full min-h-screen">
                    <input type="file" ref={fileInputRef} onChange={onFileChange} accept="application/pdf" className="hidden" />
                    
                    <div className="flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm border">
                        <h1 className="font-black uppercase tracking-tighter text-slate-700">{currentUserAgency} SESSION</h1>
                        <button onClick={() => setCurrentUserAgency('')} className="bg-rose-50 text-rose-600 p-2.5 rounded-xl hover:bg-rose-600 hover:text-white transition-all"><i data-lucide="power"></i></button>
                    </div>

                    <div className="flex flex-col xl:flex-row gap-6">
                        {/* Sidebar Left - Rules Applied */}
                        {currentUserAgency !== 'Admin' && (
                            <div className="sidebar-container bg-white p-5 rounded-2xl shadow-md border border-slate-100 h-fit sticky top-4">
                                <h2 className="font-black mb-4 flex items-center gap-2 uppercase text-[11px] text-indigo-600"><i data-lucide="user-plus" className="w-4 h-4"></i> เพิ่มรายชื่อ</h2>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const telClean = formData.tel.replace(/\D/g, '');
                                    if (telClean.length !== 10) return alert("กรุณาระบุเบอร์โทรศัพท์ให้ครบ 10 หลัก");
                                    setDraftList([...draftList, { ...formData, tel: telClean, draftId: Date.now(), status: 'Pending' }]);
                                    setFormData({ ...formData, firstName: '', lastName: '', tel: '', email: '', position: formData.position, location: formData.location });
                                    setIsChecked(false);
                                }} className="space-y-3">
                                    <div><label className="text-[9px] font-bold text-slate-400 uppercase">วันที่ส่ง *</label><input type="date" value={formData.submissionDate} onChange={e => setFormData({...formData, submissionDate: e.target.value})} className="w-full border p-2 rounded-lg text-xs bg-slate-50" required /></div>
                                    <div><label className="text-[9px] font-bold text-slate-400 uppercase">ชื่อ *</label><input type="text" placeholder="ชื่อ" value={formData.firstName} onChange={e => setFormData({...formData, firstName: e.target.value})} className="w-full border p-2 rounded-lg text-xs" required /></div>
                                    <div><label className="text-[9px] font-bold text-slate-400 uppercase">นามสกุล *</label><input type="text" placeholder="นามสกุล" value={formData.lastName} onChange={e => setFormData({...formData, lastName: e.target.value})} className="w-full border p-2 rounded-lg text-xs" required /></div>
                                    <div><label className="text-[9px] font-bold text-slate-400 uppercase">เบอร์โทร *</label><input type="text" maxLength="10" placeholder="08xxxxxxxx" value={formData.tel} onChange={e => setFormData({...formData, tel: e.target.value})} className="w-full border p-2 rounded-lg text-xs" required /></div>
                                    <div><label className="text-[9px] font-bold text-slate-400 uppercase">อีเมล *</label><input type="email" placeholder="example@mail.com" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} className="w-full border p-2 rounded-lg text-xs" required /></div>
                                    
                                    <div><label className="text-[9px] font-bold text-slate-400 uppercase">ตำแหน่งงาน *</label>
                                        <select value={formData.position} onChange={e => setFormData({...formData, position: e.target.value})} className="w-full border p-2 rounded-lg text-xs" required>
                                            <option value="">เลือกตำแหน่ง...</option>
                                            {positions.map(p => <option key={p} value={p}>{p}</option>)}
                                        </select>
                                    </div>
                                    
                                    <div><label className="text-[9px] font-bold text-slate-400 uppercase">สาขา *</label>
                                        <select value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} className="w-full border p-2 rounded-lg text-xs" required>
                                            <option value="">เลือกสาขา...</option>
                                            {locations.map(l => <option key={l} value={l}>{l}</option>)}
                                        </select>
                                    </div>
                                    
                                    <button className="w-full bg-indigo-600 text-white py-3 rounded-xl font-black uppercase text-[10px] active:scale-95 shadow-lg">+ เพิ่มลงร่าง</button>
                                </form>
                            </div>
                        )}

                        {/* Content Right */}
                        <div className="flex-1 space-y-4 min-w-0">
                            {/* Filter Bar 1 บรรทัด */}
                            <div className="compact-filter-bar">
                                <div className="filter-item"><label className="filter-label">วันที่ส่ง</label><input type="date" value={filters.subDate} onChange={e => setFilters({...filters, subDate: e.target.value})} className="filter-input" /></div>
                                <div className="filter-item"><label className="filter-label">ชื่อ-นามสกุล</label><input type="text" placeholder="ค้นชื่อ..." value={filters.name} onChange={e => setFilters({...filters, name: e.target.value})} className="filter-input" /></div>
                                <div className="filter-item"><label className="filter-label">สถานะ</label><select value={filters.status} onChange={e => setFilters({...filters, status: e.target.value})} className="filter-input"><option value="">ทั้งหมด</option><option value="No Dup">No Dup</option><option value="Dup">Dup</option><option value="Dup (Gmail)">Dup (Gmail)</option></select></div>
                                <div className="filter-item"><label className="filter-label">ตำแหน่ง</label><select value={filters.pos} onChange={e => setFilters({...filters, pos: e.target.value})} className="filter-input"><option value="">ทั้งหมด</option>{positions.map(p => <option key={p} value={p}>{p}</option>)}</select></div>
                                <div className="filter-item"><label className="filter-label">วันสัมภาษณ์</label><input type="date" value={filters.intDate} onChange={e => setFilters({...filters, intDate: e.target.value})} className="filter-input" /></div>
                                <div className="filter-item"><label className="filter-label">ผลสัมภาษณ์</label><select value={filters.intResult} onChange={e => setFilters({...filters, intResult: e.target.value})} className="filter-input"><option value="">ทั้งหมด</option><option value="รอผล">รอผล</option><option value="ผ่าน">ผ่าน</option><option value="ไม่ผ่าน">ไม่ผ่าน</option></select></div>
                                <button onClick={() => setFilters({name:'', subDate:'', status:'', pos:'', intDate:'', intResult:''})} className="bg-slate-100 border p-2 rounded-lg text-[9px] font-black uppercase hover:bg-slate-200">Reset</button>
                            </div>

                            {/* Draft Box - 7 Columns */}
                            {draftList.length > 0 && (
                                <div className="bg-white rounded-xl border-2 border-amber-200 overflow-hidden shadow-xl mb-4">
                                    <div className="bg-amber-50 p-3 flex justify-between items-center border-b border-amber-200 font-black text-[11px] uppercase">รอตรวจสอบ ({draftList.length})
                                        <div className="flex gap-2">
                                            <button onClick={handleBulkCheck} className="bg-amber-500 text-white px-4 py-1.5 rounded-lg font-black text-[10px] uppercase shadow-md">1. Check Dup</button>
                                            {isChecked && <button onClick={async () => {
                                                const promises = draftList.map(item => window.FB.methods.addDoc(window.FB.methods.collection(window.FB.db, 'candidates'), { ...item, agency: currentUserAgency, prescreenStatus: item.status, interviewStatus: 'รอผล', createdAt: Date.now(), resumeLink: '' }));
                                                await Promise.all(promises); setDraftList([]); setIsChecked(false);
                                                setPopup({ title: "SUCCESS", msg: "บันทึกเรียบร้อย!" });
                                            }} className="bg-emerald-600 text-white px-4 py-1.5 rounded-lg font-black text-[10px] uppercase shadow-md animate-bounce">2. Save to Cloud</button>}
                                        </div>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-[11px]">
                                            <thead><tr><th>วันที่ส่ง</th><th>ชื่อ-นามสกุล</th><th>เบอร์โทร</th><th>อีเมล</th><th>ตำแหน่ง</th><th>สาขา</th><th className="bg-amber-100">ผลตรวจสอบ</th></tr></thead>
                                            <tbody>{draftList.map((item) => (<tr key={item.draftId} className="draft-row"><td>{item.submissionDate}</td><td className="font-black">{item.firstName} {item.lastName}</td><td>{item.tel}</td><td>{item.email}</td><td className="font-bold text-indigo-600">{item.position}</td><td>{item.location}</td><td><span className={`px-3 py-1 rounded-full text-[10px] font-black ${item.status === 'No Dup' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>{item.status}</span></td></tr>))}</tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* Main Table */}
                            <div className="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                                <div className="bg-slate-50 p-3 border-b font-black text-[10.5px] flex justify-between uppercase text-slate-500 tracking-widest">
                                    <span>ฐานข้อมูลหลัก - หน้า {currentPage} / {totalPages}</span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full">
                                        <thead>
                                            <tr><th>วันที่ส่ง</th><th className="text-left">ชื่อ-นามสกุล</th><th>เบอร์โทร</th><th>ตำแหน่ง</th><th>สาขา</th><th>ตรวจสอบ</th><th className="bg-indigo-600 text-white">Resume</th><th>สัมภาษณ์</th><th>ผลสัมภาษณ์</th><th>จัดการ</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {paginatedItems.map(item => {
                                                const isNoDup = item.prescreenStatus === 'No Dup' || item.interviewStatus === 'ผ่าน';
                                                return (
                                                    <tr key={item.id} className="hover:bg-slate-50/50 transition-all">
                                                        <td className="text-[10px] text-slate-400 font-bold">{item.submissionDate}</td>
                                                        <td className="text-left font-black text-slate-700">{item.firstName ? `${item.firstName} ${item.lastName}` : (item.name || '-') }</td>
                                                        <td className="font-bold text-slate-600">{item.tel}</td>
                                                        <td className="text-[10px] font-bold text-indigo-500 uppercase">{item.position}</td>
                                                        <td className="text-[10px] text-slate-500">{item.location}</td>
                                                        <td><span className={`px-2 py-0.5 rounded-full text-[10px] font-black inline-block ${isNoDup ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>{item.prescreenStatus}</span></td>
                                                        <td>
                                                            <div className="flex justify-center gap-1">
                                                                {item.resumeLink ? (
                                                                    <div className="flex gap-1">
                                                                        <a href={item.resumeLink} target="_blank" className="text-indigo-600 bg-indigo-50 p-1.5 rounded-lg hover:scale-110"><i data-lucide="eye" className="w-4 h-4"></i></a>
                                                                        {currentUserAgency === 'Admin' && (<a href={getDownloadLink(item.resumeLink)} target="_blank" className="text-emerald-600 bg-emerald-50 p-1.5 rounded font-black text-[9px] border border-emerald-100">DL</a>)}
                                                                    </div>
                                                                ) : (currentUserAgency !== 'Admin' && isNoDup ? (<button onClick={() => { setTargetId(item.id); fileInputRef.current.click(); }} className="text-indigo-600 text-[10px] font-black border-2 border-dashed border-indigo-200 px-2 py-1 rounded hover:bg-indigo-50 active:scale-90 transition-all">{isUploading === item.id ? "..." : "+ Resume"}</button>) : <i data-lucide="lock" className="text-slate-200 w-4 h-4 mx-auto"></i>)}
                                                            </div>
                                                        </td>
                                                        <td>{currentUserAgency === 'Admin' ? <input type="date" value={item.interviewDate || ''} onChange={e => window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id), { interviewDate: e.target.value })} className="admin-edit" /> : (item.interviewDate || '-')}</td>
                                                        <td>{currentUserAgency === 'Admin' ? <select value={item.interviewStatus || 'รอผล'} onChange={e => window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id), { interviewStatus: e.target.value })} className="admin-edit"><option value="รอผล">รอผล</option><option value="ผ่าน">ผ่าน</option><option value="ไม่ผ่าน">ไม่ผ่าน</option></select> : <span className={`px-2 py-0.5 rounded-full text-[10px] font-black inline-block ${item.interviewStatus === 'ผ่าน' ? 'bg-indigo-600 text-white' : 'bg-slate-100'}`}>{item.interviewStatus || 'รอผล'}</span>}</td>
                                                        <td><button onClick={() => { if(confirm("ลบข้อมูล?")) window.FB.methods.deleteDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id)) }} className="text-rose-200 hover:text-rose-600 active:scale-90 transition-all"><i data-lucide="trash-2" className="w-3.5 h-3.5 mx-auto"></i></button></td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-3 flex justify-between bg-slate-50 border-t items-center font-bold text-xs">
                                    <button disabled={currentPage === 1} onClick={() => setCurrentPage(p => p - 1)} className="bg-white border px-4 py-1.5 rounded-xl active:scale-95 disabled:opacity-30">PREV</button>
                                    <span className="text-slate-400 text-[10px]">Page {currentPage} of {totalPages}</span>
                                    <button disabled={currentPage === totalPages} onClick={() => setCurrentPage(p => p + 1)} className="bg-white border px-4 py-1.5 rounded-xl active:scale-95 disabled:opacity-30">NEXT</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Notification Popup */}
                    {popup && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-[999] p-6 text-center">
                            <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl border-t-4 border-indigo-600 w-full max-w-sm popup-animate">
                                <div className={`w-14 h-14 mx-auto rounded-full flex items-center justify-center mb-6 bg-emerald-100 text-emerald-600`}><i data-lucide="check-circle" className="w-8 h-8"></i></div>
                                <h3 className="text-xl font-black mb-2 uppercase tracking-tight">{popup.title}</h3>
                                <p className="text-slate-500 font-bold mb-8 text-sm leading-relaxed">{popup.msg}</p>
                                <button onClick={() => setPopup(null)} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">Close</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
