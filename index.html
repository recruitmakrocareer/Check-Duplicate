<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Checker | Admin Control Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f1f5f9; 
            margin: 0; 
            padding: 0;
            font-size: 16px; 
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        input, select, button { 
            font-size: 1.1rem !important; 
        }
        th { 
            white-space: nowrap; 
            font-size: 1rem !important;
            letter-spacing: 0.05em;
            text-align: center;
            background-color: #0f172a;
            color: white;
            padding: 1.5rem 1rem;
        }
        td {
            font-size: 1.1rem !important;
            vertical-align: middle;
            padding: 1.5rem 1rem;
        }
        .admin-input {
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            padding: 0.5rem;
            font-weight: 700;
            outline: none;
            width: 100%;
            text-align: center;
        }
        .admin-input:focus { border-color: #4f46e5; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAX6alx5rJRDRd8Wcvj4rDLLsYwz37NXEQ",
            authDomain: "recruit-operation-project.firebaseapp.com",
            projectId: "recruit-operation-project",
            storageBucket: "recruit-operation-project.firebasestorage.app",
            messagingSenderId: "857023562077",
            appId: "1:857023562077:web:669da5cfc20cf7707e68b4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.FB = { 
            db, auth,
            methods: { signInAnonymously, onAuthStateChanged, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query }
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        const App = () => {
            const scriptURL = "https://script.google.com/macros/s/AKfycbzjWGRV6zwEeAUYQlUZ-Op1U37TW6NyOWHI908E14h07wBFQAO2-qvnbq_QtW2SdmOY/exec";

            const [user, setUser] = useState(null);
            const [currentUserAgency, setCurrentUserAgency] = useState('');
            const [loginEmail, setLoginEmail] = useState('');
            const [isLoading, setIsLoading] = useState(true);
            const [cloudCandidates, setCloudCandidates] = useState([]);
            const [referenceDb, setReferenceDb] = useState([]);
            const [isUploading, setIsUploading] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [popup, setPopup] = useState(null);
            const [targetId, setTargetId] = useState(null);
            const fileInputRef = useRef(null);
            
            const [formData, setFormData] = useState({ 
                submissionDate: new Date().toISOString().split('T')[0], 
                name: '', tel: '', email: '', position: '', location: ''
            });

            const refreshIcons = useCallback(() => {
                if (window.lucide) setTimeout(() => lucide.createIcons(), 100);
            }, []);

            const getDownloadLink = (url) => {
                if (!url) return "#";
                const fileId = url.match(/[-\w]{25,}/);
                return fileId ? `https://drive.google.com/uc?id=${fileId[0]}&export=download` : url;
            };

            useEffect(() => {
                if (!window.FB) return;
                const { auth, methods } = window.FB;
                methods.signInAnonymously(auth).catch(console.error);
                methods.onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vTsDZSCTRBCQ3LojqsCmVPea7qo7uB9VyXne9aZSlqxo8yntizND6o7bpRQfS2rFFHthMB-N0YIqTL6/pub?output=csv')
                    .then(r => r.text()).then(res => {
                        const data = Papa.parse(res, { header: true }).data;
                        setReferenceDb(data.filter(r => r['Name-Surname']).map(r => ({
                            name: (r['Name-Surname'] || '').trim(),
                            tel: (r['Tel'] || '').trim()
                        })));
                        setIsLoading(false);
                        refreshIcons();
                    });
                });
            }, []);

            useEffect(() => {
                if (!user || !currentUserAgency) return;
                const { db, methods } = window.FB;
                const q = methods.query(methods.collection(db, 'candidates'));
                return methods.onSnapshot(q, (sn) => {
                    setCloudCandidates(sn.docs.map(d => ({ id: d.id, ...d.data() })));
                    refreshIcons();
                });
            }, [user, currentUserAgency]);

            const handleLogin = (e) => {
                e.preventDefault();
                const accessMap = { 
                    "admin@company.com": "Admin", 
                    "manpower@agency.com": "Manpower", "metalent@agency.com": "Me Talent", 
                    "prtr@agency.com": "PRTR", "talentvis@agency.com": "Talentvis", "techgrid@agency.com": "Techgrid" 
                };
                const agency = accessMap[loginEmail.trim().toLowerCase()];
                if (agency) { setCurrentUserAgency(agency); refreshIcons(); }
                else setPopup({ title: "ล้มเหลว", msg: "ไม่พบอีเมลในระบบ" });
            };

            const onFileChange = async (e) => {
                const file = e.target.files[0];
                if (!file || !targetId) return;
                setIsUploading(targetId);
                const reader = new FileReader();
                reader.onload = async (f) => {
                    const base64Data = f.target.result.split(',')[1];
                    try {
                        const candidate = cloudCandidates.find(c => c.id === targetId);
                        const response = await fetch(scriptURL, {
                            method: "POST",
                            body: JSON.stringify({ fileData: base64Data, mimeType: file.type, fileName: `${candidate.name}_CV.pdf` })
                        });
                        const result = await response.json();
                        if (result.status === "success") {
                            await window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', targetId), { resumeLink: result.url });
                            setPopup({ title: "สำเร็จ", msg: "อัปโหลด Resume เรียบร้อย" });
                        } else throw new Error(result.message);
                    } catch (err) {
                        setPopup({ title: "Error", msg: "อัปโหลดไม่สำเร็จ: " + err.message });
                    } finally { setIsUploading(null); setTargetId(null); e.target.value = ''; }
                };
                reader.readAsDataURL(file);
            };

            const filteredItems = useMemo(() => {
                return cloudCandidates.filter(item => {
                    if (currentUserAgency !== 'Admin' && item.agency !== currentUserAgency) return false;
                    const search = searchTerm.toLowerCase();
                    return !searchTerm || item.name.toLowerCase().includes(search) || item.tel.includes(search);
                }).sort((a, b) => b.createdAt - a.createdAt);
            }, [cloudCandidates, currentUserAgency, searchTerm]);

            if (isLoading) return <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white"><div className="loader mb-6"></div><p className="text-xl font-bold">กำลังโหลดฐานข้อมูล...</p></div>;

            if (!currentUserAgency) return (
                <div className="h-screen flex items-center justify-center bg-slate-950 p-6">
                    <div className="glass-morphism w-full max-w-lg rounded-[3rem] p-12 shadow-2xl text-center border-t-8 border-indigo-600">
                        <div className="bg-indigo-600 w-24 h-24 rounded-3xl flex items-center justify-center text-white mx-auto mb-10 shadow-xl">
                            <i data-lucide="shield-check" className="w-12 h-12"></i>
                        </div>
                        <h1 className="text-4xl font-black mb-10 text-slate-800 uppercase tracking-tighter">Login System</h1>
                        <form onSubmit={handleLogin} className="space-y-6">
                            <input type="email" value={loginEmail} onChange={e => setLoginEmail(e.target.value)} className="w-full bg-white p-6 rounded-2xl text-center font-bold outline-none border-2 border-slate-100" placeholder="กรอกอีเมลของคุณ" required />
                            <button className="w-full bg-indigo-600 text-white font-black py-6 rounded-2xl shadow-lg hover:bg-indigo-700 transition-all uppercase text-xl active:scale-95">เข้าสู่ระบบ</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-10 max-w-[2200px] mx-auto">
                    <input type="file" ref={fileInputRef} onChange={onFileChange} accept="application/pdf" className="hidden" />
                    
                    {/* Header */}
                    <div className="bg-white rounded-[2.5rem] p-8 shadow-xl flex items-center justify-between mb-10 border border-white">
                        <div className="flex items-center gap-6">
                            <div className="bg-slate-900 p-5 rounded-2xl text-white shadow-lg"><i data-lucide="layout-dashboard" className="w-8 h-8"></i></div>
                            <div>
                                <h1 className="text-3xl font-black uppercase text-slate-800">{currentUserAgency} SESSION</h1>
                                <p className="text-xs text-emerald-500 font-bold tracking-widest uppercase mt-1">• Online Real-time Database</p>
                            </div>
                        </div>
                        <button onClick={() => setCurrentUserAgency('')} className="bg-rose-50 text-rose-600 p-5 rounded-2xl hover:bg-rose-600 hover:text-white transition-all shadow-md active:scale-90"><i data-lucide="power" className="w-6 h-6"></i></button>
                    </div>

                    <div className="grid grid-cols-1 xl:grid-cols-12 gap-10">
                        {/* Sidebar Form */}
                        {currentUserAgency !== 'Admin' && (
                            <div className="xl:col-span-3">
                                <div className="bg-white p-10 rounded-[3rem] shadow-xl border border-white sticky top-10">
                                    <h2 className="text-2xl font-black mb-8 flex gap-3 items-center text-slate-800 uppercase"><i data-lucide="user-plus" className="text-indigo-600"></i> New Entry</h2>
                                    <form onSubmit={async (e) => {
                                        e.preventDefault();
                                        const isDup = [...referenceDb, ...cloudCandidates].some(c => (c.name.replace(/\s/g,'') === formData.name.replace(/\s/g,'')) || (c.tel === formData.tel));
                                        if (isDup) return setPopup({ title: "ข้อมูลซ้ำ!", msg: "ชื่อหรือเบอร์โทรนี้มีในระบบแล้ว" });
                                        await window.FB.methods.addDoc(window.FB.methods.collection(window.FB.db, 'candidates'), { 
                                            ...formData, 
                                            agency: currentUserAgency, 
                                            prescreenStatus: 'รอตรวจสอบ', 
                                            interviewStatus: 'รอผล', 
                                            startDate: '', // เริ่มต้นว่างไว้
                                            salary: '',    // เริ่มต้นว่างไว้
                                            resumeLink: '', 
                                            createdAt: Date.now() 
                                        });
                                        setFormData({...formData, name:'', tel:'', email:''});
                                        setPopup({ title: "สำเร็จ", msg: "บันทึกข้อมูลเรียบร้อย" });
                                    }} className="space-y-6">
                                        <div><label className="font-bold text-slate-400 ml-2">วันที่ส่งผู้สมัคร</label><input type="date" value={formData.submissionDate} onChange={e => setFormData({...formData, submissionDate: e.target.value})} className="w-full bg-slate-50 p-5 rounded-xl font-bold outline-none" required /></div>
                                        <div><label className="font-bold text-slate-400 ml-2">ชื่อ-นามสกุล (Thai)</label><input type="text" placeholder="ชื่อ-นามสกุล" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full bg-slate-50 p-5 rounded-xl font-bold outline-none" required /></div>
                                        <div><label className="font-bold text-slate-400 ml-2">เบอร์โทรศัพท์</label><input type="text" placeholder="08XXXXXXXX" value={formData.tel} onChange={e => setFormData({...formData, tel: e.target.value})} className="w-full bg-slate-50 p-5 rounded-xl font-bold outline-none" required /></div>
                                        <div><label className="font-bold text-slate-400 ml-2">ตำแหน่งงาน</label>
                                            <select value={formData.position} onChange={e => setFormData({...formData, position: e.target.value})} className="w-full bg-slate-50 p-5 rounded-xl font-bold outline-none" required>
                                                <option value="">เลือกตำแหน่ง...</option><option value="Sales Executive">Sales Executive</option><option value="Supervisor">Supervisor</option><option value="Office Support">Office Support</option>
                                            </select>
                                        </div>
                                        <div><label className="font-bold text-slate-400 ml-2">สาขา / พื้นที่</label><input type="text" placeholder="ระบุสาขา" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} className="w-full bg-slate-50 p-5 rounded-xl font-bold outline-none" required /></div>
                                        <button className="w-full bg-slate-900 text-white py-6 rounded-2xl font-black mt-4 hover:bg-black transition-all uppercase tracking-widest text-lg">Submit Record</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* Main Content Table */}
                        <div className={currentUserAgency === 'Admin' ? 'xl:col-span-12' : 'xl:col-span-9'}>
                            <div className="bg-white p-6 rounded-[2.5rem] shadow-lg mb-8 flex gap-4 border border-white">
                                <div className="flex-1 relative"><i data-lucide="search" className="absolute left-6 top-6 text-slate-300"></i><input type="text" placeholder="ค้นหาชื่อ หรือ เบอร์โทรศัพท์..." className="w-full bg-slate-50 pl-16 p-5 rounded-2xl font-bold outline-none focus:bg-white transition-all text-xl" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} /></div>
                            </div>

                            <div className="bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-white">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead>
                                            <tr>
                                                <th>วันที่ส่ง</th>
                                                <th>ชื่อ-นามสกุล</th>
                                                <th>เบอร์โทร</th>
                                                <th>ตำแหน่ง</th>
                                                <th>สาขา</th>
                                                <th>ตรวจสอบ</th>
                                                <th>Resume</th>
                                                <th>วันสัมภาษณ์</th>
                                                <th>ผลสัมภาษณ์</th>
                                                <th className="bg-indigo-900">วันเริ่มงาน</th>
                                                <th className="bg-indigo-900">เงินเดือน</th>
                                                <th>จัดการ</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 text-center">
                                            {filteredItems.map(item => {
                                                const isPass = item.prescreenStatus === 'ผ่าน' || item.prescreenStatus === 'ผ่าน (NoDup)';
                                                return (
                                                    <tr key={item.id} className="hover:bg-slate-50 transition-all group">
                                                        <td className="text-slate-400 font-bold text-left">{item.submissionDate}</td>
                                                        <td className="font-black text-slate-800 text-2xl text-left">{item.name}</td>
                                                        <td className="text-slate-400 font-bold text-left">{item.tel}</td>
                                                        <td><span className="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl text-xs font-black">{item.position}</span></td>
                                                        <td className="font-bold text-slate-500">{item.location}</td>
                                                        
                                                        {/* ตรวจสอบ */}
                                                        <td>
                                                            {currentUserAgency === 'Admin' ? (
                                                                <select value={item.prescreenStatus} onChange={e => window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id), { prescreenStatus: e.target.value })} className="admin-input text-sm">
                                                                    <option value="รอตรวจสอบ">รอตรวจสอบ</option><option value="ผ่าน">ผ่าน (NoDup)</option><option value="ไม่ผ่าน">ไม่ผ่าน</option>
                                                                </select>
                                                            ) : (
                                                                <span className={`px-5 py-2 rounded-full text-sm font-black mx-auto inline-block ${isPass ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-400'}`}>
                                                                    {item.prescreenStatus === 'ผ่าน' ? 'NoDup' : item.prescreenStatus}
                                                                </span>
                                                            )}
                                                        </td>

                                                        {/* Resume & Download */}
                                                        <td>
                                                            <div className="flex justify-center items-center gap-2">
                                                                {isPass ? (
                                                                    item.resumeLink ? (
                                                                        <div className="flex gap-1">
                                                                            <a href={item.resumeLink} target="_blank" className="text-indigo-600 p-2 bg-indigo-50 rounded-xl hover:scale-110 transition-all shadow-sm"><i data-lucide="eye" className="w-5 h-5"></i></a>
                                                                            {currentUserAgency === 'Admin' && (
                                                                                <a href={getDownloadLink(item.resumeLink)} target="_blank" className="text-emerald-600 p-2 bg-emerald-50 rounded-xl hover:scale-110 transition-all shadow-sm flex items-center gap-1 font-black text-[10px]"><i data-lucide="download" className="w-4 h-4"></i>DL</a>
                                                                            )}
                                                                        </div>
                                                                    ) : (
                                                                        currentUserAgency !== 'Admin' && (
                                                                            <button onClick={() => { setTargetId(item.id); fileInputRef.current.click(); }} className="text-indigo-600 text-[10px] font-black uppercase p-2 border-2 border-dashed border-indigo-200 rounded-xl">{isUploading === item.id ? "..." : "Upload"}</button>
                                                                        )
                                                                    )
                                                                ) : <i data-lucide="lock" className="text-slate-200 w-5 h-5 mx-auto"></i>}
                                                            </div>
                                                        </td>

                                                        {/* วันสัมภาษณ์ */}
                                                        <td>
                                                            {currentUserAgency === 'Admin' ? (
                                                                <input type="date" value={item.interviewDate || ''} onChange={e => window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id), { interviewDate: e.target.value })} className="admin-input text-xs" />
                                                            ) : <span className="font-black text-slate-600">{item.interviewDate || '-'}</span>}
                                                        </td>

                                                        {/* ผลสัมภาษณ์ */}
                                                        <td>
                                                            {currentUserAgency === 'Admin' ? (
                                                                <select value={item.interviewStatus} onChange={e => window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id), { interviewStatus: e.target.value })} className="admin-input text-sm">
                                                                    <option value="รอผล">รอผล</option><option value="ผ่าน">ผ่าน</option><option value="ไม่ผ่าน">ไม่ผ่าน</option><option value="สละสิทธิ์">สละสิทธิ์</option>
                                                                </select>
                                                            ) : (
                                                                <span className={`px-5 py-2 rounded-full text-sm font-black mx-auto inline-block ${item.interviewStatus === 'ผ่าน' ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-100 text-slate-500'}`}>{item.interviewStatus}</span>
                                                            )}
                                                        </td>

                                                        {/* วันเริ่มงาน (ใหม่) */}
                                                        <td className="bg-indigo-50/30">
                                                            {currentUserAgency === 'Admin' ? (
                                                                <input type="date" value={item.startDate || ''} onChange={e => window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id), { startDate: e.target.value })} className="admin-input text-xs border-indigo-200" />
                                                            ) : (
                                                                <span className="font-black text-indigo-700">{item.startDate || '-'}</span>
                                                            )}
                                                        </td>

                                                        {/* เงินเดือน (ใหม่) */}
                                                        <td className="bg-indigo-50/30">
                                                            {currentUserAgency === 'Admin' ? (
                                                                <input type="text" placeholder="0.00" value={item.salary || ''} onChange={e => window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id), { salary: e.target.value })} className="admin-input text-sm border-indigo-200" />
                                                            ) : (
                                                                <span className="font-black text-indigo-700">{item.salary ? `฿${Number(item.salary).toLocaleString()}` : '-'}</span>
                                                            )}
                                                        </td>

                                                        <td>
                                                            <button onClick={() => { if(confirm("ต้องการลบข้อมูลถาวร?")) window.FB.methods.deleteDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id)) }} className="text-rose-300 hover:text-rose-600 opacity-0 group-hover:opacity-100 transition-all p-2 bg-rose-50 rounded-xl mx-auto block"><i data-lucide="trash-2" className="w-6 h-6"></i></button>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    {popup && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-md flex items-center justify-center z-[100] p-6">
                            <div className="bg-white p-12 rounded-[4rem] max-w-md w-full text-center shadow-2xl border-t-8 border-indigo-600">
                                <h3 className="text-3xl font-black mb-6 text-slate-800 uppercase">{popup.title}</h3>
                                <p className="text-slate-500 font-bold mb-10 text-lg">{popup.msg}</p>
                                <button onClick={() => setPopup(null)} className="w-full bg-slate-900 text-white py-6 rounded-2xl font-black shadow-lg hover:bg-black transition-all text-xl">CLOSE</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
