<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Checker | Final Master Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; font-size: 13.5px; margin: 0; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        th { white-space: nowrap; font-size: 11px !important; padding: 10px 4px !important; background-color: #0f172a; color: white; text-align: center; border: 1px solid #334155; }
        td { font-size: 12px !important; padding: 10px 4px !important; vertical-align: middle; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .candidate-name { text-align: left; font-weight: 700; min-width: 150px; }
        .admin-input { border: 1px solid #cbd5e1; border-radius: 4px; padding: 4px; font-size: 11px; width: 100%; text-align: center; outline: none; }
        .sidebar-container { max-width: 300px; width: 100%; }
        .pagination-btn { padding: 6px 12px; border: 1px solid #e2e8f0; border-radius: 8px; background: white; font-weight: bold; }
        .pagination-active { background: #4f46e5 !important; color: white !important; }
        .filter-input { width: 100%; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 10px; font-size: 11px; font-weight: 600; outline: none; }
        .draft-row { background-color: #fffbeb; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAX6alx5rJRDRd8Wcvj4rDLLsYwz37NXEQ",
            authDomain: "recruit-operation-project.firebaseapp.com",
            projectId: "recruit-operation-project",
            storageBucket: "recruit-operation-project.firebasestorage.app",
            messagingSenderId: "857023562077",
            appId: "1:857023562077:web:669da5cfc20cf7707e68b4"
        };
        const app = initializeApp(firebaseConfig);
        window.FB = { db: getFirestore(app), auth: getAuth(app), methods: { signInAnonymously, onAuthStateChanged, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, writeBatch } };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        const App = () => {
            const scriptURL = "https://script.google.com/macros/s/AKfycbwDesg5DnMhUhqNMF_3teZ2ZYqBHBN-URprvn3wFtfWbKOzsTWJp1U3SFbIASydi9bK/exec";

            const [user, setUser] = useState(null);
            const [currentUserAgency, setCurrentUserAgency] = useState('');
            const [loginEmail, setLoginEmail] = useState('');
            const [isLoading, setIsLoading] = useState(true);
            const [cloudCandidates, setCloudCandidates] = useState([]);
            const [referenceDb, setReferenceDb] = useState([]);
            const [gmailDb, setGmailDb] = useState([]); 
            const [draftList, setDraftList] = useState([]);
            const [isChecked, setIsChecked] = useState(false);
            const [currentPage, setCurrentPage] = useState(1);
            const itemsPerPage = 50;

            const [filters, setFilters] = useState({ subDate: '', name: '', position: '', location: '', intDate: '' });
            const [popup, setPopup] = useState(null);
            const [isUploading, setIsUploading] = useState(null);
            const [targetId, setTargetId] = useState(null);
            const fileInputRef = useRef(null);
            const importFileRef = useRef(null);

            const [formData, setFormData] = useState({ 
                submissionDate: new Date().toISOString().split('T')[0], 
                firstName: '', lastName: '', tel: '', email: '', position: '', location: ''
            });

            const refreshIcons = useCallback(() => { if (window.lucide) setTimeout(() => lucide.createIcons(), 100); }, []);
            const normalize = (s) => s ? s.toString().toLowerCase().replace(/[^a-z0-9ก-ฮ]/g, '').trim() : '';
            const getDownloadLink = (url) => { if (!url) return "#"; const fileId = url.match(/[-\w]{25,}/); return fileId ? `https://drive.google.com/uc?id=${fileId[0]}&export=download` : url; };

            // 1. Initial Data Initialization
            useEffect(() => {
                if (!window.FB) return;
                const { auth, methods } = window.FB;
                methods.signInAnonymously(auth).catch(console.error);
                methods.onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    // Load Reference CSV
                    fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vTsDZSCTRBCQ3LojqsCmVPea7qo7uB9VyXne9aZSlqxo8yntizND6o7bpRQfS2rFFHthMB-N0YIqTL6/pub?output=csv')
                    .then(r => r.text()).then(res => {
                        const data = Papa.parse(res, { header: true }).data;
                        setReferenceDb(data.filter(r => r['Name-Surname']).map(r => ({ name: (r['Name-Surname']||'').trim(), tel: (r['Tel']||'').trim(), email: (r['Email']||'').trim() })));
                        
                        // Load Gmail Sync
                        return fetch(scriptURL + "?action=getGmail");
                    })
                    .then(r => r.json())
                    .then(emails => {
                        setGmailDb(emails);
                        setIsLoading(false);
                        refreshIcons();
                    })
                    .catch(err => { console.error(err); setIsLoading(false); });
                });
            }, []);

            // 2. Realtime Firestore Sync
            useEffect(() => {
                if (!user || !currentUserAgency) return;
                const q = window.FB.methods.query(window.FB.methods.collection(window.FB.db, 'candidates'));
                return window.FB.methods.onSnapshot(q, (sn) => {
                    setCloudCandidates(sn.docs.map(d => ({ id: d.id, ...d.data() })));
                    refreshIcons();
                });
            }, [user, currentUserAgency, refreshIcons]);

            // --- Calculation Section (แก้ปัญหา totalPages is not defined) ---
            const allFiltered = useMemo(() => {
                return cloudCandidates.filter(item => {
                    if (currentUserAgency !== 'Admin' && item.agency !== currentUserAgency) return false;
                    const fullName = normalize((item.firstName || '') + (item.lastName || '') + (item.name || ''));
                    return (!filters.subDate || item.submissionDate === filters.subDate) &&
                           (!filters.name || fullName.includes(normalize(filters.name))) &&
                           (!filters.position || item.position === filters.position) &&
                           (!filters.location || normalize(item.location).includes(normalize(filters.location))) &&
                           (!filters.intDate || item.interviewDate === filters.intDate);
                }).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            }, [cloudCandidates, currentUserAgency, filters]);

            const totalPages = Math.max(1, Math.ceil(allFiltered.length / itemsPerPage));
            const paginatedItems = allFiltered.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

            useEffect(() => { setCurrentPage(1); }, [filters]);

            // --- Handlers ---
            const handleBulkCheck = () => {
                const updatedDraft = draftList.map((item, index) => {
                    const currentEmail = item.email.toLowerCase().trim();
                    const currentFull = normalize(item.firstName + item.lastName);
                    
                    const isDupExt = [...referenceDb, ...cloudCandidates].some(c => {
                        const dbFull = normalize(c.firstName && c.lastName ? (c.firstName + c.lastName) : (c.name || ''));
                        return (dbFull === currentFull) || (normalize(c.tel) === normalize(item.tel)) || (currentEmail && normalize(c.email) === currentEmail);
                    });

                    const isDupGmail = gmailDb.includes(currentEmail);
                    const isDupInt = draftList.some((other, oIdx) => index !== oIdx && (normalize(other.firstName + other.lastName) === currentFull || normalize(other.tel) === normalize(item.tel)));

                    let status = 'No Dup';
                    if (isDupExt || isDupInt) status = 'Dup';
                    else if (isDupGmail) status = 'Dup (Gmail)';
                    return { ...item, status: status };
                });
                setDraftList(updatedDraft); setIsChecked(true);
            };

            const addToDraft = (e) => {
                e.preventDefault();
                if (!formData.firstName || !formData.lastName || !formData.tel || !formData.email || !formData.position || !formData.location) {
                    return setPopup({ title: "ข้อมูลไม่ครบ", msg: "กรุณาระบุข้อมูลทุกช่องก่อนเพิ่ม" });
                }
                const telClean = formData.tel.replace(/\D/g, '');
                if (telClean.length !== 10 || !telClean.startsWith('0')) {
                    return setPopup({ title: "เบอร์โทรไม่ถูกต้อง", msg: "ต้องครบ 10 หลักและขึ้นต้นด้วย 0" });
                }
                setDraftList([...draftList, { ...formData, tel: telClean, draftId: Date.now(), status: 'Pending' }]);
                setFormData({ ...formData, firstName: '', lastName: '', tel: '', email: '' });
                setIsChecked(false);
            };

            const saveAllToCloud = async () => {
                if (!isChecked) return;
                const promises = draftList.map(item => window.FB.methods.addDoc(window.FB.methods.collection(window.FB.db, 'candidates'), { ...item, agency: currentUserAgency, prescreenStatus: item.status, interviewDate: '', interviewStatus: 'รอผล', createdAt: Date.now(), resumeLink: '' }));
                await Promise.all(promises); setDraftList([]); setIsChecked(false);
                setPopup({ title: "สำเร็จ", msg: "บันทึกเรียบร้อย" });
            };

            const onFileChange = async (e) => {
                const file = e.target.files[0]; if (!file || !targetId) return;
                setIsUploading(targetId);
                const reader = new FileReader();
                reader.onload = async (f) => {
                    const base64Data = f.target.result.split(',')[1];
                    try {
                        const candidate = cloudCandidates.find(c => c.id === targetId);
                        const response = await fetch(scriptURL, { method: "POST", body: JSON.stringify({ fileData: base64Data, mimeType: file.type, fileName: `${candidate.firstName}_CV.pdf` }) });
                        const result = await response.json();
                        if (result.status === "success") { await window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', targetId), { resumeLink: result.url }); setPopup({ title: "สำเร็จ", msg: "อัปโหลดเรียบร้อย" }); }
                    } catch (err) { setPopup({ title: "Error", msg: "อัปโหลดล้มเหลว" }); }
                    finally { setIsUploading(null); setTargetId(null); e.target.value = ''; }
                };
                reader.readAsDataURL(file);
            };

            const handleImportCSV = (e) => {
                const file = e.target.files[0]; if (!file) return;
                Papa.parse(file, {
                    header: true, skipEmptyLines: true,
                    complete: async (results) => {
                        setIsLoading(true);
                        const { db, methods } = window.FB;
                        const batch = methods.writeBatch(db);
                        results.data.forEach((row) => {
                            const newDocRef = doc(methods.collection(db, 'candidates'));
                            batch.set(newDocRef, { submissionDate: row.submissionDate || new Date().toISOString().split('T')[0], firstName: (row.firstName || '').trim(), lastName: (row.lastName || '').trim(), tel: (row.tel || '').replace(/\D/g, ''), email: (row.email || '').trim(), position: row.position || 'Legacy', location: row.location || '-', agency: row.agency || 'System Import', prescreenStatus: 'No Dup', interviewStatus: 'รอผล', createdAt: Date.now() });
                        });
                        await batch.commit(); setIsLoading(false);
                        setPopup({ title: "สำเร็จ", msg: "Import ข้อมูลเรียบร้อย" });
                        e.target.value = '';
                    }
                });
            };

            if (isLoading) return <div className="h-screen flex items-center justify-center bg-slate-900 text-white font-black"><div className="loader mr-4"></div> SYNCING SYSTEMS...</div>;

            if (!currentUserAgency) return (
                <div className="h-screen flex items-center justify-center bg-slate-950 p-6 text-center">
                    <div className="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl border-t-4 border-indigo-600">
                        <h1 className="text-2xl font-black mb-8 uppercase">Recruit Access</h1>
                        <form onSubmit={(e) => {
                            e.preventDefault();
                            const accessMap = { "admin@company.com": "Admin", "manpower@agency.com": "Manpower", "metalent@agency.com": "Me Talent", "prtr@agency.com": "PRTR", "talentvis@agency.com": "Talentvis", "techgrid@agency.com": "Techgrid" };
                            const agency = accessMap[loginEmail.trim().toLowerCase()];
                            if (agency) setCurrentUserAgency(agency); else setPopup({ title: "Error", msg: "อีเมลไม่ถูกต้อง" });
                        }} className="space-y-4">
                            <input type="email" value={loginEmail} onChange={e => setLoginEmail(e.target.value)} className="w-full bg-slate-50 p-4 rounded-xl text-center border font-bold" placeholder="Your Email" required />
                            <button className="w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-lg uppercase active:scale-95 transition-all">Login</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-4 max-w-full mx-auto">
                    <input type="file" ref={importFileRef} onChange={handleImportCSV} accept=".csv" className="hidden" />
                    <input type="file" ref={fileInputRef} onChange={onFileChange} accept="application/pdf" className="hidden" />
                    
                    {/* Header */}
                    <div className="bg-white rounded-2xl p-4 shadow-sm flex items-center justify-between mb-6 border border-slate-200">
                        <div className="flex items-center gap-4">
                            <div className="bg-slate-900 p-3 rounded-xl text-white shadow-md"><i data-lucide="shield-check"></i></div>
                            <div><h1 className="text-xl font-black uppercase">{currentUserAgency} SESSION</h1><p className="text-[10px] text-emerald-500 font-bold uppercase tracking-widest">• Real-time Sync Active</p></div>
                        </div>
                        <div className="flex gap-3">
                            {currentUserAgency === 'Admin' && (
                                <button onClick={() => importFileRef.current.click()} className="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-xl font-black text-xs border border-emerald-100 flex items-center gap-2 hover:bg-emerald-600 hover:text-white transition-all"><i data-lucide="upload-cloud" className="w-4 h-4"></i> IMPORT CSV</button>
                            )}
                            <button onClick={() => setCurrentUserAgency('')} className="bg-rose-50 text-rose-600 p-3 rounded-xl hover:bg-rose-600 hover:text-white transition-all"><i data-lucide="power" className="w-5 h-5"></i></button>
                        </div>
                    </div>

                    <div className="flex flex-col xl:flex-row gap-6">
                        {/* Sidebar */}
                        {currentUserAgency !== 'Admin' && (
                            <div className="sidebar-container">
                                <div className="bg-white p-6 rounded-2xl shadow-md border border-slate-100 sticky top-6">
                                    <h2 className="text-lg font-black mb-6 flex gap-2 items-center text-slate-800 uppercase"><i data-lucide="user-plus" className="text-indigo-600"></i> คีย์รายชื่อ</h2>
                                    <form onSubmit={addToDraft} className="space-y-4 font-bold text-slate-400 text-[11px]">
                                        <div>วันที่ส่ง<span className="required-star">*</span><input type="date" value={formData.submissionDate} onChange={e => setFormData({...formData, submissionDate: e.target.value})} className="w-full bg-slate-50 p-3 rounded-lg text-sm border text-slate-700" required /></div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div>ชื่อ<span className="required-star">*</span><input type="text" value={formData.firstName} onChange={e => setFormData({...formData, firstName: e.target.value})} className="w-full bg-slate-50 p-3 rounded-lg text-sm border text-slate-700" required /></div>
                                            <div>นามสกุล<span className="required-star">*</span><input type="text" value={formData.lastName} onChange={e => setFormData({...formData, lastName: e.target.value})} className="w-full bg-slate-50 p-3 rounded-lg text-sm border text-slate-700" required /></div>
                                        </div>
                                        <div>เบอร์โทร (10 หลัก)<span className="required-star">*</span><input type="text" maxLength="10" value={formData.tel} onChange={e => setFormData({...formData, tel: e.target.value.replace(/\D/g,'')})} className="w-full bg-slate-50 p-3 rounded-lg text-sm border text-slate-700" required /></div>
                                        <div>อีเมล<span className="required-star">*</span><input type="email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} className="w-full bg-slate-50 p-3 rounded-lg text-sm border text-slate-700" required /></div>
                                        <div>ตำแหน่ง<span className="required-star">*</span><select value={formData.position} onChange={e => setFormData({...formData, position: e.target.value})} className="w-full bg-slate-50 p-3 rounded-lg text-sm border text-slate-700" required><option value="">เลือกตำแหน่ง...</option><option value="Sales Executive">Sales Executive</option><option value="Supervisor">Supervisor</option><option value="Office Support">Office Support</option></select></div>
                                        <div>สาขา<span className="required-star">*</span><input type="text" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} className="w-full bg-slate-50 p-3 rounded-lg text-sm border text-slate-700" required /></div>
                                        <button className="w-full bg-indigo-600 text-white py-4 rounded-xl font-black uppercase text-sm shadow-lg hover:bg-indigo-700 transition-all">+ เพิ่มลงร่าง</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        <div className="flex-1 min-w-0 space-y-4">
                            {/* Filter */}
                            <div className="bg-white p-4 rounded-2xl shadow-md border border-slate-200 grid grid-cols-1 md:grid-cols-6 gap-4 items-end">
                                <div className="space-y-1"><label className="text-[10px] font-black uppercase text-slate-400">วันที่ส่ง</label><input type="date" value={filters.subDate} onChange={e => setFilters({...filters, subDate: e.target.value})} className="filter-input" /></div>
                                <div className="space-y-1"><label className="text-[10px] font-black uppercase text-slate-400">ชื่อ</label><input type="text" placeholder="ค้นชื่อ..." value={filters.name} onChange={e => setFilters({...filters, name: e.target.value})} className="filter-input" /></div>
                                <div className="space-y-1"><label className="text-[10px] font-black uppercase text-slate-400">ตำแหน่ง</label><select value={filters.position} onChange={e => setFilters({...filters, position: e.target.value})} className="filter-input"><option value="">ทั้งหมด</option><option value="Sales Executive">Sales Executive</option></select></div>
                                <div className="space-y-1"><label className="text-[10px] font-black uppercase text-slate-400">สาขา</label><input type="text" placeholder="สาขา..." value={filters.location} onChange={e => setFilters({...filters, location: e.target.value})} className="filter-input" /></div>
                                <div className="space-y-1"><label className="text-[10px] font-black uppercase text-slate-400">สัมภาษณ์</label><input type="date" value={filters.intDate} onChange={e => setFilters({...filters, intDate: e.target.value})} className="filter-input" /></div>
                                <button onClick={() => setFilters({subDate:'', name:'', position:'', location:'', intDate:''})} className="bg-slate-100 py-2.5 rounded-lg font-black text-[11px] border">ล้างกรอง</button>
                            </div>

                            {/* Draft */}
                            {currentUserAgency !== 'Admin' && draftList.length > 0 && (
                                <div className="bg-white rounded-2xl shadow-xl border-2 border-amber-200 overflow-hidden">
                                    <div className="bg-amber-50 p-4 flex justify-between items-center border-b border-amber-200 font-black text-amber-800 text-xs">รายการรอตรวจสอบ ({draftList.length})
                                        <div className="flex gap-2">
                                            <button onClick={handleBulkCheck} className="bg-amber-500 text-white px-5 py-2 rounded-lg font-black shadow-md uppercase text-[11px] hover:bg-amber-600 transition-all">1. Check Duplicate All</button>
                                            {isChecked && <button onClick={saveAllToCloud} className="bg-emerald-600 text-white px-5 py-2 rounded-lg font-black shadow-md uppercase text-[11px] animate-bounce">2. บันทึกเข้า Cloud</button>}
                                        </div>
                                    </div>
                                    <div className="overflow-x-auto"><table className="w-full"><thead><tr><th>ชื่อ-นามสกุล</th><th>เบอร์โทร</th><th>อีเมล</th><th>ตำแหน่ง</th><th className="bg-amber-600 text-white">ผลตรวจสอบ</th></tr></thead><tbody>{draftList.map((item) => (<tr key={item.draftId} className="draft-row"><td>{item.firstName} {item.lastName}</td><td className="font-bold">{item.tel}</td><td className="text-xs text-slate-500">{item.email}</td><td>{item.position}</td><td><span className={`px-4 py-1 rounded-full text-[10px] font-black ${item.status === 'No Dup' ? 'bg-emerald-100 text-emerald-600' : (item.status.includes('Dup') ? 'bg-rose-100 text-rose-600' : 'bg-slate-100 text-slate-400')}`}>{item.status}</span></td></tr>))}</tbody></table></div>
                                </div>
                            )}

                            {/* Main Table */}
                            <div className="bg-white rounded-2xl shadow-lg overflow-hidden border border-slate-200">
                                <div className="bg-slate-50 p-4 border-b font-black text-slate-800 flex justify-between items-center text-xs uppercase"><span>ฐานข้อมูลหลัก - หน้า {currentPage} / {totalPages}</span></div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-center">
                                        <thead><tr><th>วันที่ส่ง</th><th className="text-left">ชื่อ-นามสกุล</th><th>เบอร์โทร</th><th>ตำแหน่ง</th><th>ตรวจสอบ</th><th className="bg-indigo-600 text-white">Resume</th><th>สัมภาษณ์</th><th>ผล</th><th>จัดการ</th></tr></thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {paginatedItems.map(item => {
                                                const isNoDup = item.prescreenStatus === 'No Dup' || item.interviewStatus === 'ผ่าน';
                                                return (
                                                    <tr key={item.id} className="hover:bg-slate-50/50 transition-all text-center">
                                                        <td className="text-[10px] font-bold text-slate-400">{item.submissionDate}</td>
                                                        <td className="candidate-name">{item.firstName ? `${item.firstName} ${item.lastName}` : (item.name || '-') }</td>
                                                        <td className="text-[11px] font-bold text-slate-400">{item.tel}</td>
                                                        <td><span className="text-[10px] font-black bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded">{item.position}</span></td>
                                                        <td><span className={`px-2 py-1 rounded-full text-[10px] font-black inline-block ${isNoDup ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>{item.prescreenStatus}</span></td>
                                                        <td>
                                                            <div className="flex justify-center items-center gap-1">
                                                                {item.resumeLink ? (
                                                                    <div className="flex gap-1">
                                                                        <a href={item.resumeLink} target="_blank" className="text-indigo-600 p-1 bg-indigo-50 rounded hover:scale-110 transition-all"><i data-lucide="eye" className="w-4 h-4"></i></a>
                                                                        {currentUserAgency === 'Admin' && (<a href={getDownloadLink(item.resumeLink)} target="_blank" className="text-emerald-600 p-1 bg-emerald-50 rounded text-[8px] font-black border border-emerald-100">DL</a>)}
                                                                    </div>
                                                                ) : (currentUserAgency !== 'Admin' && isNoDup ? (<button onClick={() => { setTargetId(item.id); fileInputRef.current.click(); }} className="text-indigo-600 text-[9px] font-black border-2 border-dashed border-indigo-200 px-2 py-1 rounded hover:bg-indigo-50">{isUploading === item.id ? "..." : "+ Resume"}</button>) : <i data-lucide="lock" className="text-slate-200 w-4 h-4 mx-auto"></i>)}
                                                            </div>
                                                        </td>
                                                        <td>{currentUserAgency === 'Admin' ? <input type="date" value={item.interviewDate || ''} onChange={e => window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id), { interviewDate: e.target.value })} className="admin-input" /> : (item.interviewDate || '-')}</td>
                                                        <td>{currentUserAgency === 'Admin' ? <select value={item.interviewStatus} onChange={e => window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id), { interviewStatus: e.target.value })} className="admin-input"><option value="รอผล">รอผล</option><option value="ผ่าน">ผ่าน</option><option value="ไม่ผ่าน">ไม่ผ่าน</option><option value="สละสิทธิ์">สละสิทธิ์</option></select> : <span className={`px-2 py-0.5 rounded-full text-[10px] font-black inline-block whitespace-nowrap ${item.interviewStatus === 'ผ่าน' ? 'bg-indigo-600 text-white shadow-sm' : 'bg-slate-100 text-slate-500'}`}>{item.interviewStatus}</span>}</td>
                                                        <td><button onClick={() => { if(confirm("ลบข้อมูล?")) window.FB.methods.deleteDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id)) }} className="text-rose-200 hover:text-rose-600 transition-all active:scale-90"><i data-lucide="trash-2" className="w-4 h-4 mx-auto"></i></button></td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                                {totalPages > 1 && (
                                    <div className="bg-slate-50 p-3 flex justify-center items-center gap-2 border-t">
                                        <button disabled={currentPage === 1} onClick={() => setCurrentPage(prev => prev - 1)} className="pagination-btn disabled:opacity-30">Prev</button>
                                        <span className="font-black text-xs uppercase">Page {currentPage} of {totalPages}</span>
                                        <button disabled={currentPage === totalPages} onClick={() => setCurrentPage(prev => prev + 1)} className="pagination-btn disabled:opacity-30">Next</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {popup && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[100] p-6 text-center">
                            <div className="bg-white p-10 rounded-[2.5rem] max-w-sm w-full shadow-2xl border-t-4 border-indigo-600">
                                <h3 className="text-xl font-black mb-4 uppercase">{popup.title}</h3>
                                <p className="text-slate-500 font-bold mb-8 text-sm">{popup.msg}</p>
                                <button onClick={() => setPopup(null)} className="w-full bg-slate-900 text-white py-4 rounded-xl font-black uppercase tracking-widest">CLOSE</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
