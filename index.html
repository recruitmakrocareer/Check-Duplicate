<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Checker | Full Resilience Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass-morphism { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAX6alx5rJRDRd8Wcvj4rDLLsYwz37NXEQ",
            authDomain: "recruit-operation-project.firebaseapp.com",
            projectId: "recruit-operation-project",
            storageBucket: "recruit-operation-project.firebasestorage.app",
            messagingSenderId: "857023562077",
            appId: "1:857023562077:web:669da5cfc20cf7707e68b4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.FB = { db, auth, methods: { signInAnonymously, onAuthStateChanged, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query } };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        const App = () => {
            // สำคัญ: อัปเดต URL ตัวล่าสุดของคุณที่นี่
            const scriptURL = "https://script.google.com/macros/s/AKfycbzjWGRV6zwEeAUYQlUZ-Op1U37TW6NyOWHI908E14h07wBFQAO2-qvnbq_QtW2SdmOY/exec";

            const [user, setUser] = useState(null);
            const [currentUserAgency, setCurrentUserAgency] = useState('');
            const [loginEmail, setLoginEmail] = useState('');
            const [isLoading, setIsLoading] = useState(true);
            const [cloudCandidates, setCloudCandidates] = useState([]);
            const [referenceDb, setReferenceDb] = useState([]);
            const [isUploading, setIsUploading] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [popup, setPopup] = useState(null);
            const [targetId, setTargetId] = useState(null);
            const fileInputRef = useRef(null);

            const [formData, setFormData] = useState({ 
                submissionDate: new Date().toISOString().split('T')[0], name: '', tel: '', email: '', position: '', location: '' 
            });

            const refreshIcons = useCallback(() => { if (window.lucide) setTimeout(() => lucide.createIcons(), 100); }, []);

            useEffect(() => {
                if (!window.FB) return;
                const { auth, methods } = window.FB;
                methods.signInAnonymously(auth).catch(console.error);
                methods.onAuthStateChanged(auth, (u) => { 
                    setUser(u);
                    fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vTsDZSCTRBCQ3LojqsCmVPea7qo7uB9VyXne9aZSlqxo8yntizND6o7bpRQfS2rFFHthMB-N0YIqTL6/pub?output=csv')
                    .then(r => r.text()).then(res => {
                        const data = Papa.parse(res, { header: true }).data;
                        setReferenceDb(data.filter(r => r['Name-Surname']).map(r => ({ name: (r['Name-Surname']||'').trim(), tel: (r['Tel']||'').trim() })));
                        setIsLoading(false);
                        refreshIcons();
                    });
                });
            }, []);

            useEffect(() => {
                if (!user || !currentUserAgency) return;
                const { db, methods } = window.FB;
                const q = methods.query(methods.collection(db, 'candidates'));
                return methods.onSnapshot(q, (sn) => { setCloudCandidates(sn.docs.map(d => ({ id: d.id, ...d.data() }))); refreshIcons(); });
            }, [user, currentUserAgency]);

            const handleLogin = (e) => {
                e.preventDefault();
                const accessMap = { "admin@company.com": "Admin", "manpower@agency.com": "Manpower", "metalent@agency.com": "Me Talent", "prtr@agency.com": "PRTR", "talentvis@agency.com": "Talentvis", "techgrid@agency.com": "Techgrid" };
                const agency = accessMap[loginEmail.trim().toLowerCase()];
                if (agency) { setCurrentUserAgency(agency); refreshIcons(); }
                else setPopup({ title: "Error", msg: "ไม่พบอีเมลในระบบ" });
            };

            const onFileChange = async (e) => {
                const file = e.target.files[0];
                if (!file || !targetId) return;
                if (file.type !== 'application/pdf') return setPopup({ title: "Error", msg: "กรุณาอัปโหลด PDF เท่านั้น" });

                setIsUploading(targetId);
                const reader = new FileReader();
                reader.onload = async (f) => {
                    const base64Data = f.target.result.split(',')[1];
                    try {
                        const candidate = cloudCandidates.find(c => c.id === targetId);
                        const response = await fetch(scriptURL, {
                            method: "POST",
                            body: JSON.stringify({ fileData: base64Data, mimeType: file.type, fileName: `${candidate.name}_CV.pdf` })
                        });
                        const result = await response.json();
                        if (result.status === "success") {
                            await window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', targetId), { resumeLink: result.url });
                            setPopup({ title: "สำเร็จ", msg: "อัปโหลดเรียบร้อยแล้ว" });
                        } else throw new Error(result.message);
                    } catch (err) {
                        setPopup({ title: "Error", msg: "เกิดข้อผิดพลาด: " + err.message });
                    } finally { setIsUploading(null); setTargetId(null); e.target.value = ''; }
                };
                reader.readAsDataURL(file);
            };

            const filteredItems = useMemo(() => {
                return cloudCandidates.filter(item => {
                    if (currentUserAgency !== 'Admin' && item.agency !== currentUserAgency) return false;
                    const search = searchTerm.toLowerCase();
                    return !searchTerm || item.name.toLowerCase().includes(search) || item.tel.includes(search);
                }).sort((a, b) => b.createdAt - a.createdAt);
            }, [cloudCandidates, currentUserAgency, searchTerm]);

            if (isLoading) return <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white"><div className="loader scale-150 mb-6"></div><p>Loading System...</p></div>;

            if (!currentUserAgency) return (
                <div className="h-screen flex items-center justify-center bg-slate-950 p-6">
                    <div className="glass-morphism w-full max-w-md rounded-[3rem] p-12 text-center shadow-2xl">
                        <div className="bg-indigo-600 w-20 h-20 rounded-3xl flex items-center justify-center text-white mx-auto mb-8 shadow-xl"><i data-lucide="lock" className="w-10 h-10"></i></div>
                        <h1 className="text-2xl font-black mb-10 text-slate-800 uppercase tracking-tighter">Candidate Checker Login</h1>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="email" value={loginEmail} onChange={e => setLoginEmail(e.target.value)} className="w-full bg-white p-5 rounded-2xl text-center font-bold outline-none border-2 border-slate-100" placeholder="agency@email.com" required />
                            <button className="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-lg hover:bg-indigo-700 transition-all uppercase active:scale-95">Enter System</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-[1750px] mx-auto">
                    <input type="file" ref={fileInputRef} onChange={onFileChange} accept="application/pdf" className="hidden" />
                    <div className="bg-white rounded-[2rem] p-6 shadow-xl flex items-center justify-between mb-8">
                        <div className="flex items-center gap-4">
                            <div className="bg-slate-900 p-4 rounded-2xl text-white shadow-lg"><i data-lucide="users"></i></div>
                            <div><h1 className="text-xl font-black uppercase text-slate-800">{currentUserAgency} SESSION</h1><p className="text-[10px] text-emerald-500 font-bold">• SYSTEM ONLINE</p></div>
                        </div>
                        <button onClick={() => setCurrentUserAgency('')} className="bg-rose-50 text-rose-600 p-4 rounded-2xl hover:bg-rose-600 hover:text-white transition-all"><i data-lucide="log-out"></i></button>
                    </div>

                    <div className="grid grid-cols-1 xl:grid-cols-12 gap-8">
                        {currentUserAgency !== 'Admin' && (
                            <div className="xl:col-span-3">
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-white sticky top-8">
                                    <h2 className="text-lg font-black mb-8 flex gap-3 items-center text-slate-800 uppercase"><i data-lucide="plus-circle" className="text-indigo-600"></i> New Entry</h2>
                                    <form onSubmit={async (e) => {
                                        e.preventDefault();
                                        const isDup = [...referenceDb, ...cloudCandidates].some(c => (c.name.replace(/\s/g,'') === formData.name.replace(/\s/g,'')) || (c.tel === formData.tel));
                                        if (isDup) return setPopup({ title: "ข้อมูลซ้ำ!", msg: "ชื่อหรือเบอร์โทรนี้มีในระบบแล้ว" });
                                        await window.FB.methods.addDoc(window.FB.methods.collection(window.FB.db, 'candidates'), { ...formData, agency: currentUserAgency, prescreenStatus: 'รอตรวจสอบ', interviewStatus: 'รอผล', createdAt: Date.now() });
                                        setFormData({...formData, name:'', tel:'', email:''});
                                        setPopup({ title: "สำเร็จ", msg: "บันทึกเรียบร้อย" });
                                    }} className="space-y-4">
                                        <input type="text" placeholder="ชื่อ-นามสกุล" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none" required />
                                        <input type="text" placeholder="เบอร์โทรศัพท์" value={formData.tel} onChange={e => setFormData({...formData, tel: e.target.value})} className="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none" required />
                                        <select value={formData.position} onChange={e => setFormData({...formData, position: e.target.value})} className="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none" required>
                                            <option value="">เลือกตำแหน่ง...</option>
                                            <option value="Sales Executive">Sales Executive</option>
                                            <option value="Supervisor">Supervisor</option>
                                            <option value="Office Support">Office Support</option>
                                        </select>
                                        <input type="text" placeholder="สาขา/พื้นที่" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} className="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none" required />
                                        <button className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black mt-4 hover:bg-black transition-all">Submit</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        <div className={currentUserAgency === 'Admin' ? 'xl:col-span-12' : 'xl:col-span-9'}>
                            <div className="bg-white p-5 rounded-[2rem] shadow-lg mb-6 flex gap-4">
                                <input type="text" placeholder="ค้นหาชื่อ หรือ เบอร์โทรศัพท์..." className="w-full bg-slate-50 p-4 rounded-2xl font-bold outline-none" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            </div>
                            <div className="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-950 text-white text-[10px] font-black uppercase tracking-widest">
                                            <tr>
                                                <th className="p-6">วันที่</th><th className="p-6">ชื่อ-นามสกุล</th><th className="p-6">เบอร์โทร</th>
                                                <th className="p-6">ตำแหน่ง</th><th className="p-6 text-center">ตรวจสอบ</th><th className="p-6 text-center">CV</th>
                                                <th className="p-6 text-center">ผลสัมภาษณ์</th><th className="p-6 text-center">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {filteredItems.map(item => (
                                                <tr key={item.id} className="hover:bg-slate-50 transition-all group">
                                                    <td className="p-6 text-xs text-slate-400 font-bold">{item.submissionDate}</td>
                                                    <td className="p-6 font-black text-slate-800">{item.name}</td>
                                                    <td className="p-6 text-xs text-slate-400 font-bold">{item.tel}</td>
                                                    <td className="p-6"><span className="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg text-[10px] font-black">{item.position}</span></td>
                                                    <td className="p-6 text-center">
                                                        {currentUserAgency === 'Admin' ? (
                                                            <select value={item.prescreenStatus} onChange={e => window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id), { prescreenStatus: e.target.value })} className="p-2 border rounded-xl font-bold text-[10px] outline-none shadow-sm">
                                                                <option value="รอตรวจสอบ">รอตรวจสอบ</option><option value="ผ่าน">ผ่าน</option><option value="ไม่ผ่าน">ไม่ผ่าน</option>
                                                            </select>
                                                        ) : (
                                                            <span className={`px-4 py-1.5 rounded-full text-[10px] font-black ${item.prescreenStatus === 'ผ่าน' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-400'}`}>{item.prescreenStatus}</span>
                                                        )}
                                                    </td>
                                                    <td className="p-6 text-center">
                                                        {item.prescreenStatus === 'ผ่าน' ? (
                                                            item.resumeLink ? <a href={item.resumeLink} target="_blank" className="text-indigo-600 hover:scale-110 inline-block"><i data-lucide="file-text"></i></a> : 
                                                            <button onClick={() => { setTargetId(item.id); fileInputRef.current.click(); }} className="text-indigo-500 text-[10px] font-black border-2 border-dashed p-2 rounded-lg">{isUploading === item.id ? "..." : "Upload"}</button>
                                                        ) : <i data-lucide="lock" className="text-slate-200 mx-auto w-4"></i>}
                                                    </td>
                                                    <td className="p-6 text-center">
                                                        <span className={`px-4 py-1.5 rounded-full text-[10px] font-black ${item.interviewStatus === 'ผ่าน' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-500'}`}>{item.interviewStatus}</span>
                                                    </td>
                                                    <td className="p-6 text-center">
                                                        <button onClick={() => { if(confirm("ลบข้อมูล?")) window.FB.methods.deleteDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id)) }} className="text-rose-300 hover:text-rose-600 opacity-0 group-hover:opacity-100 transition-all"><i data-lucide="trash-2" className="w-5"></i></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    {popup && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-md flex items-center justify-center z-[100] p-6">
                            <div className="bg-white p-10 rounded-[3rem] max-w-sm w-full text-center shadow-2xl">
                                <h3 className="text-xl font-black mb-4 text-slate-800 uppercase">{popup.title}</h3>
                                <p className="text-slate-500 text-sm mb-8">{popup.msg}</p>
                                <button onClick={() => setPopup(null)} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black">Close</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
