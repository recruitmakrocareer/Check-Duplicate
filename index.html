<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Checker | Final Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; font-size: 13px; }
        th { white-space: nowrap; font-size: 11px !important; padding: 12px 4px !important; background-color: #0f172a; color: white; border: 1px solid #334155; }
        td { font-size: 12.5px !important; padding: 10px 4px !important; border-bottom: 1px solid #e2e8f0; text-align: center; vertical-align: middle; }
        .sidebar-container { width: 320px; flex-shrink: 0; }
        .filter-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .filter-group { display: grid; grid-template-cols: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
        .filter-input { width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; padding: 6px 8px; font-size: 11px; font-weight: 600; outline: none; background: #f8fafc; }
        .admin-edit { width: 100%; font-size: 11px; padding: 4px; border-radius: 4px; border: 1px solid #e2e8f0; font-weight: bold; }
        .popup-animate { animation: scaleIn 0.3s ease-out; }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAX6alx5rJRDRd8Wcvj4rDLLsYwz37NXEQ",
            authDomain: "recruit-operation-project.firebaseapp.com",
            projectId: "recruit-operation-project",
            storageBucket: "recruit-operation-project.firebasestorage.app",
            messagingSenderId: "857023562077",
            appId: "1:857023562077:web:669da5cfc20cf7707e68b4"
        };
        const app = initializeApp(firebaseConfig);
        window.FB = { db: getFirestore(app), auth: getAuth(app), methods: { signInAnonymously, onAuthStateChanged, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, writeBatch } };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const App = () => {
            const scriptURL = "https://script.google.com/macros/s/AKfycbyHSv_7wt3jlYJQWVlnE5GF06y3tgf-FLcyz6AQDnNoBtIs0PqfCVw5AM_SYlSNxJHYhg/exec";

            const [user, setUser] = useState(null);
            const [currentUserAgency, setCurrentUserAgency] = useState('');
            const [loginEmail, setLoginEmail] = useState('');
            const [isLoading, setIsLoading] = useState(true);
            const [cloudCandidates, setCloudCandidates] = useState([]);
            const [referenceDb, setReferenceDb] = useState([]);
            const [gmailDb, setGmailDb] = useState([]); 
            const [draftList, setDraftList] = useState([]);
            const [isChecked, setIsChecked] = useState(false);
            const [currentPage, setCurrentPage] = useState(1);
            const itemsPerPage = 50;

            // --- เพิ่ม Filter State ---
            const [filters, setFilters] = useState({ name: '', subDate: '', status: '', intDate: '', intResult: '' });
            const [popup, setPopup] = useState(null);
            const [isUploading, setIsUploading] = useState(null);
            const [targetId, setTargetId] = useState(null);
            const fileInputRef = useRef(null);

            const [formData, setFormData] = useState({ submissionDate: new Date().toISOString().split('T')[0], firstName: '', lastName: '', tel: '', email: '', position: '', location: '' });

            const normalize = (s) => s ? s.toString().toLowerCase().replace(/[^a-z0-9ก-ฮ]/g, '').trim() : '';
            const getDownloadLink = (url) => { if (!url) return "#"; const fileId = url.match(/[-\w]{25,}/); return fileId ? `https://drive.google.com/uc?id=${fileId[0]}&export=download` : url; };

            useEffect(() => {
                if (!window.FB) return;
                window.FB.methods.signInAnonymously(window.FB.auth);
                window.FB.methods.onAuthStateChanged(window.FB.auth, (u) => {
                    setUser(u);
                    fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vTsDZSCTRBCQ3LojqsCmVPea7qo7uB9VyXne9aZSlqxo8yntizND6o7bpRQfS2rFFHthMB-N0YIqTL6/pub?output=csv')
                    .then(r => r.text()).then(res => {
                        const data = Papa.parse(res, { header: true }).data;
                        setReferenceDb(data.filter(r => r['Name-Surname']).map(r => ({ name: (r['Name-Surname']||'').trim(), tel: (r['Tel']||'').trim(), email: (r['Email']||'').trim() })));
                        return fetch(scriptURL + "?action=getGmail");
                    })
                    .then(r => r.json()).then(emails => { setGmailDb(emails); setIsLoading(false); setTimeout(() => lucide.createIcons(), 100); })
                    .catch(() => setIsLoading(false));
                });
            }, []);

            useEffect(() => {
                if (!user || !currentUserAgency) return;
                const q = window.FB.methods.query(window.FB.methods.collection(window.FB.db, 'candidates'));
                return window.FB.methods.onSnapshot(q, (sn) => { setCloudCandidates(sn.docs.map(d => ({ id: d.id, ...d.data() }))); setTimeout(() => lucide.createIcons(), 100); });
            }, [user, currentUserAgency]);

            // --- Logic การกรองข้อมูลแบบ Full Filters ---
            const allFiltered = useMemo(() => {
                return cloudCandidates.filter(item => {
                    if (currentUserAgency !== 'Admin' && item.agency !== currentUserAgency) return false;
                    const fullName = normalize((item.firstName || '') + (item.lastName || '') + (item.name || ''));
                    
                    const matchName = fullName.includes(normalize(filters.name));
                    const matchSubDate = !filters.subDate || item.submissionDate === filters.subDate;
                    const matchStatus = !filters.status || item.prescreenStatus === filters.status;
                    const matchIntDate = !filters.intDate || item.interviewDate === filters.intDate;
                    const matchIntResult = !filters.intResult || item.interviewStatus === filters.intResult;

                    return matchName && matchSubDate && matchStatus && matchIntDate && matchIntResult;
                }).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            }, [cloudCandidates, currentUserAgency, filters]);

            const totalPages = Math.max(1, Math.ceil(allFiltered.length / itemsPerPage));
            const paginatedItems = allFiltered.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

            const handleBulkCheck = () => {
                const updated = draftList.map((item) => {
                    const email = item.email.toLowerCase().trim();
                    const isDupExt = [...referenceDb, ...cloudCandidates].some(c => normalize((c.firstName||'')+(c.lastName||'')) === normalize(item.firstName+item.lastName) || normalize(c.tel) === normalize(item.tel) || (email && normalize(c.email) === email));
                    const isDupGmail = gmailDb.includes(email);
                    let status = isDupExt ? 'Dup' : (isDupGmail ? 'Dup (Gmail)' : 'No Dup');
                    return { ...item, status };
                });
                setDraftList(updated); setIsChecked(true);
            };

            const onFileChange = async (e) => {
                const file = e.target.files[0]; if (!file || !targetId) return;
                setIsUploading(targetId);
                const reader = new FileReader();
                reader.onload = async (f) => {
                    const base64 = f.target.result.split(',')[1];
                    try {
                        const response = await fetch(scriptURL, { method: "POST", body: JSON.stringify({ fileData: base64, mimeType: file.type, fileName: `${file.name}` }) });
                        const res = await response.json();
                        if (res.status === "success") {
                            await window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', targetId), { resumeLink: res.url });
                            setPopup({ title: "SUCCESS", msg: "อัปโหลด Resume สำเร็จแล้ว!" });
                        }
                    } finally { setIsUploading(null); setTargetId(null); e.target.value = ''; }
                };
                reader.readAsDataURL(file);
            };

            if (isLoading) return <div className="h-screen flex items-center justify-center font-black">SYNCING...</div>;

            if (!currentUserAgency) return (
                <div className="h-screen flex items-center justify-center bg-slate-900">
                    <form onSubmit={(e) => {
                        e.preventDefault();
                        const map = { "admin@company.com": "Admin", "manpower@agency.com": "Manpower", "metalent@agency.com": "Me Talent", "prtr@agency.com": "PRTR", "talentvis@agency.com": "Talentvis", "techgrid@agency.com": "Techgrid" };
                        const agency = map[loginEmail.trim().toLowerCase()];
                        if (agency) setCurrentUserAgency(agency); else alert("Login Failed");
                    }} className="bg-white p-10 rounded-3xl w-80 shadow-2xl">
                        <h1 className="text-xl font-black mb-6 text-center">LOGIN</h1>
                        <input type="email" value={loginEmail} onChange={e => setLoginEmail(e.target.value)} className="w-full border p-3 rounded-xl mb-4 text-center" placeholder="Email" required />
                        <button className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">ENTER</button>
                    </form>
                </div>
            );

            return (
                <div className="p-4 max-w-full">
                    <input type="file" ref={fileInputRef} onChange={onFileChange} accept="application/pdf" className="hidden" />
                    
                    <div className="flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm border">
                        <h1 className="font-black uppercase tracking-tight">{currentUserAgency} SESSION</h1>
                        <button onClick={() => setCurrentUserAgency('')} className="bg-rose-50 text-rose-600 p-2.5 rounded-xl"><i data-lucide="power"></i></button>
                    </div>

                    <div className="flex flex-col xl:flex-row gap-6">
                        {/* Sidebar Left */}
                        {currentUserAgency !== 'Admin' && (
                            <div className="sidebar-container bg-white p-6 rounded-2xl shadow-md border h-fit sticky top-4">
                                <h2 className="font-black mb-4 flex items-center gap-2 uppercase text-xs text-indigo-600"><i data-lucide="user-plus"></i> เพิ่มรายชื่อ</h2>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    setDraftList([...draftList, { ...formData, draftId: Date.now(), status: 'Pending' }]);
                                    setFormData({ ...formData, firstName: '', lastName: '', tel: '', email: '' });
                                    setIsChecked(false);
                                }} className="space-y-3">
                                    <input type="date" value={formData.submissionDate} onChange={e => setFormData({...formData, submissionDate: e.target.value})} className="w-full border p-2 rounded-lg text-sm bg-slate-50" required />
                                    <div className="grid grid-cols-2 gap-2">
                                        <input type="text" placeholder="ชื่อ" value={formData.firstName} onChange={e => setFormData({...formData, firstName: e.target.value})} className="border p-2 rounded-lg text-sm" required />
                                        <input type="text" placeholder="นามสกุล" value={formData.lastName} onChange={e => setFormData({...formData, lastName: e.target.value})} className="border p-2 rounded-lg text-sm" required />
                                    </div>
                                    <input type="text" placeholder="เบอร์โทร" value={formData.tel} onChange={e => setFormData({...formData, tel: e.target.value})} className="w-full border p-2 rounded-lg text-sm" required />
                                    <input type="email" placeholder="อีเมล" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} className="w-full border p-2 rounded-lg text-sm" required />
                                    <select value={formData.position} onChange={e => setFormData({...formData, position: e.target.value})} className="w-full border p-2 rounded-lg text-sm" required><option value="">ตำแหน่ง...</option><option value="Sales Executive">Sales Executive</option></select>
                                    <input type="text" placeholder="สาขา" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} className="w-full border p-2 rounded-lg text-sm" required />
                                    <button className="w-full bg-indigo-600 text-white py-3 rounded-xl font-black uppercase text-xs">+ เพิ่มลงร่าง</button>
                                </form>
                            </div>
                        )}

                        {/* Content Area */}
                        <div className="flex-1 space-y-4 min-w-0">
                            
                            {/* Filter Bar (ใหม่) */}
                            <div className="filter-card">
                                <div className="filter-group">
                                    <div><label className="text-[10px] font-bold text-slate-400 ml-1">วันที่ส่ง</label><input type="date" value={filters.subDate} onChange={e => setFilters({...filters, subDate: e.target.value})} className="filter-input" /></div>
                                    <div><label className="text-[10px] font-bold text-slate-400 ml-1">ชื่อ-นามสกุล</label><input type="text" placeholder="ค้นหาชื่อ..." value={filters.name} onChange={e => setFilters({...filters, name: e.target.value})} className="filter-input" /></div>
                                    <div><label className="text-[10px] font-bold text-slate-400 ml-1">สถานะตรวจสอบ</label>
                                        <select value={filters.status} onChange={e => setFilters({...filters, status: e.target.value})} className="filter-input">
                                            <option value="">ทั้งหมด</option>
                                            <option value="No Dup">No Dup</option>
                                            <option value="Dup">Dup</option>
                                            <option value="Dup (Gmail)">Dup (Gmail)</option>
                                        </select>
                                    </div>
                                    <div><label className="text-[10px] font-bold text-slate-400 ml-1">วันที่สัมภาษณ์</label><input type="date" value={filters.intDate} onChange={e => setFilters({...filters, intDate: e.target.value})} className="filter-input" /></div>
                                    <div><label className="text-[10px] font-bold text-slate-400 ml-1">ผลสัมภาษณ์</label>
                                        <select value={filters.intResult} onChange={e => setFilters({...filters, intResult: e.target.value})} className="filter-input">
                                            <option value="">ทั้งหมด</option>
                                            <option value="รอผล">รอผล</option>
                                            <option value="ผ่าน">ผ่าน</option>
                                            <option value="ไม่ผ่าน">ไม่ผ่าน</option>
                                        </select>
                                    </div>
                                    <div className="flex items-end"><button onClick={() => setFilters({name:'', subDate:'', status:'', intDate:'', intResult:''})} className="w-full bg-slate-100 border p-2 rounded-lg text-[10px] font-black hover:bg-slate-200 uppercase">ล้างตัวกรอง</button></div>
                                </div>
                            </div>

                            {draftList.length > 0 && (
                                <div className="bg-white rounded-xl border-2 border-amber-200 overflow-hidden shadow-xl">
                                    <div className="bg-amber-50 p-4 flex justify-between items-center border-b font-black text-xs uppercase text-amber-800 tracking-wider">
                                        รายการรอตรวจสอบ ({draftList.length})
                                        <div className="flex gap-2">
                                            <button onClick={handleBulkCheck} className="bg-amber-500 text-white px-5 py-2 rounded-lg font-black text-[10px] uppercase shadow-md active:scale-95">1. Check Duplicate</button>
                                            {isChecked && <button onClick={async () => {
                                                const promises = draftList.map(item => window.FB.methods.addDoc(window.FB.methods.collection(window.FB.db, 'candidates'), { ...item, agency: currentUserAgency, prescreenStatus: item.status, interviewStatus: 'รอผล', createdAt: Date.now() }));
                                                await Promise.all(promises); setDraftList([]); setIsChecked(false);
                                                setPopup({ title: "SUCCESS", msg: "บันทึกข้อมูลเรียบร้อยแล้ว" });
                                            }} className="bg-emerald-600 text-white px-5 py-2 rounded-lg font-black text-[10px] uppercase shadow-md animate-bounce">2. บันทึกเข้า Cloud</button>}
                                        </div>
                                    </div>
                                    <div className="overflow-x-auto"><table className="w-full text-xs"><thead><tr><th>ชื่อ-นามสกุล</th><th>เบอร์โทร</th><th>ผลตรวจ</th></tr></thead><tbody>{draftList.map((item) => (<tr key={item.draftId} className="draft-row"><td>{item.firstName} {item.lastName}</td><td className="font-bold">{item.tel}</td><td><span className={`px-4 py-1 rounded-full text-[10px] font-black ${item.status === 'No Dup' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>{item.status}</span></td></tr>))}</tbody></table></div>
                                </div>
                            )}

                            {/* Main Table (เพิ่มคอลัมน์ผลสัมภาษณ์) */}
                            <div className="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                                <div className="bg-slate-50 p-4 border-b font-black text-xs flex justify-between uppercase text-slate-500">
                                    <span>ฐานข้อมูลหลัก - หน้า {currentPage} / {totalPages} (พบ {allFiltered.length} รายการ)</span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full">
                                        <thead>
                                            <tr>
                                                <th>วันที่ส่ง</th>
                                                <th className="text-left">ชื่อ-นามสกุล</th>
                                                <th>เบอร์โทร</th>
                                                <th>ตรวจสอบ</th>
                                                <th className="bg-indigo-600 text-white">Resume</th>
                                                <th>สัมภาษณ์</th>
                                                <th>ผลสัมภาษณ์</th> {/* เพิ่มช่องนี้ */}
                                                <th>จัดการ</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {paginatedItems.map(item => {
                                                const isNoDup = item.prescreenStatus === 'No Dup' || item.interviewStatus === 'ผ่าน';
                                                return (
                                                    <tr key={item.id} className="hover:bg-slate-50/50 transition-all">
                                                        <td className="text-[10px] text-slate-400 font-bold">{item.submissionDate}</td>
                                                        <td className="text-left font-black text-slate-700">{item.firstName ? `${item.firstName} ${item.lastName}` : (item.name || '-') }</td>
                                                        <td className="font-bold text-slate-600">{item.tel}</td>
                                                        <td><span className={`px-2 py-1 rounded-full text-[10px] font-black inline-block ${isNoDup ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>{item.prescreenStatus}</span></td>
                                                        <td>
                                                            <div className="flex justify-center gap-1">
                                                                {item.resumeLink ? (
                                                                    <div className="flex gap-1">
                                                                        <a href={item.resumeLink} target="_blank" className="text-indigo-600 bg-indigo-50 p-1.5 rounded-lg hover:scale-110 transition-all"><i data-lucide="eye" className="w-4 h-4"></i></a>
                                                                        {currentUserAgency === 'Admin' && (<a href={getDownloadLink(item.resumeLink)} target="_blank" className="text-emerald-600 bg-emerald-50 p-1.5 rounded font-black text-[9px] border border-emerald-100">DL</a>)}
                                                                    </div>
                                                                ) : (currentUserAgency !== 'Admin' && isNoDup ? (<button onClick={() => { setTargetId(item.id); fileInputRef.current.click(); }} className="text-indigo-600 text-[10px] font-black border-2 border-dashed border-indigo-200 px-2 py-1 rounded hover:bg-indigo-50 transition-all">{isUploading === item.id ? "..." : "+ Resume"}</button>) : <i data-lucide="lock" className="text-slate-200 w-4 h-4 mx-auto"></i>)}
                                                            </div>
                                                        </td>
                                                        {/* ช่องวันที่สัมภาษณ์ */}
                                                        <td>{currentUserAgency === 'Admin' ? <input type="date" value={item.interviewDate || ''} onChange={e => window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id), { interviewDate: e.target.value })} className="admin-edit" /> : (item.interviewDate || '-')}</td>
                                                        
                                                        {/* ช่องผลสัมภาษณ์ (เพิ่มใหม่) */}
                                                        <td>
                                                            {currentUserAgency === 'Admin' ? (
                                                                <select value={item.interviewStatus || 'รอผล'} onChange={e => window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id), { interviewStatus: e.target.value })} className="admin-edit">
                                                                    <option value="รอผล">รอผล</option>
                                                                    <option value="ผ่าน">ผ่าน</option>
                                                                    <option value="ไม่ผ่าน">ไม่ผ่าน</option>
                                                                </select>
                                                            ) : (
                                                                <span className={`px-2 py-0.5 rounded-full text-[10px] font-black inline-block ${item.interviewStatus === 'ผ่าน' ? 'bg-indigo-600 text-white' : 'bg-slate-100'}`}>{item.interviewStatus || 'รอผล'}</span>
                                                            )}
                                                        </td>

                                                        <td><button onClick={() => { if(confirm("ต้องการลบ?")) window.FB.methods.deleteDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id)) }} className="text-rose-200 hover:text-rose-600 active:scale-90 transition-all"><i data-lucide="trash-2" className="w-4 h-4 mx-auto"></i></button></td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-4 flex justify-between bg-slate-50 border-t items-center font-bold text-xs">
                                    <button disabled={currentPage === 1} onClick={() => setCurrentPage(p => p - 1)} className="bg-white border px-4 py-2 rounded-xl active:scale-95 disabled:opacity-30">PREV</button>
                                    <span className="text-slate-400">PAGE {currentPage} / {totalPages}</span>
                                    <button disabled={currentPage === totalPages} onClick={() => setCurrentPage(p => p + 1)} className="bg-white border px-4 py-2 rounded-xl active:scale-95 disabled:opacity-30">NEXT</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    {/* Success Popup */}
                    {popup && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-[999] p-6 text-center">
                            <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl border-t-4 border-indigo-600 w-full max-w-sm popup-animate">
                                <div className="w-16 h-16 mx-auto bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-6"><i data-lucide="check-circle" className="w-8 h-8"></i></div>
                                <h3 className="text-xl font-black mb-2 uppercase">{popup.title}</h3>
                                <p className="text-slate-500 font-bold mb-8 text-sm">{popup.msg}</p>
                                <button onClick={() => setPopup(null)} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest active:scale-95 transition-all">Close</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
