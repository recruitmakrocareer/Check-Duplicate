<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Checker | Google Drive Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        input, select { border: 1px solid #e2e8f0 !important; }
        th { white-space: nowrap; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAX6alx5rJRDRd8Wcvj4rDLLsYwz37NXEQ",
            authDomain: "recruit-operation-project.firebaseapp.com",
            projectId: "recruit-operation-project",
            storageBucket: "recruit-operation-project.firebasestorage.app",
            messagingSenderId: "857023562077",
            appId: "1:857023562077:web:669da5cfc20cf7707e68b4",
            measurementId: "G-K3EC9MZ0JJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.FB = { 
            db, auth,
            methods: { signInAnonymously, onAuthStateChanged, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query }
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        const App = () => {
            // อัปเดต URL ใหม่ที่คุณให้มา
            const scriptURL = "https://script.google.com/macros/s/AKfycbzFlbiGWm6h4UFrXTD05Q9163od4xhiUQdG_IF_lbDrr_aJfGsLE-BC1a5YwsY2F7Vp/exec";

            const [user, setUser] = useState(null);
            const [currentUserAgency, setCurrentUserAgency] = useState('');
            const [loginEmail, setLoginEmail] = useState('');
            const [isLoading, setIsLoading] = useState(true);
            const [cloudCandidates, setCloudCandidates] = useState([]);
            const [referenceDb, setReferenceDb] = useState([]);
            const [isUploading, setIsUploading] = useState(null);
            const fileInputRef = useRef(null);
            const [targetId, setTargetId] = useState(null);
            
            const [formData, setFormData] = useState({ 
                submissionDate: new Date().toISOString().split('T')[0], 
                name: '', 
                tel: '', 
                email: '', 
                position: '', 
                location: ''
            });

            const [searchTerm, setSearchTerm] = useState('');
            const [popup, setPopup] = useState(null);

            const refreshIcons = useCallback(() => {
                if (window.lucide) {
                    setTimeout(() => lucide.createIcons(), 100);
                }
            }, []);

            useEffect(() => {
                if (!window.FB) return;
                const { auth, methods } = window.FB;
                methods.signInAnonymously(auth).catch(console.error);
                const unsubscribe = methods.onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    loadStaticData();
                });
                return () => unsubscribe();
            }, []);

            const loadStaticData = async () => {
                try {
                    const dbUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTsDZSCTRBCQ3LojqsCmVPea7qo7uB9VyXne9aZSlqxo8yntizND6o7bpRQfS2rFFHthMB-N0YIqTL6/pub?output=csv';
                    const res = await fetch(dbUrl).then(r => r.text());
                    const data = Papa.parse(res, { header: true }).data;
                    setReferenceDb(data.filter(r => r['Name-Surname']).map(r => ({
                        name: (r['Name-Surname'] || '').trim(),
                        tel: r['Tel'] ? r['Tel'].toString().trim() : ''
                    })));
                    setIsLoading(false);
                    refreshIcons();
                } catch (e) {
                    setIsLoading(false);
                }
            };

            useEffect(() => {
                if (!user || !currentUserAgency) return;
                const { db, methods } = window.FB;
                const q = methods.query(methods.collection(db, 'candidates'));
                const unsubscribe = methods.onSnapshot(q, (sn) => {
                    setCloudCandidates(sn.docs.map(d => ({ id: d.id, ...d.data() })));
                    refreshIcons();
                });
                return () => unsubscribe();
            }, [user, currentUserAgency, refreshIcons]);

            const handleLogin = (e) => {
                e.preventDefault();
                const accessMap = { 
                    "admin@company.com": "Admin", 
                    "manpower@agency.com": "Manpower", "metalent@agency.com": "Me Talent", 
                    "prtr@agency.com": "PRTR", "talentvis@agency.com": "Talentvis", "techgrid@agency.com": "Techgrid" 
                };
                const agency = accessMap[loginEmail.trim().toLowerCase()];
                if (agency) {
                    setCurrentUserAgency(agency);
                    refreshIcons();
                } else {
                    setPopup({ title: "ล้มเหลว", msg: "ไม่พบอีเมลนี้ในระบบ" });
                }
            };

            const normalize = (s) => s ? s.toString().toLowerCase().replace(/[^a-z0-9ก-ฮ]/g, '') : '';

            const handleAdd = async (e) => {
                e.preventDefault();
                const isDup = [...referenceDb, ...cloudCandidates].some(c => normalize(c.name) === normalize(formData.name) || normalize(c.tel) === normalize(formData.tel));
                
                if (isDup) return setPopup({ title: "พบข้อมูลซ้ำ!", msg: "รายชื่อนี้มีอยู่ในระบบแล้ว" });

                try {
                    await window.FB.methods.addDoc(window.FB.methods.collection(window.FB.db, 'candidates'), {
                        ...formData,
                        agency: currentUserAgency,
                        prescreenStatus: 'รอตรวจสอบ',
                        interviewDate: '',
                        interviewStatus: 'รอผล',
                        resumeLink: '',
                        createdAt: Date.now()
                    });
                    setFormData({ ...formData, name: '', tel: '', email: '' });
                    setPopup({ title: "สำเร็จ", msg: "บันทึกข้อมูลเรียบร้อย" });
                } catch (e) {
                    setPopup({ title: "Error", msg: "บันทึกไม่ได้ กรุณาเช็ค Firestore Rules" });
                }
            };

            const handleUpdate = async (id, field, value) => {
                try {
                    await window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', id), { [field]: value });
                } catch (e) { console.error(e); }
            };

            const onFileChange = async (e) => {
                const file = e.target.files[0];
                if (!file || !targetId) return;

                if (file.type !== 'application/pdf') {
                    setPopup({ title: "Error", msg: "กรุณาใช้ไฟล์ PDF เท่านั้น" });
                    return;
                }

                setIsUploading(targetId);
                const reader = new FileReader();
                reader.onload = async (f) => {
                    const base64Data = f.target.result.split(',')[1];
                    try {
                        const candidate = cloudCandidates.find(c => c.id === targetId);
                        const fileName = `${candidate.name || 'Resume'}_${Date.now()}.pdf`;

                        const response = await fetch(scriptURL, {
                            method: "POST",
                            body: JSON.stringify({
                                fileData: base64Data,
                                mimeType: file.type,
                                fileName: fileName
                            })
                        });

                        const result = await response.json();
                        if (result.status === "success") {
                            await handleUpdate(targetId, 'resumeLink', result.url);
                            setPopup({ title: "สำเร็จ", msg: "อัปโหลด Resume เข้า Google Drive เรียบร้อย" });
                        } else {
                            throw new Error(result.message);
                        }
                    } catch (err) {
                        setPopup({ title: "Error", msg: "อัปโหลดไม่สำเร็จ: " + err.message });
                    } finally {
                        setIsUploading(null);
                        setTargetId(null);
                        e.target.value = '';
                    }
                };
                reader.readAsDataURL(file);
            };

            const filteredItems = useMemo(() => {
                return cloudCandidates.filter(item => {
                    if (currentUserAgency !== 'Admin' && item.agency !== currentUserAgency) return false;
                    const search = searchTerm.toLowerCase();
                    return !searchTerm || item.name.toLowerCase().includes(search) || item.tel.includes(search);
                }).sort((a, b) => b.createdAt - a.createdAt);
            }, [cloudCandidates, currentUserAgency, searchTerm]);

            if (isLoading) return <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white"><div className="loader scale-150 mb-6"></div><p className="font-bold">Loading Cloud Database...</p></div>;

            if (!currentUserAgency) return (
                <div key="login" className="h-screen flex items-center justify-center bg-slate-950 p-6">
                    <div className="glass-morphism w-full max-w-md rounded-[3rem] p-12 shadow-2xl z-10 text-center">
                        <div className="bg-indigo-600 w-20 h-20 rounded-3xl flex items-center justify-center text-white mx-auto mb-8 shadow-xl">
                            <i data-lucide="shield-check" className="w-10 h-10"></i>
                        </div>
                        <h1 className="text-3xl font-black mb-10 text-slate-800 uppercase tracking-tighter">Login System</h1>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="email" value={loginEmail} onChange={e => setLoginEmail(e.target.value)} className="w-full bg-white p-5 rounded-2xl text-center font-bold outline-none border-2 border-slate-100" placeholder="name@agency.com" required />
                            <button className="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-lg hover:bg-indigo-700 transition-all uppercase active:scale-95">Enter System</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div key="dashboard" className="min-h-screen p-4 md:p-8 max-w-[1750px] mx-auto">
                    <input type="file" ref={fileInputRef} onChange={onFileChange} accept="application/pdf" className="hidden" />
                    
                    {/* Header */}
                    <div className="bg-white rounded-[2rem] p-6 shadow-xl flex items-center justify-between mb-8 border border-white">
                        <div className="flex items-center gap-4">
                            <div className="bg-slate-900 p-4 rounded-2xl text-white shadow-lg"><i data-lucide="layout-dashboard"></i></div>
                            <div>
                                <h1 className="text-2xl font-black uppercase text-slate-800">{currentUserAgency} SESSION</h1>
                                <p className="text-[10px] text-emerald-500 font-bold tracking-widest">• ONLINE REAL-TIME DATABASE</p>
                            </div>
                        </div>
                        <button onClick={() => { setCurrentUserAgency(''); refreshIcons(); }} className="bg-rose-50 text-rose-600 p-4 rounded-2xl hover:bg-rose-600 hover:text-white transition-all shadow-md active:scale-90"><i data-lucide="power"></i></button>
                    </div>

                    <div className="grid grid-cols-1 xl:grid-cols-12 gap-8">
                        {currentUserAgency !== 'Admin' && (
                            <div className="xl:col-span-3">
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-white sticky top-8">
                                    <h2 className="text-xl font-black mb-8 flex gap-3 items-center text-slate-800 uppercase"><i data-lucide="user-plus" className="text-indigo-600"></i> New Entry</h2>
                                    <form onSubmit={handleAdd} className="space-y-4">
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">วันที่ส่งผู้สมัคร</label>
                                            <input type="date" value={formData.submissionDate} onChange={e => setFormData({...formData, submissionDate: e.target.value})} className="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none" required />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">ชื่อ-นามสกุล (Thai)</label>
                                            <input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} placeholder="สมชาย ใจดี" className="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none" required />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">เบอร์โทรศัพท์</label>
                                            <input type="text" value={formData.tel} onChange={e => setFormData({...formData, tel: e.target.value})} placeholder="08XXXXXXXX" className="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none" required />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">ตำแหน่งงาน</label>
                                            <select value={formData.position} onChange={e => setFormData({...formData, position: e.target.value})} className="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none" required>
                                                <option value="">เลือกตำแหน่ง...</option>
                                                <option value="Sales Executive">Sales Executive</option>
                                                <option value="Section Manager">Section Manager</option>
                                                <option value="Supervisor">Supervisor</option>
                                                <option value="Office Support">Office Support</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">สาขา / Branch</label>
                                            <input type="text" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} placeholder="เช่น สาขานนทบุรี" className="w-full bg-slate-50 p-4 rounded-xl font-bold outline-none" required />
                                        </div>
                                        <button className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black mt-4 shadow-lg hover:bg-black transition-all active:scale-95 uppercase tracking-widest text-xs">Submit Record</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        <div className={currentUserAgency === 'Admin' ? 'xl:col-span-12' : 'xl:col-span-9'}>
                            <div className="bg-white p-5 rounded-[2rem] shadow-lg mb-6 flex gap-4 border border-white">
                                <div className="flex-1 relative">
                                    <i data-lucide="search" className="absolute left-4 top-4 text-slate-300"></i>
                                    <input type="text" placeholder="ค้นหาชื่อ หรือ เบอร์โทรศัพท์..." className="w-full bg-slate-50 pl-12 p-4 rounded-2xl font-bold outline-none focus:bg-white transition-all" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                </div>
                            </div>

                            <div className="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-white">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-950 text-white text-[10px] font-black uppercase tracking-[0.15em]">
                                            <tr>
                                                <th className="p-6">1. วันที่ส่ง</th>
                                                <th className="p-6">2. ชื่อ-นามสกุล</th>
                                                <th className="p-6">3. เบอร์โทร</th>
                                                <th className="p-6">4. ตำแหน่ง</th>
                                                <th className="p-6">5. สาขา</th>
                                                <th className="p-6 text-center">6. ตรวจสอบ</th>
                                                <th className="p-6 text-center">7. Resume (Drive)</th>
                                                <th className="p-6 text-center">8. วันสัมภาษณ์</th>
                                                <th className="p-6 text-center">9. ผลสัมภาษณ์</th>
                                                <th className="p-6 text-center">10. จัดการ</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {filteredItems.map(item => {
                                                const isPass = item.prescreenStatus === 'ผ่าน';
                                                return (
                                                    <tr key={item.id} className={`${isPass ? 'bg-emerald-50/50' : 'hover:bg-slate-50/50'} transition-all group`}>
                                                        <td className="p-6 text-xs font-bold text-slate-400">{item.submissionDate}</td>
                                                        <td className="p-6 font-black text-slate-800">{item.name}</td>
                                                        <td className="p-6 text-xs font-bold text-slate-400">{item.tel}</td>
                                                        <td className="p-6">
                                                            <span className="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg font-black text-[10px]">{item.position}</span>
                                                        </td>
                                                        <td className="p-6 font-bold text-slate-500 text-xs">{item.location}</td>
                                                        
                                                        <td className="p-6 text-center">
                                                            {currentUserAgency === 'Admin' ? (
                                                                <select value={item.prescreenStatus} onChange={e => handleUpdate(item.id, 'prescreenStatus', e.target.value)} className="p-2 border rounded-xl font-bold text-[10px] outline-none shadow-sm">
                                                                    <option value="รอตรวจสอบ">รอตรวจสอบ</option>
                                                                    <option value="ผ่าน">ผ่าน (NoDup)</option>
                                                                    <option value="ไม่ผ่าน">ไม่ผ่าน</option>
                                                                </select>
                                                            ) : (
                                                                <span className={`px-4 py-1.5 rounded-full text-[10px] font-black ${item.prescreenStatus === 'ผ่าน' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-400'}`}>
                                                                    {item.prescreenStatus === 'ผ่าน' ? 'NoDup' : item.prescreenStatus}
                                                                </span>
                                                            )}
                                                        </td>

                                                        <td className="p-6 text-center">
                                                            {isPass ? (
                                                                <div className="flex flex-col items-center gap-2">
                                                                    {item.resumeLink ? (
                                                                        <a href={item.resumeLink} target="_blank" className="text-emerald-600 p-2 bg-emerald-50 rounded-lg hover:scale-110 transition-all shadow-sm">
                                                                            <i data-lucide="file-text"></i>
                                                                        </a>
                                                                    ) : (
                                                                        <button onClick={() => { setTargetId(item.id); fileInputRef.current.click(); }} 
                                                                            className="text-indigo-600 text-[9px] font-black uppercase p-2 border-2 border-dashed border-indigo-200 rounded-lg hover:bg-indigo-50 transition-all">
                                                                            {isUploading === item.id ? "Uploading..." : "Upload CV (PDF)"}
                                                                        </button>
                                                                    )}
                                                                </div>
                                                            ) : <span className="text-slate-200"><i data-lucide="lock"></i></span>}
                                                        </td>

                                                        <td className="p-6 text-center">
                                                            {currentUserAgency === 'Admin' ? (
                                                                <input type="date" value={item.interviewDate || ''} onChange={e => handleUpdate(item.id, 'interviewDate', e.target.value)} className="p-2 border rounded-xl font-bold text-[10px] outline-none" />
                                                            ) : <span className="text-[10px] font-black text-slate-600">{item.interviewDate || '-'}</span>}
                                                        </td>

                                                        <td className="p-6 text-center">
                                                            {currentUserAgency === 'Admin' ? (
                                                                <select value={item.interviewStatus} onChange={e => handleUpdate(item.id, 'interviewStatus', e.target.value)} className="p-2 border rounded-xl font-bold text-[10px] outline-none shadow-sm">
                                                                    <option value="รอผล">รอผล</option>
                                                                    <option value="ผ่าน">ผ่าน</option>
                                                                    <option value="ไม่ผ่าน">ไม่ผ่าน</option>
                                                                    <option value="สละสิทธิ์">สละสิทธิ์</option>
                                                                </select>
                                                            ) : (
                                                                <span className={`px-4 py-1.5 rounded-full text-[10px] font-black ${item.interviewStatus === 'ผ่าน' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-500 bg-slate-100'}`}>
                                                                    {item.interviewStatus}
                                                                </span>
                                                            )}
                                                        </td>

                                                        <td className="p-6 text-center">
                                                            <button onClick={() => { if(confirm("ต้องการลบข้อมูลถาวร?")) window.FB.methods.deleteDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id)) }} className="bg-rose-50 text-rose-300 hover:text-rose-600 p-3 rounded-xl transition-all opacity-0 group-hover:opacity-100">
                                                                <i data-lucide="trash-2" className="w-5 h-5"></i>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    {popup && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-md flex items-center justify-center z-[100] p-6">
                            <div className="bg-white p-10 rounded-[3rem] max-w-sm w-full text-center shadow-2xl border-t-8 border-indigo-500">
                                <h3 className="text-2xl font-black mb-4 text-slate-800 uppercase tracking-tighter">{popup.title}</h3>
                                <p className="text-slate-500 font-bold mb-8 leading-relaxed text-sm">{popup.msg}</p>
                                <button onClick={() => setPopup(null)} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all uppercase tracking-widest text-xs">Close</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
