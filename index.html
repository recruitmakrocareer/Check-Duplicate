<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Checker | Final Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; font-size: 14px; margin: 0; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        th { white-space: nowrap; font-size: 12px !important; padding: 10px 6px !important; background-color: #0f172a; color: white; text-align: center; border: 1px solid #334155; }
        td { font-size: 13px !important; padding: 10px 4px !important; vertical-align: middle; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .candidate-name { text-align: left; font-weight: 700; min-width: 150px; }
        .filter-input { width: 100%; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 12px; font-size: 13px; font-weight: 600; outline: none; }
        .draft-row { background-color: #fffbeb; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAX6alx5rJRDRd8Wcvj4rDLLsYwz37NXEQ",
            authDomain: "recruit-operation-project.firebaseapp.com",
            projectId: "recruit-operation-project",
            storageBucket: "recruit-operation-project.firebasestorage.app",
            messagingSenderId: "857023562077",
            appId: "1:857023562077:web:669da5cfc20cf7707e68b4"
        };
        const app = initializeApp(firebaseConfig);
        window.FB = { db: getFirestore(app), auth: getAuth(app), methods: { signInAnonymously, onAuthStateChanged, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, writeBatch } };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        const App = () => {
            const scriptURL = "https://script.google.com/macros/s/AKfycbwDesg5DnMhUhqNMF_3teZ2ZYqBHBN-URprvn3wFtfWbKOzsTWJp1U3SFbIASydi9bK/exec";

            const [user, setUser] = useState(null);
            const [currentUserAgency, setCurrentUserAgency] = useState('');
            const [loginEmail, setLoginEmail] = useState('');
            const [isLoading, setIsLoading] = useState(true);
            const [cloudCandidates, setCloudCandidates] = useState([]);
            const [referenceDb, setReferenceDb] = useState([]);
            const [gmailDb, setGmailDb] = useState([]); 
            const [draftList, setDraftList] = useState([]);
            const [isChecked, setIsChecked] = useState(false);
            const [currentPage, setCurrentPage] = useState(1);
            const itemsPerPage = 50;

            const [filters, setFilters] = useState({ subDate: '', name: '', position: '', location: '', intDate: '' });
            const [popup, setPopup] = useState(null);
            const [targetId, setTargetId] = useState(null);
            const fileInputRef = useRef(null);

            const [formData, setFormData] = useState({ 
                submissionDate: new Date().toISOString().split('T')[0], 
                firstName: '', lastName: '', tel: '', email: '', position: '', location: ''
            });

            const refreshIcons = useCallback(() => { if (window.lucide) setTimeout(() => lucide.createIcons(), 100); }, []);
            const normalize = (s) => s ? s.toString().toLowerCase().replace(/[^a-z0-9ก-ฮ]/g, '').trim() : '';

            // INITIAL DATA LOAD
            useEffect(() => {
                if (!window.FB) return;
                const { auth, methods } = window.FB;
                methods.signInAnonymously(auth).catch(console.error);
                methods.onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    // 1. Load Reference CSV
                    fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vTsDZSCTRBCQ3LojqsCmVPea7qo7uB9VyXne9aZSlqxo8yntizND6o7bpRQfS2rFFHthMB-N0YIqTL6/pub?output=csv')
                    .then(r => r.text()).then(res => {
                        const data = Papa.parse(res, { header: true }).data;
                        setReferenceDb(data.filter(r => r['Name-Surname']).map(r => ({
                            name: (r['Name-Surname']||'').trim(), tel: (r['Tel']||'').trim(), email: (r['Email']||'').trim()
                        })));
                        
                        // 2. Load Gmail Database
                        return fetch(scriptURL + "?action=getGmail");
                    })
                    .then(r => r.json())
                    .then(emails => {
                        setGmailDb(emails);
                        setIsLoading(false);
                        console.log("📥 Gmail Sync Loaded:", emails.length);
                        refreshIcons();
                    })
                    .catch(err => { console.error(err); setIsLoading(false); });
                });
            }, []);

            // REALTIME CLOUD LOAD
            useEffect(() => {
                if (!user || !currentUserAgency) return;
                const q = window.FB.methods.query(window.FB.methods.collection(window.FB.db, 'candidates'));
                return window.FB.methods.onSnapshot(q, (sn) => {
                    setCloudCandidates(sn.docs.map(d => ({ id: d.id, ...d.data() })));
                    refreshIcons();
                });
            }, [user, currentUserAgency, refreshIcons]);

            // --- CALCULATIONS (Move totalPages up here) ---
            const allFiltered = useMemo(() => {
                return cloudCandidates.filter(item => {
                    if (currentUserAgency !== 'Admin' && item.agency !== currentUserAgency) return false;
                    const fullName = normalize((item.firstName || '') + (item.lastName || '') + (item.name || ''));
                    return (!filters.subDate || item.submissionDate === filters.subDate) &&
                           (!filters.name || fullName.includes(normalize(filters.name))) &&
                           (!filters.position || item.position === filters.position) &&
                           (!filters.location || normalize(item.location).includes(normalize(filters.location))) &&
                           (!filters.intDate || item.interviewDate === filters.intDate);
                }).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            }, [cloudCandidates, currentUserAgency, filters]);

            // FIX: Declare totalPages and paginatedItems clearly before render
            const totalPages = Math.max(1, Math.ceil(allFiltered.length / itemsPerPage));
            const paginatedItems = allFiltered.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

            useEffect(() => { setCurrentPage(1); }, [filters]);

            // --- HANDLERS ---
            const handleBulkCheck = () => {
                if (draftList.length === 0) return;
                const updatedDraft = draftList.map((item, index) => {
                    const currentFull = normalize(item.firstName + item.lastName);
                    const currentEmail = item.email.toLowerCase().trim();
                    
                    // Check Cloud + CSV
                    const isDupExt = [...referenceDb, ...cloudCandidates].some(c => {
                        const dbFull = normalize(c.firstName && c.lastName ? (c.firstName + c.lastName) : (c.name || ''));
                        return (dbFull === currentFull) || (normalize(c.tel) === normalize(item.tel)) || (currentEmail && normalize(c.email) === currentEmail);
                    });

                    // Check Gmail Sync
                    const isDupGmail = gmailDb.some(e => e === currentEmail);
                    
                    // Internal Duplicate
                    const isDupInt = draftList.some((other, oIdx) => index !== oIdx && (normalize(other.firstName + other.lastName) === currentFull || normalize(other.tel) === normalize(item.tel)));

                    let status = 'No Dup';
                    if (isDupExt || isDupInt) status = 'Dup';
                    else if (isDupGmail) status = 'Dup (Gmail)';

                    return { ...item, status: status };
                });
                setDraftList(updatedDraft);
                setIsChecked(true);
            };

            const addToDraft = (e) => {
                e.preventDefault();
                if (!formData.firstName || !formData.lastName || !formData.tel || !formData.email || !formData.position || !formData.location) {
                    return setPopup({ title: "ข้อมูลไม่ครบ", msg: "กรุณาระบุข้อมูลให้ครบทุกช่อง" });
                }
                const telClean = formData.tel.replace(/\D/g, '');
                if (telClean.length !== 10 || !telClean.startsWith('0')) {
                    return setPopup({ title: "เบอร์โทรไม่ถูกต้อง", msg: "ต้องครบ 10 หลักและขึ้นต้นด้วย 0" });
                }
                setDraftList([...draftList, { ...formData, tel: telClean, draftId: Date.now(), status: 'Pending' }]);
                setFormData({ ...formData, firstName: '', lastName: '', tel: '', email: '' });
                setIsChecked(false);
            };

            const saveAllToCloud = async () => {
                if (!isChecked) return;
                const promises = draftList.map(item => window.FB.methods.addDoc(window.FB.methods.collection(window.FB.db, 'candidates'), { ...item, agency: currentUserAgency, prescreenStatus: item.status, createdAt: Date.now(), interviewStatus: 'รอผล' }));
                await Promise.all(promises);
                setDraftList([]); setIsChecked(false);
                setPopup({ title: "สำเร็จ", msg: "บันทึกข้อมูลเรียบร้อย" });
            };

            if (isLoading) return <div className="h-screen flex items-center justify-center bg-slate-900 text-white font-black"><div className="loader mr-4"></div> SYNCHRONIZING SYSTEM...</div>;

            if (!currentUserAgency) return (
                <div className="h-screen flex items-center justify-center bg-slate-950 p-6">
                    <div className="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl border-t-4 border-indigo-600">
                        <h1 className="text-2xl font-black mb-8 text-center text-slate-800 uppercase">Recruit Access</h1>
                        <form onSubmit={(e) => {
                            e.preventDefault();
                            const accessMap = { "admin@company.com": "Admin", "manpower@agency.com": "Manpower", "metalent@agency.com": "Me Talent", "prtr@agency.com": "PRTR", "talentvis@agency.com": "Talentvis", "techgrid@agency.com": "Techgrid" };
                            const agency = accessMap[loginEmail.trim().toLowerCase()];
                            if (agency) setCurrentUserAgency(agency); else setPopup({ title: "Error", msg: "Email ไม่ถูกต้อง" });
                        }} className="space-y-4">
                            <input type="email" value={loginEmail} onChange={e => setLoginEmail(e.target.value)} className="w-full bg-slate-50 p-4 rounded-xl text-center font-bold border" placeholder="your-email@example.com" required />
                            <button className="w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-lg uppercase active:scale-95 transition-all">Login</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-4 max-w-full mx-auto">
                    {/* Header */}
                    <div className="bg-white rounded-2xl p-4 shadow-sm flex items-center justify-between mb-6 border border-slate-200">
                        <div className="flex items-center gap-4">
                            <div className="bg-slate-900 p-3 rounded-xl text-white shadow-md"><i data-lucide="shield-check"></i></div>
                            <div><h1 className="text-xl font-black uppercase">{currentUserAgency} SESSION</h1><p className="text-[10px] text-emerald-500 font-bold uppercase">• Full System Online</p></div>
                        </div>
                        <button onClick={() => setCurrentUserAgency('')} className="bg-rose-50 text-rose-600 p-3 rounded-xl hover:bg-rose-600 hover:text-white transition-all"><i data-lucide="power" className="w-5 h-5"></i></button>
                    </div>

                    <div className="flex flex-col xl:flex-row gap-6">
                        {/* Entry Sidebar */}
                        {currentUserAgency !== 'Admin' && (
                            <div className="sidebar-container">
                                <div className="bg-white p-6 rounded-2xl shadow-md border border-slate-100 sticky top-6">
                                    <h2 className="text-lg font-black mb-6 flex gap-2 items-center text-slate-800 uppercase"><i data-lucide="user-plus" className="text-indigo-600"></i> คีย์รายชื่อ</h2>
                                    <form onSubmit={addToDraft} className="space-y-4 font-bold text-slate-400 text-[11px]">
                                        <div>วันที่ส่ง<span className="required-star">*</span><input type="date" value={formData.submissionDate} onChange={e => setFormData({...formData, submissionDate: e.target.value})} className="w-full bg-slate-50 p-3 rounded-lg text-sm border text-slate-700" required /></div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div>ชื่อ<span className="required-star">*</span><input type="text" value={formData.firstName} onChange={e => setFormData({...formData, firstName: e.target.value})} className="w-full bg-slate-50 p-3 rounded-lg text-sm border text-slate-700" required /></div>
                                            <div>นามสกุล<span className="required-star">*</span><input type="text" value={formData.lastName} onChange={e => setFormData({...formData, lastName: e.target.value})} className="w-full bg-slate-50 p-3 rounded-lg text-sm border text-slate-700" required /></div>
                                        </div>
                                        <div>เบอร์โทรศัพท์ (10 หลัก)<span className="required-star">*</span><input type="text" maxLength="10" value={formData.tel} onChange={e => setFormData({...formData, tel: e.target.value.replace(/\D/g,'')})} className="w-full bg-slate-50 p-3 rounded-lg text-sm border text-slate-700" required /></div>
                                        <div>อีเมล<span className="required-star">*</span><input type="email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} className="w-full bg-slate-50 p-3 rounded-lg text-sm border text-slate-700" required /></div>
                                        <div>ตำแหน่ง<span className="required-star">*</span><select value={formData.position} onChange={e => setFormData({...formData, position: e.target.value})} className="w-full bg-slate-50 p-3 rounded-lg text-sm border text-slate-700" required><option value="">ตำแหน่ง...</option><option value="Sales Executive">Sales Executive</option><option value="Supervisor">Supervisor</option><option value="Office Support">Office Support</option></select></div>
                                        <div>สาขา<span className="required-star">*</span><input type="text" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} className="w-full bg-slate-50 p-3 rounded-lg text-sm border text-slate-700" required /></div>
                                        <button className="w-full bg-indigo-600 text-white py-4 rounded-xl font-black uppercase text-sm shadow-lg hover:bg-indigo-700 transition-all">+ เพิ่มลงร่าง</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        <div className="flex-1 min-w-0 space-y-4">
                            {/* Filter bar */}
                            <div className="bg-white p-4 rounded-2xl shadow-md border border-slate-200 grid grid-cols-1 md:grid-cols-6 gap-4 items-end">
                                <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase">วันที่ส่ง</label><input type="date" value={filters.subDate} onChange={e => setFilters({...filters, subDate: e.target.value})} className="filter-input" /></div>
                                <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase">ชื่อ</label><input type="text" placeholder="ชื่อ..." value={filters.name} onChange={e => setFilters({...filters, name: e.target.value})} className="filter-input" /></div>
                                <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase">ตำแหน่ง</label><select value={filters.position} onChange={e => setFilters({...filters, position: e.target.value})} className="filter-input"><option value="">ทั้งหมด...</option><option value="Sales Executive">Sales Executive</option><option value="Supervisor">Supervisor</option><option value="Office Support">Office Support</option></select></div>
                                <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase">สาขา</label><input type="text" placeholder="สาขา..." value={filters.location} onChange={e => setFilters({...filters, location: e.target.value})} className="filter-input" /></div>
                                <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase">สัมภาษณ์</label><input type="date" value={filters.intDate} onChange={e => setFilters({...filters, intDate: e.target.value})} className="filter-input" /></div>
                                <button onClick={() => setFilters({subDate:'', name:'', position:'', location:'', intDate:''})} className="bg-slate-100 text-slate-600 py-2.5 rounded-lg font-black text-[11px] border">ล้างตัวกรอง</button>
                            </div>

                            {/* Draft Table */}
                            {currentUserAgency !== 'Admin' && draftList.length > 0 && (
                                <div className="bg-white rounded-2xl shadow-xl border-2 border-amber-200 overflow-hidden">
                                    <div className="bg-amber-50 p-4 flex justify-between items-center border-b border-amber-200 font-black text-amber-800 text-xs">รายการรอตรวจสอบ ({draftList.length})
                                        <div className="flex gap-2">
                                            <button onClick={handleBulkCheck} className="bg-amber-500 text-white px-5 py-2 rounded-lg font-black shadow-md uppercase text-[11px] hover:bg-amber-600 transition-all">1. Check Duplicate All</button>
                                            {isChecked && <button onClick={saveAllToCloud} className="bg-emerald-600 text-white px-5 py-2 rounded-lg font-black shadow-md uppercase text-[11px] animate-bounce">2. บันทึกเข้า Cloud</button>}
                                        </div>
                                    </div>
                                    <div className="overflow-x-auto"><table className="w-full"><thead><tr><th>ชื่อ-นามสกุล</th><th>เบอร์โทร</th><th>อีเมล</th><th>ตำแหน่ง</th><th className="bg-amber-600 text-white">ผลตรวจสอบ</th></tr></thead><tbody>{draftList.map((item) => (<tr key={item.draftId} className="draft-row"><td>{item.firstName} {item.lastName}</td><td className="font-bold">{item.tel}</td><td className="text-xs">{item.email}</td><td>{item.position}</td><td><span className={`px-4 py-1 rounded-full text-[10px] font-black ${item.status === 'No Dup' ? 'bg-emerald-100 text-emerald-600' : (item.status.includes('Dup') ? 'bg-rose-100 text-rose-600' : 'bg-slate-100 text-slate-400')}`}>{item.status}</span></td></tr>))}</tbody></table></div>
                                </div>
                            )}

                            {/* Main Data Table */}
                            <div className="bg-white rounded-2xl shadow-lg overflow-hidden border border-slate-200">
                                <div className="bg-slate-50 p-4 border-b font-black text-slate-800 flex justify-between items-center text-xs uppercase"><span>ฐานข้อมูลหลัก - หน้า {currentPage} (พบ {allFiltered.length} รายการ)</span></div>
                                <div className="overflow-x-auto">
                                    <table className="w-full">
                                        <thead><tr><th>วันที่ส่ง</th><th className="text-left">ชื่อ-นามสกุล</th><th>เบอร์โทร</th><th>ตำแหน่ง</th><th>ตรวจสอบ</th><th>สัมภาษณ์</th><th>ผล</th><th>จัดการ</th></tr></thead>
                                        <tbody className="divide-y divide-slate-100 text-center">
                                            {paginatedItems.map(item => (
                                                <tr key={item.id} className="hover:bg-slate-50/50 transition-all text-center">
                                                    <td className="text-[10px] font-bold text-slate-400">{item.submissionDate}</td>
                                                    <td className="candidate-name">{item.firstName ? `${item.firstName} ${item.lastName}` : (item.name || '-') }</td>
                                                    <td className="text-[11px] font-bold text-slate-400">{item.tel}</td>
                                                    <td><span className="text-[10px] font-black bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded">{item.position}</span></td>
                                                    <td><span className={`px-2 py-1 rounded-full text-[10px] font-black inline-block ${item.prescreenStatus === 'No Dup' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>{item.prescreenStatus}</span></td>
                                                    <td>{currentUserAgency === 'Admin' ? <input type="date" value={item.interviewDate || ''} onChange={e => window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id), { interviewDate: e.target.value })} className="border rounded p-1 text-[11px]" /> : <span className="text-[11px] font-bold text-slate-600">{item.interviewDate || '-'}</span>}</td>
                                                    <td>{currentUserAgency === 'Admin' ? <select value={item.interviewStatus} onChange={e => window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id), { interviewStatus: e.target.value })} className="border rounded p-1 text-[11px]"><option value="รอผล">รอผล</option><option value="ผ่าน">ผ่าน</option><option value="ไม่ผ่าน">ไม่ผ่าน</option></select> : <span className={`px-2 py-0.5 rounded-full text-[10px] font-black inline-block ${item.interviewStatus === 'ผ่าน' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-500'}`}>{item.interviewStatus}</span>}</td>
                                                    <td><button onClick={() => { if(confirm("ลบข้อมูล?")) window.FB.methods.deleteDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id)) }} className="text-rose-200 hover:text-rose-600"><i data-lucide="trash-2" className="w-4 h-4 mx-auto"></i></button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                {totalPages > 1 && (
                                    <div className="bg-slate-50 p-3 flex justify-center items-center gap-2 border-t">
                                        <button disabled={currentPage === 1} onClick={() => setCurrentPage(prev => prev - 1)} className="pagination-btn">Prev</button>
                                        <span className="font-black text-xs">Page {currentPage} of {totalPages}</span>
                                        <button disabled={currentPage === totalPages} onClick={() => setCurrentPage(prev => prev + 1)} className="pagination-btn">Next</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {popup && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[100] p-6 text-center">
                            <div className="bg-white p-10 rounded-[2.5rem] max-w-sm w-full shadow-2xl border-t-4 border-indigo-600"><h3 className="text-xl font-black mb-4 uppercase">{popup.title}</h3><p className="text-slate-500 font-bold mb-8 text-sm">{popup.msg}</p><button onClick={() => setPopup(null)} className="w-full bg-slate-900 text-white py-4 rounded-xl font-black uppercase">CLOSE</button></div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
