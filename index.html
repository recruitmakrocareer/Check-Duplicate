                try {
                    const binaryString = window.atob(base64Data);
                    const len = binaryString.length;
                    const bytes = new Uint8Array(len);
                    for (let i = 0; i < len; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    const loadingTask = window.pdfjsLib.getDocument({data: bytes});
                    const pdf = await loadingTask.promise;
                    let fullText = "";
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        fullText += textContent.items.map(item => item.str).join(" ") + "\n";
                    }
                    return fullText;

                                // 1. ถอดข้อความจากไฟล์ PDF ด้วย Javascript ฝั่งหน้าเว็บ

                                if (!pdfText) throw new Error("ไม่สามารถดึงข้อความจากไฟล์ PDF ได้ โปรดตรวจสอบไฟล์");

                                const specificCriteria = jobRequirements[position] 
                                    ? `โดยมีคุณสมบัติหลักที่ต้องการคือ: "${jobRequirements[position]}"` 
                                    : "";

                                // 2. สั่งการ ChatGPT ให้ประเมินผล
                                const promptText = `คุณคือ HR ผู้เชี่ยวชาญ จงวิเคราะห์ Resume ของผู้สมัครที่มีเนื้อหาดังนี้:\n\n"${pdfText.substring(0, 10000)}"\n\nเพื่อดูความเหมาะสมกับตำแหน่ง "${position}" ${specificCriteria} ประเมินคะแนนความเหมาะสมเต็ม 100 คะแนน (พิจารณาจากความสอดคล้องของทักษะ ประสบการณ์ และการศึกษาตามคุณสมบัติที่ระบุ) และเขียนสรุปเป็นภาษาไทย 2-3 ประโยค อธิบายเหตุผลที่ให้คะแนนเท่านี้ ตอบกลับมาในรูปแบบ JSON ที่มี key คือ "score" (ตัวเลข) และ "summary" (ข้อความสรุป)`;

                                // ✅ Step 3: ใช้ CORS Proxy พร้อมระบบล้างแคช ป้องกัน Browser บล็อก
                                const targetUrl = "https://api.openai.com/v1/chat/completions?nocache=" + Date.now();
                                const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(targetUrl);

                                const aiRes = await fetch(proxyUrl, {
                                    method: 'POST',
                                    headers: {
                                        'Content-Type': 'application/json',
                                        // แก้ไขตัวแปรให้ตรงกันเป็น openAIApiKey
                                        'Authorization': `Bearer ${openAIApiKey}`
                                    },
                                    body: JSON.stringify({
                                        model: 'gpt-4o-mini',
                                        messages: [{ role: 'user', content: promptText }],
                                        response_format: { type: 'json_object' }
                                    })
                                });
                                
                                const aiJson = await aiRes.json();
                                
                                if (!aiRes.ok) {
                                    if (aiRes.status === 401) throw new Error("API Key ของ OpenAI ไม่ถูกต้อง หรือยังไม่ได้เปิดสิทธิ์ (401)");
                                    if (aiRes.status === 429) throw new Error("เครดิตเงินใน OpenAI หมด หรือจำกัดโควต้า (429)");
                                    throw new Error(aiJson.error?.message || "OpenAI API Error");
                                }
                                
                                const aiContent = JSON.parse(aiJson.choices[0].message.content);
                                aiData = { score: aiContent.score, summary: aiContent.summary };

                            } catch (aiErr) {
                                console.error("AI Analysis failed:", aiErr);
                                aiData.summary = "AI ขัดข้อง: " + aiErr.message;
                            }

                            await window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', targetId), { 
                                resumeLink: res.url,
                                aiScore: aiData.score,
                                aiSummary: aiData.summary
                            });
                            
                            setPopup({ title: "SUCCESS", msg: `อัปโหลดไฟล์${aiData.score ? 'และวิเคราะห์ด้วย AI ' : ''}สำเร็จ!` });
                        }
                    } finally { 
                        setIsUploading(null); 
                        setTargetId(null); 
                        if (fileInputRef.current) fileInputRef.current.value = '';
                    }
                };
                reader.readAsDataURL(file);

                                <div className="filter-item"><label className="modern-label">วันที่ส่ง</label><input type="date" value={filters.subDate} onChange={e => setFilters({...filters, subDate: e.target.value})} className="modern-input py-2 px-3 text-xs" /></div>
                                <div className="filter-item"><label className="modern-label">ค้นหาชื่อ</label><input type="text" placeholder="ชื่อ/นามสกุล..." value={filters.name} onChange={e => setFilters({...filters, name: e.target.value})} className="modern-input py-2 px-3 text-xs" /></div>
                                <div className="filter-item"><label className="modern-label">สถานะ</label><select value={filters.status} onChange={e => setFilters({...filters, status: e.target.value})} className="modern-input py-2 px-3 text-xs"><option value="">ทั้งหมด</option><option value="No Dup">No Dup</option><option value="Dup">Dup</option></select></div>
                                <div className="filter-item"><label className="modern-label">ตำแหน่ง</label><select value={filters.pos} onChange={e => setFilters({...filters, pos: e.target.value})} className="modern-input py-2 px-3 text-xs"><option value="">ทั้งหมด</option>{positions.map(p => <option key={p} value={p}>{p}</option>)}</select></div>
                                <div className="filter-item"><label className="modern-label">วันสัมภาษณ์</label><input type="date" value={filters.intDate} onChange={e => setFilters({...filters, intDate: e.target.value})} className="modern-input py-2 px-3 text-xs" /></div>
                                <div className="filter-item"><label className="modern-label">ผลสัมภาษณ์</label><select value={filters.intResult} onChange={e => setFilters({...filters, intResult: e.target.value})} className="modern-input py-2 px-3 text-xs"><option value="">ทั้งหมด</option><option value="รอผล">รอผล</option><option value="ผ่าน">ผ่าน</option><option value="ไม่ผ่าน">ไม่ผ่าน</option></select></div>
                                <button onClick={() => setFilters({name:'', subDate:'', status:'', pos:'', intDate:'', intResult:''})} className="bg-slate-100 hover:bg-slate-200 text-slate-600 border border-slate-200 h-[38px] px-4 rounded-xl text-[11px] font-bold uppercase transition-colors">Clear</button>
                            </div>

                            {currentUserAgency !== 'Admin' && draftList.length > 0 && (
                                <div className="bg-white rounded-2xl border border-amber-200 shadow-sm overflow-hidden">
                                    <div className="bg-amber-50/50 p-4 flex justify-between items-center border-b border-amber-100">
                                        <div className="flex items-center gap-2">
                                            <div className="bg-amber-100 text-amber-600 p-1.5 rounded-lg"><i data-lucide="list-todo" className="w-4 h-4"></i></div>
                                            <span className="font-black text-sm uppercase tracking-wide text-amber-800">รอตรวจสอบความซ้ำซ้อน ({draftList.length})</span>
                                        </div>
                                        <div className="flex gap-3">
                                            <button onClick={handleBulkCheck} className="bg-amber-500 hover:bg-amber-600 text-white px-5 py-2 rounded-xl font-bold text-xs uppercase shadow-sm hover:shadow active:scale-95 transition-all flex items-center gap-2">
                                                <i data-lucide="scan-search" className="w-4 h-4"></i> 1. Check Duplicates
                                            </button>
                                            {isChecked && <button onClick={async () => {
                                                const promises = draftList.map(item => window.FB.methods.addDoc(window.FB.methods.collection(window.FB.db, 'candidates'), { ...item, agency: currentUserAgency, prescreenStatus: item.status, interviewStatus: 'รอผล', createdAt: Date.now(), resumeLink: '' }));
                                                await Promise.all(promises); setDraftList([]); setIsChecked(false);
                                                setPopup({ title: "SUCCESS", msg: "บันทึกข้อมูลขึ้นระบบสำเร็จ!" });
                                            }} className="bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2 rounded-xl font-bold text-xs uppercase shadow-sm hover:shadow active:scale-95 transition-all flex items-center gap-2">
                                                <i data-lucide="cloud-upload" className="w-4 h-4"></i> 2. Save to Cloud
                                            </button>}
                                        </div>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table>
                                            <thead>
                                                <tr>
                                                    <th>วันที่ส่ง</th><th>ชื่อ-นามสกุล</th><th>เบอร์โทร</th><th>อีเมล</th><th>ตำแหน่ง</th><th>สาขา</th>
                                                    <th className="bg-amber-50 text-amber-800 text-center">ผลตรวจสอบ</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {draftList.map((item) => (
                                                    <tr key={item.draftId}>
                                                        <td className="text-slate-500 text-xs">{item.submissionDate}</td>
                                                        <td className="font-bold text-slate-800">{item.firstName} {item.lastName}</td>
                                                        <td className="font-mono text-slate-600 text-xs">{item.tel}</td>
                                                        <td className="text-slate-500">{item.email}</td>
                                                        <td className="font-semibold text-indigo-600 text-xs">{item.position}</td>
                                                        <td className="text-slate-500 text-xs">{item.location}</td>
                                                        <td className="text-center">
                                                            <span className={`badge ${item.status === 'No Dup' ? 'bg-emerald-50 text-emerald-600 ring-1 ring-emerald-500/20' : item.status === 'Dup' ? 'bg-rose-50 text-rose-600 ring-1 ring-rose-500/20' : 'bg-slate-100 text-slate-500'}`}>
                                                                {item.status}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 flex flex-col overflow-hidden">
                                <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                    <div className="flex items-center gap-2 text-slate-700">
                                        <i data-lucide="database" className="w-4 h-4 text-indigo-500"></i>
                                        <h2 className="font-black text-sm uppercase tracking-wide">ฐานข้อมูลหลัก</h2>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        {currentUserAgency === 'Admin' && (
                                            <React.Fragment>
                                                <button onClick={() => { setEditAiReq({...jobRequirements}); setIsAiSettingsOpen(true); }} className="bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-1.5 rounded-xl text-[11px] font-bold uppercase transition-colors flex items-center gap-1.5 shadow-sm active:scale-95">
                                                    <i data-lucide="settings" className="w-3.5 h-3.5"></i> ตั้งค่า AI
                                                </button>
                                                <button onClick={exportToCSV} className="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-1.5 rounded-xl text-[11px] font-bold uppercase transition-colors flex items-center gap-1.5 shadow-sm active:scale-95">
                                                    <i data-lucide="download" className="w-3.5 h-3.5"></i> Export CSV
                                                </button>
                                            </React.Fragment>
                                        )}
                                        <span className="bg-white px-3 py-1 rounded-full text-[11px] font-bold text-slate-500 border border-slate-200">
                                            หน้า {currentPage} / {totalPages} (พบ {allFiltered.length} รายการ)
                                        </span>
                                    </div>
                                </div>
                                <div className="overflow-x-auto">
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>วันที่ส่ง</th>
                                                {currentUserAgency === 'Admin' && <th>Agency</th>}
                                                <th>ชื่อ-นามสกุล</th>
                                                <th>เบอร์โทร</th>
                                                <th>ตำแหน่ง</th>
                                                <th>สาขา</th>
                                                <th className="text-center">สถานะ</th>
                                                <th className="text-center">{currentUserAgency === 'Admin' ? 'AI วิเคราะห์' : 'Prescreen'}</th>
                                                <th className="text-center">Resume</th>
                                                <th>นัดสัมภาษณ์</th>
                                                <th className="text-center">ผลสัมภาษณ์</th>
                                                <th className="text-center">จัดการ</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {paginatedItems.length === 0 ? (
                                                <tr><td colSpan="12" className="text-center py-12 text-slate-400 font-medium">ไม่พบข้อมูลในระบบ</td></tr>
                                            ) : (
                                                paginatedItems.map(item => {
                                                    const isNoDup = item.prescreenStatus === 'No Dup';
                                                    const isEditing = editingId === item.id && currentUserAgency === 'Admin';
                                                    
                                                    return (
                                                        <tr key={item.id} className={isEditing ? 'bg-indigo-50/30' : ''}>
                                                            <td className="text-xs text-slate-400 font-medium whitespace-nowrap">
                                                                {isEditing ? (
                                                                    <input type="date" value={editFormData.submissionDate || ''} onChange={(e) => setEditFormData({...editFormData, submissionDate: e.target.value})} className="admin-edit text-xs min-w-[110px]" />
                                                                ) : item.submissionDate}
                                                            </td>
                                                            {currentUserAgency === 'Admin' && (
                                                                <td className="text-xs font-bold text-indigo-600 whitespace-nowrap">
                                                                    {isEditing ? (
                                                                        <select value={editFormData.agency || ''} onChange={(e) => setEditFormData({...editFormData, agency: e.target.value})} className="admin-edit text-xs min-w-[100px]">
                                                                            <option value="Manpower">Manpower</option>
                                                                            <option value="Me Talent">Me Talent</option>
                                                                            <option value="PRTR">PRTR</option>
                                                                            <option value="Talentvis">Talentvis</option>
                                                                            <option value="Techgrid">Techgrid</option>
                                                                            <option value="Admin">Admin</option>
                                                                        </select>
                                                                    ) : item.agency}
                                                                </td>
                                                            )}
                                                            <td className="font-bold text-slate-800 whitespace-nowrap">
                                                                {isEditing ? (
                                                                    <div className="flex gap-1 min-w-[150px]">
                                                                        <input type="text" placeholder="ชื่อ" value={editFormData.firstName || ''} onChange={(e) => setEditFormData({...editFormData, firstName: e.target.value})} className="admin-edit text-xs w-1/2" />
                                                                        <input type="text" placeholder="นามสกุล" value={editFormData.lastName || ''} onChange={(e) => setEditFormData({...editFormData, lastName: e.target.value})} className="admin-edit text-xs w-1/2" />
                                                                    </div>
                                                                ) : (item.firstName ? `${item.firstName} ${item.lastName}` : (item.name || '-'))}
                                                            </td>
                                                            <td className="font-mono text-slate-500 text-xs">
                                                                {isEditing ? (
                                                                    <input type="text" value={editFormData.tel || ''} onChange={(e) => setEditFormData({...editFormData, tel: e.target.value})} className="admin-edit text-xs min-w-[100px]" />
                                                                ) : item.tel}
                                                            </td>
                                                            <td className="text-xs font-semibold text-indigo-500 max-w-[150px] truncate" title={item.position}>
                                                                {isEditing ? (
                                                                    <select value={editFormData.position || ''} onChange={(e) => setEditFormData({...editFormData, position: e.target.value})} className="admin-edit text-xs min-w-[120px]">
                                                                        <option value="">- เลือกตำแหน่ง -</option>
                                                                        {positions.map(p => <option key={p} value={p}>{p}</option>)}
                                                                    </select>
                                                                ) : item.position}
                                                            </td>
                                                            <td className="text-xs text-slate-500 max-w-[150px] truncate" title={item.location}>
                                                                {isEditing ? (
                                                                    <select value={editFormData.location || ''} onChange={(e) => setEditFormData({...editFormData, location: e.target.value})} className="admin-edit text-xs min-w-[120px]">
                                                                        <option value="">- เลือกสาขา -</option>
                                                                        {locations.map(l => <option key={l} value={l}>{l}</option>)}
                                                                    </select>
                                                                ) : item.location}
                                                            </td>
                                                            <td className="text-center">
                                                                {isEditing ? (
                                                                    <select value={editFormData.prescreenStatus || 'Pending'} onChange={(e) => setEditFormData({...editFormData, prescreenStatus: e.target.value})} className="admin-edit text-xs min-w-[80px]">
                                                                        <option value="No Dup">No Dup</option>
                                                                        <option value="Dup">Dup</option>
                                                                        <option value="Pending">Pending</option>
                                                                    </select>
                                                                ) : (
                                                                    <span className={`badge ${isNoDup ? 'bg-emerald-50 text-emerald-600 ring-1 ring-emerald-500/20' : 'bg-rose-50 text-rose-600 ring-1 ring-rose-500/20'}`}>
                                                                        {item.prescreenStatus}
                                                                    </span>
                                                                )}
                                                            </td>
                                                            <td className="text-center">
                                                                {item.aiScore !== undefined && item.aiScore !== null ? (
                                                                    <button onClick={() => setAiModal({ score: item.aiScore, summary: item.aiSummary, name: item.firstName ? `${item.firstName} ${item.lastName}` : item.name })} className={`badge cursor-pointer hover:scale-105 transition-transform flex items-center justify-center gap-1 mx-auto shadow-sm ${getAiScoreClass(item.aiScore)}`}>
                                                                        <i data-lucide="sparkles" className="w-3 h-3"></i> {item.aiScore}%
                                                                    </button>
                                                                ) : item.aiSummary ? (
                                                                    <button onClick={() => setPopup({ title: "AI ERROR", msg: item.aiSummary })} className="badge cursor-pointer bg-slate-50 text-rose-500 ring-1 ring-rose-500/30 hover:scale-105 transition-transform flex items-center justify-center gap-1 mx-auto">
                                                                        <i data-lucide="alert-circle" className="w-3 h-3"></i> Failed
                                                                    </button>
                                                                ) : (
                                                                    <span className="text-slate-300 text-[10px]">-</span>
                                                                )}
                                                            </td>
                                                            <td>
                                                                <div className="flex justify-center gap-1.5">
                                                                    {item.resumeLink ? (
                                                                        <React.Fragment>
                                                                            <a href={item.resumeLink} target="_blank" className="text-indigo-600 bg-indigo-50 hover:bg-indigo-100 p-2 rounded-lg transition-colors" title="View Resume"><i data-lucide="file-text" className="w-4 h-4"></i></a>
                                                                            {currentUserAgency === 'Admin' && (
                                                                                <a href={getDownloadLink(item.resumeLink)} target="_blank" className="text-slate-600 bg-slate-100 hover:bg-slate-200 p-2 rounded-lg transition-colors" title="Download"><i data-lucide="download" className="w-4 h-4"></i></a>
                                                                            )}
                                                                        </React.Fragment>
                                                                    ) : (
                                                                        currentUserAgency !== 'Admin' && isNoDup ? (
                                                                            <button onClick={() => { setTargetId(item.id); fileInputRef.current.click(); }} className="text-indigo-600 bg-white border border-dashed border-indigo-300 hover:border-indigo-500 hover:bg-indigo-50 text-[10px] font-bold px-3 py-1.5 rounded-lg transition-all flex items-center gap-1 whitespace-nowrap">
                                                                                {isUploading === item.id ? (
                                                                                    <div className="w-3 h-3 border-2 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
                                                                                ) : (
                                                                                    <span className="flex items-center"><i data-lucide="upload" className="w-3 h-3"></i></span>
                                                                                )} 
                                                                                {isUploading === item.id ? "กำลังอัปโหลด..." : "อัปโหลด"}
                                                                            </button>
                                                                        ) : <span className="text-slate-300"><i data-lucide="lock" className="w-4 h-4 mx-auto"></i></span>
                                                                    )}
                                                                </div>
                                                            </td>
                                                            <td>
                                                                {isEditing ? (
                                                                    <input type="date" value={editFormData.interviewDate || ''} onChange={e => setEditFormData({...editFormData, interviewDate: e.target.value})} className="admin-edit text-xs min-w-[110px]" /> 
                                                                ) : (
                                                                    <span className="text-slate-500 text-xs whitespace-nowrap">{item.interviewDate || '-'}</span>
                                                                )}
                                                            </td>
                                                            <td className="text-center">
                                                                {isEditing ? (
                                                                    <select value={editFormData.interviewStatus || 'รอผล'} onChange={e => setEditFormData({...editFormData, interviewStatus: e.target.value})} className="admin-edit text-xs min-w-[90px]">
                                                                        <option value="รอผล">รอผล</option><option value="ผ่าน">ผ่าน</option><option value="ไม่ผ่าน">ไม่ผ่าน</option>
                                                                    </select> 
                                                                ) : (
                                                                    <span className={`badge ${getInterviewStatusClass(item.interviewStatus)}`}>{item.interviewStatus || 'รอผล'}</span>
                                                                )}
                                                            </td>
                                                            <td className="text-center">
                                                                <div className="flex justify-center gap-1.5">
                                                                    {currentUserAgency === 'Admin' ? (
                                                                        isEditing ? (
                                                                            <React.Fragment>
                                                                                <button onClick={() => handleSaveEdit(item.id)} className="text-emerald-600 bg-emerald-50 hover:bg-emerald-100 p-2 rounded-lg transition-colors" title="บันทึก"><i data-lucide="check" className="w-4 h-4"></i></button>
                                                                                <button onClick={() => setEditingId(null)} className="text-slate-500 bg-slate-100 hover:bg-slate-200 p-2 rounded-lg transition-colors" title="ยกเลิก"><i data-lucide="x" className="w-4 h-4"></i></button>
                                                                            </React.Fragment>
                                                                        ) : (
                                                                            <React.Fragment>
                                                                                <button onClick={() => { setEditingId(item.id); setEditFormData(item); }} className="text-indigo-600 bg-indigo-50 hover:bg-indigo-100 p-2 rounded-lg transition-colors" title="แก้ไข"><i data-lucide="edit-2" className="w-4 h-4"></i></button>
                                                                                <button onClick={() => { 
                                                                                    setConfirmDialog({
                                                                                        title: "ยืนยันการลบ",
                                                                                        msg: "คุณแน่ใจหรือไม่ว่าต้องการลบข้อมูลรายชื่อนี้? การกระทำนี้ไม่สามารถย้อนกลับได้",
                                                                                        onConfirm: () => {
                                                                                            window.FB.methods.deleteDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id));
                                                                                            setConfirmDialog(null);
                                                                                        }
                                                                                    });
                                                                                }} className="text-rose-500 bg-rose-50 hover:bg-rose-100 p-2 rounded-lg transition-colors" title="ลบ"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                                            </React.Fragment>
                                                                        )
                                                                    ) : (
                                                                        <button onClick={() => { 
                                                                            setConfirmDialog({
                                                                                title: "ยืนยันการลบ",
                                                                                msg: "คุณแน่ใจหรือไม่ว่าต้องการลบข้อมูลรายชื่อนี้? การกระทำนี้ไม่สามารถย้อนกลับได้",
                                                                                onConfirm: () => {
                                                                                    window.FB.methods.deleteDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id));
                                                                                    setConfirmDialog(null);
                                                                                }
                                                                            });
                                                                        }} className="text-slate-300 hover:text-rose-500 hover:bg-rose-50 p-2 rounded-lg transition-colors active:scale-90" title="ลบ">
                                                                            <i data-lucide="trash-2" className="w-4 h-4 mx-auto"></i>
                                                                        </button>
                                                                    )}
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    );
                                                })
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-4 flex justify-between bg-white border-t border-slate-100 items-center">
                                    <button disabled={currentPage === 1} onClick={() => setCurrentPage(p => p - 1)} className="bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 hover:text-slate-900 px-5 py-2 rounded-xl text-[11px] font-bold uppercase transition-colors disabled:opacity-40 disabled:hover:bg-white flex items-center gap-1"><i data-lucide="chevron-left" className="w-4 h-4"></i> Prev</button>
                                    <span className="text-slate-400 text-xs font-medium">Page {currentPage} of {totalPages}</span>
                                    <button disabled={currentPage === totalPages || totalPages === 0} onClick={() => setCurrentPage(p => p + 1)} className="bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 hover:text-slate-900 px-5 py-2 rounded-xl text-[11px] font-bold uppercase transition-colors disabled:opacity-40 disabled:hover:bg-white flex items-center gap-1">Next <i data-lucide="chevron-right" className="w-4 h-4"></i></button>
                                </div>
                            </div>

                        </div>
                    </div>
                    {renderModals()}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
