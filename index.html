<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Checker | Final Master Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; font-size: 13.5px; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        th { white-space: nowrap; font-size: 11px !important; padding: 12px 6px !important; background-color: #0f172a; color: white; border: 1px solid #334155; }
        td { font-size: 12.5px !important; padding: 10px 4px !important; border-bottom: 1px solid #e2e8f0; text-align: center; vertical-align: middle; }
        .draft-row { background-color: #fffbeb; }
        .pagination-btn { padding: 6px 12px; border: 1px solid #e2e8f0; border-radius: 8px; background: white; font-weight: bold; }
        .pagination-active { background: #4f46e5 !important; color: white !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAX6alx5rJRDRd8Wcvj4rDLLsYwz37NXEQ",
            authDomain: "recruit-operation-project.firebaseapp.com",
            projectId: "recruit-operation-project",
            storageBucket: "recruit-operation-project.firebasestorage.app",
            messagingSenderId: "857023562077",
            appId: "1:857023562077:web:669da5cfc20cf7707e68b4"
        };
        const app = initializeApp(firebaseConfig);
        window.FB = { db: getFirestore(app), auth: getAuth(app), methods: { signInAnonymously, onAuthStateChanged, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, writeBatch } };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        const App = () => {
            // *** ใส่ URL ของคุณที่นี่ ***
            const scriptURL = "https://script.google.com/macros/s/AKfycbyHSv_7wt3jlYJQWVlnE5GF06y3tgf-FLcyz6AQDnNoBtIs0PqfCVw5AM_SYlSNxJHYhg/exec";

            const [user, setUser] = useState(null);
            const [currentUserAgency, setCurrentUserAgency] = useState('');
            const [loginEmail, setLoginEmail] = useState('');
            const [isLoading, setIsLoading] = useState(true);
            const [cloudCandidates, setCloudCandidates] = useState([]);
            const [referenceDb, setReferenceDb] = useState([]);
            const [gmailDb, setGmailDb] = useState([]); 
            const [draftList, setDraftList] = useState([]);
            const [isChecked, setIsChecked] = useState(false);
            const [currentPage, setCurrentPage] = useState(1);
            const itemsPerPage = 50;

            const [filters, setFilters] = useState({ name: '' });
            const [popup, setPopup] = useState(null);
            const [isUploading, setIsUploading] = useState(null);
            const [targetId, setTargetId] = useState(null);
            const fileInputRef = useRef(null);

            const [formData, setFormData] = useState({ submissionDate: new Date().toISOString().split('T')[0], firstName: '', lastName: '', tel: '', email: '', position: '', location: '' });

            const normalize = (s) => s ? s.toString().toLowerCase().replace(/[^a-z0-9ก-ฮ]/g, '').trim() : '';
            const getDownloadLink = (url) => { if (!url) return "#"; const fileId = url.match(/[-\w]{25,}/); return fileId ? `https://drive.google.com/uc?id=${fileId[0]}&export=download` : url; };

            // Initialization
            useEffect(() => {
                if (!window.FB) return;
                window.FB.methods.signInAnonymously(window.FB.auth);
                window.FB.methods.onAuthStateChanged(window.FB.auth, (u) => {
                    setUser(u);
                    fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vTsDZSCTRBCQ3LojqsCmVPea7qo7uB9VyXne9aZSlqxo8yntizND6o7bpRQfS2rFFHthMB-N0YIqTL6/pub?output=csv')
                    .then(r => r.text()).then(res => {
                        const data = Papa.parse(res, { header: true }).data;
                        setReferenceDb(data.filter(r => r['Name-Surname']).map(r => ({ name: (r['Name-Surname']||'').trim(), tel: (r['Tel']||'').trim(), email: (r['Email']||'').trim() })));
                        return fetch(scriptURL + "?action=getGmail");
                    })
                    .then(r => r.json())
                    .then(emails => { setGmailDb(emails); setIsLoading(false); if(window.lucide) setTimeout(() => lucide.createIcons(), 100); })
                    .catch(() => setIsLoading(false));
                });
            }, []);

            useEffect(() => {
                if (!user || !currentUserAgency) return;
                const q = window.FB.methods.query(window.FB.methods.collection(window.FB.db, 'candidates'));
                return window.FB.methods.onSnapshot(q, (sn) => {
                    setCloudCandidates(sn.docs.map(d => ({ id: d.id, ...d.data() })));
                    if(window.lucide) setTimeout(() => lucide.createIcons(), 100);
                });
            }, [user, currentUserAgency]);

            // Pagination Logic
            const allFiltered = useMemo(() => {
                return cloudCandidates.filter(item => {
                    if (currentUserAgency !== 'Admin' && item.agency !== currentUserAgency) return false;
                    const fullName = normalize((item.firstName || '') + (item.lastName || '') + (item.name || ''));
                    return fullName.includes(normalize(filters.name));
                }).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            }, [cloudCandidates, currentUserAgency, filters]);

            const totalPages = Math.max(1, Math.ceil(allFiltered.length / itemsPerPage));
            const paginatedItems = allFiltered.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

            const handleBulkCheck = () => {
                const updated = draftList.map((item, index) => {
                    const email = item.email.toLowerCase().trim();
                    const isDupExt = [...referenceDb, ...cloudCandidates].some(c => normalize((c.firstName||'')+(c.lastName||'')) === normalize(item.firstName+item.lastName) || normalize(c.tel) === normalize(item.tel) || (email && normalize(c.email) === email));
                    const isDupGmail = gmailDb.includes(email);
                    let status = 'No Dup';
                    if (isDupExt) status = 'Dup'; else if (isDupGmail) status = 'Dup (Gmail)';
                    return { ...item, status };
                });
                setDraftList(updated); setIsChecked(true);
            };

            const onFileChange = async (e) => {
                const file = e.target.files[0]; if (!file || !targetId) return;
                setIsUploading(targetId);
                const reader = new FileReader();
                reader.onload = async (f) => {
                    const base64 = f.target.result.split(',')[1];
                    try {
                        const candidate = cloudCandidates.find(c => c.id === targetId);
                        const response = await fetch(scriptURL, { method: "POST", body: JSON.stringify({ fileData: base64, mimeType: file.type, fileName: `${candidate.firstName}_CV.pdf` }) });
                        const res = await response.json();
                        if (res.status === "success") await window.FB.methods.updateDoc(window.FB.methods.doc(window.FB.db, 'candidates', targetId), { resumeLink: res.url });
                    } finally { setIsUploading(null); setTargetId(null); e.target.value = ''; }
                };
                reader.readAsDataURL(file);
            };

            if (isLoading) return <div className="h-screen flex items-center justify-center font-black bg-slate-900 text-white">SYSTEM INITIALIZING...</div>;

            if (!currentUserAgency) return (
                <div className="h-screen flex items-center justify-center bg-slate-950 p-6">
                    <form onSubmit={(e) => {
                        e.preventDefault();
                        const map = { "admin@company.com": "Admin", "manpower@agency.com": "Manpower", "metalent@agency.com": "Me Talent", "prtr@agency.com": "PRTR", "talentvis@agency.com": "Talentvis", "techgrid@agency.com": "Techgrid" };
                        const agency = map[loginEmail.trim().toLowerCase()];
                        if (agency) setCurrentUserAgency(agency); else alert("Login Failed");
                    }} className="bg-white p-10 rounded-3xl w-80 shadow-2xl text-center">
                        <h1 className="text-xl font-black mb-6 uppercase">Recruit Login</h1>
                        <input type="email" value={loginEmail} onChange={e => setLoginEmail(e.target.value)} className="w-full border p-3 rounded-xl mb-4 text-center font-bold" placeholder="Email" required />
                        <button className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold uppercase active:scale-95 transition-all">Enter</button>
                    </form>
                </div>
            );

            return (
                <div className="p-4 max-w-full min-h-screen">
                    <input type="file" ref={fileInputRef} onChange={onFileChange} accept="application/pdf" className="hidden" />
                    
                    <div className="flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                        <h1 className="font-black uppercase tracking-tight text-slate-700">{currentUserAgency} SESSION</h1>
                        <button onClick={() => setCurrentUserAgency('')} className="bg-rose-50 text-rose-600 p-2.5 rounded-xl hover:bg-rose-600 hover:text-white transition-all"><i data-lucide="power" className="w-5 h-5"></i></button>
                    </div>

                    <div className="flex flex-col xl:flex-row gap-6">
                        {/* Entry Sidebar */}
                        {currentUserAgency !== 'Admin' && (
                            <div className="sidebar-container bg-white p-6 rounded-2xl shadow-md border h-fit sticky top-4">
                                <h2 className="font-black mb-4 flex items-center gap-2 uppercase text-xs text-indigo-600"><i data-lucide="user-plus"></i> เพิ่มรายชื่อ</h2>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    setDraftList([...draftList, { ...formData, draftId: Date.now(), status: 'Pending' }]);
                                    setFormData({ ...formData, firstName: '', lastName: '', tel: '', email: '' });
                                    setIsChecked(false);
                                }} className="space-y-3">
                                    <input type="date" value={formData.submissionDate} onChange={e => setFormData({...formData, submissionDate: e.target.value})} className="w-full border p-2 rounded-lg text-sm" required />
                                    <input type="text" placeholder="ชื่อ" value={formData.firstName} onChange={e => setFormData({...formData, firstName: e.target.value})} className="w-full border p-2 rounded-lg text-sm" required />
                                    <input type="text" placeholder="นามสกุล" value={formData.lastName} onChange={e => setFormData({...formData, lastName: e.target.value})} className="w-full border p-2 rounded-lg text-sm" required />
                                    <input type="text" placeholder="เบอร์โทร" value={formData.tel} onChange={e => setFormData({...formData, tel: e.target.value})} className="w-full border p-2 rounded-lg text-sm" required />
                                    <input type="email" placeholder="อีเมล" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} className="w-full border p-2 rounded-lg text-sm" required />
                                    <select value={formData.position} onChange={e => setFormData({...formData, position: e.target.value})} className="w-full border p-2 rounded-lg text-sm" required><option value="">ตำแหน่ง...</option><option value="Sales Executive">Sales Executive</option></select>
                                    <input type="text" placeholder="สาขา" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} className="w-full border p-2 rounded-lg text-sm" required />
                                    <button className="w-full bg-indigo-600 text-white py-3 rounded-xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all">+ เพิ่มลงตารางร่าง</button>
                                </form>
                            </div>
                        )}

                        <div className="flex-1 space-y-4 min-w-0">
                            <div className="bg-white p-4 rounded-xl border flex gap-2">
                                <input type="text" placeholder="ค้นหาชื่อ..." value={filters.name} onChange={e => setFilters({...filters, name: e.target.value})} className="border p-2 rounded-lg text-sm w-full" />
                            </div>

                            {/* Draft Box */}
                            {draftList.length > 0 && (
                                <div className="bg-white rounded-xl border-2 border-amber-200 overflow-hidden shadow-xl">
                                    <div className="bg-amber-50 p-3 flex justify-between items-center border-b border-amber-200">
                                        <span className="font-black text-xs uppercase">รายการรอตรวจสอบ ({draftList.length})</span>
                                        <div className="flex gap-2">
                                            <button onClick={handleBulkCheck} className="bg-amber-500 text-white px-4 py-1.5 rounded-lg text-[10px] font-black uppercase shadow-md active:scale-95">1. Check Duplicate</button>
                                            {isChecked && <button onClick={async () => {
                                                const promises = draftList.map(item => window.FB.methods.addDoc(window.FB.methods.collection(window.FB.db, 'candidates'), { ...item, agency: currentUserAgency, prescreenStatus: item.status, interviewStatus: 'รอผล', createdAt: Date.now() }));
                                                await Promise.all(promises); setDraftList([]); setIsChecked(false);
                                            }} className="bg-emerald-600 text-white px-4 py-1.5 rounded-lg text-[10px] font-black uppercase shadow-md animate-bounce">2. บันทึกเข้า Cloud</button>}
                                        </div>
                                    </div>
                                    <div className="overflow-x-auto"><table className="w-full text-xs"><thead><tr><th>ชื่อ-นามสกุล</th><th>เบอร์โทร</th><th>ผลตรวจ</th></tr></thead><tbody>{draftList.map((item) => (<tr key={item.draftId} className="draft-row"><td>{item.firstName} {item.lastName}</td><td className="font-bold">{item.tel}</td><td><span className={`px-4 py-1 rounded-full text-[10px] font-black ${item.status === 'No Dup' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>{item.status}</span></td></tr>))}</tbody></table></div>
                                </div>
                            )}

                            {/* Main Table */}
                            <div className="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                                <div className="bg-slate-50 p-4 border-b font-black text-xs flex justify-between items-center text-slate-500">
                                    <span>ฐานข้อมูลหลัก - หน้า {currentPage} / {totalPages} (พบ {allFiltered.length} รายการ)</span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full">
                                        <thead><tr><th>วันที่ส่ง</th><th>ชื่อ-นามสกุล</th><th>เบอร์โทร</th><th>ตรวจสอบ</th><th className="bg-indigo-600 text-white">Resume</th><th>สัมภาษณ์</th><th>จัดการ</th></tr></thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {paginatedItems.map(item => {
                                                const isNoDup = item.prescreenStatus === 'No Dup' || item.interviewStatus === 'ผ่าน';
                                                return (
                                                    <tr key={item.id} className="hover:bg-slate-50/50 transition-all">
                                                        <td className="text-[10px] text-slate-400 font-bold">{item.submissionDate}</td>
                                                        <td className="text-left font-black text-slate-700">{item.firstName ? `${item.firstName} ${item.lastName}` : (item.name || '-') }</td>
                                                        <td className="font-bold">{item.tel}</td>
                                                        <td><span className={`px-2 py-1 rounded-full text-[10px] font-black inline-block ${isNoDup ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>{item.prescreenStatus}</span></td>
                                                        <td>
                                                            <div className="flex justify-center gap-1">
                                                                {item.resumeLink ? (
                                                                    <div className="flex gap-1">
                                                                        <a href={item.resumeLink} target="_blank" className="text-indigo-600 bg-indigo-50 p-1.5 rounded-lg hover:scale-110"><i data-lucide="eye" className="w-4 h-4"></i></a>
                                                                        {currentUserAgency === 'Admin' && (<a href={getDownloadLink(item.resumeLink)} target="_blank" className="text-emerald-600 bg-emerald-50 p-1.5 rounded font-black text-[9px] border border-emerald-100">DL</a>)}
                                                                    </div>
                                                                ) : (currentUserAgency !== 'Admin' && isNoDup ? (<button onClick={() => { setTargetId(item.id); fileInputRef.current.click(); }} className="text-indigo-600 text-[10px] font-black border-2 border-dashed border-indigo-200 px-2 py-1 rounded hover:bg-indigo-50 transition-all">{isUploading === item.id ? "..." : "+ Resume"}</button>) : <i data-lucide="lock" className="text-slate-200 w-4 h-4 mx-auto"></i>)}
                                                            </div>
                                                        </td>
                                                        <td className="text-[10px]">{item.interviewDate || '-'}</td>
                                                        <td><button onClick={() => { if(confirm("ลบ?")) window.FB.methods.deleteDoc(window.FB.methods.doc(window.FB.db, 'candidates', item.id)) }} className="text-rose-200 hover:text-rose-600 active:scale-90 transition-all"><i data-lucide="trash-2" className="w-4 h-4 mx-auto"></i></button></td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-4 flex justify-center items-center gap-2 bg-slate-50 border-t">
                                    <button disabled={currentPage === 1} onClick={() => setCurrentPage(p => p - 1)} className="pagination-btn disabled:opacity-30 active:scale-95">Prev</button>
                                    {[...Array(totalPages)].slice(0, 10).map((_, i) => (
                                        <button key={i} onClick={() => setCurrentPage(i + 1)} className={`pagination-btn text-xs ${currentPage === i + 1 ? 'pagination-active' : ''}`}>{i + 1}</button>
                                    ))}
                                    <button disabled={currentPage === totalPages} onClick={() => setCurrentPage(p => p + 1)} className="pagination-btn disabled:opacity-30 active:scale-95">Next</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
